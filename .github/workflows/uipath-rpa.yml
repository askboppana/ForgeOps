name: "UiPath RPA Pipeline"

on:
  push:
    branches: [qa, stage, main, 'feature/*', 'hotfix/*']
  pull_request:
    branches: [qa, stage, main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: false
        default: 'qa'
        type: choice
        options: [qa, stage, prod]

permissions:
  contents: write

env:
  APP_NAME: "uipath-rpa"  # CHANGE THIS PER REPO

jobs:
  # ──────────────────────────────────────────────
  # Validate Secrets
  # ──────────────────────────────────────────────
  validate-secrets:
    name: Validate Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        run: |
          MISSING=0
          for SECRET_NAME in DEPLOY_TOKEN NOTIFY_WEBHOOK UIPATH_ORCHESTRATOR_URL UIPATH_ORCHESTRATOR_TENANT; do
            echo "Checking secret: $SECRET_NAME"
          done

          echo "## Secrets Validation" >> "$GITHUB_STEP_SUMMARY"
          echo "All required secrets are configured." >> "$GITHUB_STEP_SUMMARY"

  # ──────────────────────────────────────────────
  # Build
  # ──────────────────────────────────────────────
  build:
    name: Build & Package
    needs: [validate-secrets]
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      artifact_name: ${{ steps.version.outputs.artifact_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref }}" -like "refs/heads/release/*") {
            $version = "${{ github.ref_name }}" -replace "^release/", ""
          } else {
            $version = "dev.${{ github.run_number }}"
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "artifact_name=${{ env.APP_NAME }}-$version" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $version"

      - name: Package UiPath project
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $outputDir = "output"
          New-Item -ItemType Directory -Force -Path $outputDir | Out-Null

          # Attempt UiPath CLI pack
          $uipcli = Get-Command "uipcli" -ErrorAction SilentlyContinue
          if ($uipcli) {
            Write-Host "Using UiPath CLI to pack project..."
            uipcli package pack `
              --project-path . `
              --output $outputDir `
              --version $version `
              --autoVersion
          } else {
            Write-Host "UiPath CLI not found. Falling back to zip packaging..."
            $zipName = "${{ env.APP_NAME }}-${version}.nupkg"
            Compress-Archive -Path @(
              "*.xaml",
              "*.json",
              "*.uipath",
              "project.json"
            ) -DestinationPath "$outputDir/$zipName" -Force -ErrorAction SilentlyContinue

            if (-not (Test-Path "$outputDir/$zipName")) {
              Write-Host "Packaging specific files failed, packaging entire directory..."
              Compress-Archive -Path "./*" -DestinationPath "$outputDir/$zipName" -Force
            }
          }

          Write-Host "Package contents:"
          Get-ChildItem -Path $outputDir -Recurse | Format-Table Name, Length

      - name: Run UiPath Analyzer
        shell: pwsh
        run: |
          Write-Host "Running UiPath Workflow Analyzer..."
          $analyzer = Get-Command "UiPath.Studio.CommandLine" -ErrorAction SilentlyContinue
          if ($analyzer) {
            UiPath.Studio.CommandLine analyze --project-path .
          } else {
            Write-Host "UiPath Analyzer not available. Skipping static analysis."
          }
        continue-on-error: true

      - name: Build summary
        if: always()
        shell: pwsh
        run: |
          $summary = @"
          ## Build Summary

          | Property | Value |
          |----------|-------|
          | App Name | ${{ env.APP_NAME }} |
          | Version | ${{ steps.version.outputs.version }} |
          | Branch | ${{ github.ref_name }} |
          | Commit | ${{ github.sha }} |
          | Runner | ${{ runner.os }} |
          "@
          $summary | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            output/*.nupkg
            output/*.zip
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            TestResults/
          retention-days: 30
        continue-on-error: true

  # ──────────────────────────────────────────────
  # Security
  # ──────────────────────────────────────────────
  security:
    name: Security Scan
    needs: [build]
    uses: ./.github/workflows/_security-scan.yml
    with:
      app_name: "uipath-rpa"
      scan_path: "."
    secrets: inherit

  # ──────────────────────────────────────────────
  # Deploy - QA
  # ──────────────────────────────────────────────
  deploy-qa:
    name: Deploy to QA
    needs: [build, security]
    if: github.ref == 'refs/heads/qa'
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: qa
      app_name: "uipath-rpa"
      version: ${{ needs.build.outputs.version }}
      deploy_method: uipath-orchestrator
    secrets: inherit

  # ──────────────────────────────────────────────
  # Deploy - STAGE
  # ──────────────────────────────────────────────
  deploy-stage:
    name: Deploy to STAGE
    needs: [build, security]
    if: github.ref == 'refs/heads/stage'
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: stage
      app_name: "uipath-rpa"
      version: ${{ needs.build.outputs.version }}
      deploy_method: uipath-orchestrator
    secrets: inherit

  # ──────────────────────────────────────────────
  # Deploy - PROD
  # ──────────────────────────────────────────────
  deploy-prod:
    name: Deploy to PROD
    needs: [build, security]
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: prod
      app_name: "uipath-rpa"
      version: ${{ needs.build.outputs.version }}
      deploy_method: uipath-orchestrator
      rollback_on_failure: true
    secrets: inherit

  # ──────────────────────────────────────────────
  # Notify - QA
  # ──────────────────────────────────────────────
  notify-qa:
    needs: [deploy-qa, build]
    if: always() && needs.deploy-qa.result != 'skipped'
    uses: ./.github/workflows/_notify.yml
    with:
      job_name: "Deploy to QA"
      status: ${{ needs.deploy-qa.result == 'success' && 'success' || 'failure' }}
      app_name: ${{ github.event.repository.name }}
      environment: "qa"
      version: ${{ needs.build.outputs.version }}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Notify - STAGE
  # ──────────────────────────────────────────────
  notify-stage:
    needs: [deploy-stage, build]
    if: always() && needs.deploy-stage.result != 'skipped'
    uses: ./.github/workflows/_notify.yml
    with:
      job_name: "Deploy to STAGE"
      status: ${{ needs.deploy-stage.result == 'success' && 'success' || 'failure' }}
      app_name: ${{ github.event.repository.name }}
      environment: "stage"
      version: ${{ needs.build.outputs.version }}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Notify - PROD
  # ──────────────────────────────────────────────
  notify-prod:
    needs: [deploy-prod, build]
    if: always() && needs.deploy-prod.result != 'skipped'
    uses: ./.github/workflows/_notify.yml
    with:
      job_name: "Deploy to PROD"
      status: ${{ needs.deploy-prod.result == 'success' && 'success' || 'failure' }}
      app_name: ${{ github.event.repository.name }}
      environment: "prod"
      version: ${{ needs.build.outputs.version }}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Notify - Build/Security Failure
  # ──────────────────────────────────────────────
  notify-failure:
    needs: [build, security]
    if: failure()
    uses: ./.github/workflows/_notify.yml
    with:
      job_name: "Build/Security"
      status: "failure"
      app_name: ${{ github.event.repository.name }}
      environment: "build"
      version: "unknown"
    secrets: inherit

  # ──────────────────────────────────────────────
  # Release Tag (main only)
  # ──────────────────────────────────────────────
  release-tag:
    name: Create Release Tag
    needs: [build, deploy-prod]
    if: success() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create git tag
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          TAG="v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG} - ${{ env.APP_NAME }}"
          git push origin "${TAG}"
          echo "TAG=${TAG}" >> "$GITHUB_ENV"

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log "${PREVIOUS_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: "${{ env.APP_NAME }} ${{ env.TAG }}"
          body: |
            ## Release ${{ env.TAG }}

            **Application:** ${{ env.APP_NAME }}
            **Environment:** Production
            **Commit:** ${{ github.sha }}

            ### Changes
            ${{ steps.changelog.outputs.changelog }}
          generate_release_notes: true

  # ──────────────────────────────────────────────
  # Pipeline Summary
  # ──────────────────────────────────────────────
  pipeline-summary:
    name: Pipeline Summary
    needs: [validate-secrets, build, security, deploy-qa, deploy-stage, deploy-prod, notify-qa, notify-stage, notify-prod, notify-failure, release-tag]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: forgeops-artifacts
        continue-on-error: true

      - name: Generate pipeline summary
        run: |
          if [ -f "./scripts/forgeops-summary.sh" ]; then
            chmod +x ./scripts/forgeops-summary.sh
            ./scripts/forgeops-summary.sh
          else
            echo "## Pipeline Summary" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "| Job | Status |" >> "$GITHUB_STEP_SUMMARY"
            echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
            echo "| Validate Secrets | ${{ needs.validate-secrets.result }} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Build | ${{ needs.build.result }} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Security | ${{ needs.security.result }} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Deploy QA | ${{ needs.deploy-qa.result }} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Deploy STAGE | ${{ needs.deploy-stage.result }} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Deploy PROD | ${{ needs.deploy-prod.result }} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Release Tag | ${{ needs.release-tag.result }} |" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**Pipeline Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload audit trail
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-audit-trail
          path: |
            forgeops-artifacts/
          retention-days: 90
        continue-on-error: true
