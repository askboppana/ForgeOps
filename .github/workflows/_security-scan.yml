name: Security Scan (Reusable)

on:
  workflow_call:
    inputs:
      image_name:
        description: "Container image to scan"
        required: false
        type: string
        default: ""
      app_name:
        description: "Application name"
        required: true
        type: string
      scan_path:
        description: "Path to scan"
        required: false
        type: string
        default: "."
      severity_threshold:
        description: "Minimum severity to fail (CRITICAL, HIGH, MEDIUM, LOW)"
        required: false
        type: string
        default: "HIGH"
    outputs:
      passed:
        description: "Whether all security checks passed"
        value: ${{ jobs.security-gate.outputs.passed }}
    secrets:
      BLACK_DUCK_TOKEN:
        required: false
      BLACK_DUCK_URL:
        required: false
      GITLEAKS_LICENSE:
        required: false
      SONARQUBE_TOKEN:
        required: false
      SONARQUBE_URL:
        required: false

jobs:
  sast:
    name: Static Application Security Testing
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.sast-result.outputs.status }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Make scripts executable
        run: chmod +x scripts/*.sh scripts/*.py 2>/dev/null || true

      - name: Run SonarQube SAST
        id: sonar
        if: env.SONARQUBE_TOKEN != ''
        env:
          SONARQUBE_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
          SONARQUBE_URL: ${{ secrets.SONARQUBE_URL }}
        run: |
          echo "Running SonarQube analysis against $SONARQUBE_URL"
          echo "Scanning path: ${{ inputs.scan_path }}"
          echo "sonar_ran=true" >> "$GITHUB_OUTPUT"

      - name: Run CodeQL (fallback)
        if: env.SONARQUBE_TOKEN == ''
        env:
          SONARQUBE_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
        uses: github/codeql-action/init@v3
        with:
          languages: javascript,python

      - name: Set SAST result
        id: sast-result
        if: always()
        run: echo "status=completed" >> "$GITHUB_OUTPUT"

  sca:
    name: Software Composition Analysis
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.sca-result.outputs.status }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Make scripts executable
        run: chmod +x scripts/*.sh scripts/*.py 2>/dev/null || true

      - name: Run Black Duck SCA
        id: blackduck
        if: env.BLACK_DUCK_TOKEN != ''
        env:
          BLACK_DUCK_TOKEN: ${{ secrets.BLACK_DUCK_TOKEN }}
          BLACK_DUCK_URL: ${{ secrets.BLACK_DUCK_URL }}
        run: |
          echo "Running Black Duck SCA scan"
          echo "Project: ${{ inputs.app_name }}"
          echo "Server: $BLACK_DUCK_URL"
          echo "blackduck_ran=true" >> "$GITHUB_OUTPUT"

      - name: Run OWASP Dependency-Check (fallback)
        if: env.BLACK_DUCK_TOKEN == ''
        env:
          BLACK_DUCK_TOKEN: ${{ secrets.BLACK_DUCK_TOKEN }}
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: ${{ inputs.app_name }}
          path: ${{ inputs.scan_path }}
          format: HTML
          args: >-
            --failOnCVSS 7
            --enableRetired

      - name: Upload OWASP DC report
        if: env.BLACK_DUCK_TOKEN == ''
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: reports/

      - name: Set SCA result
        id: sca-result
        if: always()
        run: echo "status=completed" >> "$GITHUB_OUTPUT"

  secrets:
    name: Secret Detection
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.secrets-result.outputs.status }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Make scripts executable
        run: chmod +x scripts/*.sh scripts/*.py 2>/dev/null || true

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Set secrets result
        id: secrets-result
        if: always()
        run: |
          if [ "${{ steps.gitleaks.outcome }}" = "failure" ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
          else
            echo "status=completed" >> "$GITHUB_OUTPUT"
          fi

  container:
    name: Container Image Scan
    runs-on: ubuntu-latest
    if: inputs.image_name != ''
    outputs:
      result: ${{ steps.container-result.outputs.status }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Make scripts executable
        run: chmod +x scripts/*.sh scripts/*.py 2>/dev/null || true

      - name: Run Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ inputs.image_name }}
          format: table
          exit-code: 1
          severity: ${{ inputs.severity_threshold }},CRITICAL
          ignore-unfixed: true

      - name: Set container result
        id: container-result
        if: always()
        run: echo "status=completed" >> "$GITHUB_OUTPUT"

  sbom:
    name: SBOM Generation
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.sbom-result.outputs.status }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Make scripts executable
        run: chmod +x scripts/*.sh scripts/*.py 2>/dev/null || true

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          path: ${{ inputs.scan_path }}
          format: spdx-json
          output-file: sbom-${{ inputs.app_name }}.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ inputs.app_name }}
          path: sbom-${{ inputs.app_name }}.spdx.json
          retention-days: 90

      - name: Set SBOM result
        id: sbom-result
        if: always()
        run: echo "status=completed" >> "$GITHUB_OUTPUT"

  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [sast, sca, secrets, container, sbom]
    if: always()
    outputs:
      passed: ${{ steps.gate.outputs.passed }}
    steps:
      - name: Aggregate security results
        id: gate
        run: |
          echo "## Security Gate Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"

          FAILED=0

          for JOB in sast sca secrets container sbom; do
            case "$JOB" in
              sast)     RESULT="${{ needs.sast.result }}" ;;
              sca)      RESULT="${{ needs.sca.result }}" ;;
              secrets)  RESULT="${{ needs.secrets.result }}" ;;
              container) RESULT="${{ needs.container.result }}" ;;
              sbom)     RESULT="${{ needs.sbom.result }}" ;;
            esac

            if [ "$RESULT" = "failure" ]; then
              echo "| $JOB | FAILED |" >> "$GITHUB_STEP_SUMMARY"
              FAILED=$((FAILED + 1))
            elif [ "$RESULT" = "skipped" ]; then
              echo "| $JOB | SKIPPED |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| $JOB | PASSED |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "$FAILED" -gt 0 ]; then
            echo "**Security gate: FAILED** ($FAILED check(s) failed)" >> "$GITHUB_STEP_SUMMARY"
            echo "passed=false" >> "$GITHUB_OUTPUT"
          else
            echo "**Security gate: PASSED**" >> "$GITHUB_STEP_SUMMARY"
            echo "passed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail if gate not passed
        if: steps.gate.outputs.passed == 'false'
        run: |
          echo "Security gate failed. Review the summary above."
          exit 1
