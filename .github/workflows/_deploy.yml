name: Deploy (Reusable)

on:
  workflow_call:
    inputs:
      app_name:
        description: "Application name"
        required: true
        type: string
      environment:
        description: "Target environment (int, qa, stage, prod)"
        required: true
        type: string
      version:
        description: "Version to deploy"
        required: true
        type: string
      deploy_method:
        description: "Deployment method (ssh, argocd, uipath)"
        required: false
        type: string
        default: "argocd"
      health_check_url:
        description: "URL for post-deploy health check"
        required: false
        type: string
        default: ""
      rollback_on_failure:
        description: "Automatically rollback on failure"
        required: false
        type: boolean
        default: true
    secrets:
      SSH_PRIVATE_KEY:
        required: false
      SSH_HOST:
        required: false
      SSH_USER:
        required: false
      ARGOCD_SERVER:
        required: false
      ARGOCD_TOKEN:
        required: false
      UIPATH_ORCHESTRATOR_URL:
        required: false
      UIPATH_TENANT:
        required: false
      UIPATH_CLIENT_ID:
        required: false
      UIPATH_CLIENT_SECRET:
        required: false
      JIRA_BASE_URL:
        required: false
      JIRA_USER_EMAIL:
        required: false
      JIRA_API_TOKEN:
        required: false
      CHERWELL_BASE_URL:
        required: false
      CHERWELL_API_KEY:
        required: false

jobs:
  deploy:
    name: Deploy ${{ inputs.app_name }} to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Make scripts executable
        run: chmod +x scripts/*.sh scripts/*.py 2>/dev/null || true

      - name: Map Jira transition
        id: jira-map
        run: |
          case "${{ inputs.environment }}" in
            int)   echo "transition=Ready for Unit Testing" >> "$GITHUB_OUTPUT" ;;
            qa)    echo "transition=Ready for SIT" >> "$GITHUB_OUTPUT" ;;
            stage) echo "transition=Ready for UAT" >> "$GITHUB_OUTPUT" ;;
            prod)  echo "transition=Deployed to Production" >> "$GITHUB_OUTPUT" ;;
            *)     echo "transition=Unknown" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Update Jira ticket
        if: env.JIRA_API_TOKEN != ''
        env:
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
        run: |
          echo "Transitioning Jira ticket to: ${{ steps.jira-map.outputs.transition }}"
          echo "Jira URL: $JIRA_BASE_URL"

      - name: Create Cherwell change record
        if: (inputs.environment == 'stage' || inputs.environment == 'prod') && env.CHERWELL_API_KEY != ''
        env:
          CHERWELL_API_KEY: ${{ secrets.CHERWELL_API_KEY }}
          CHERWELL_BASE_URL: ${{ secrets.CHERWELL_BASE_URL }}
        run: |
          echo "Creating Cherwell change record for ${{ inputs.environment }} deployment"
          echo "App: ${{ inputs.app_name }}, Version: ${{ inputs.version }}"
          echo "Cherwell URL: $CHERWELL_BASE_URL"

      - name: Deploy via SSH
        id: deploy-ssh
        if: inputs.deploy_method == 'ssh' && env.SSH_PRIVATE_KEY != ''
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          echo "Deploying ${{ inputs.app_name }}@${{ inputs.version }} via SSH"
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" \
            "cd /opt/${{ inputs.app_name }} && ./deploy.sh ${{ inputs.version }}"
          rm -f ~/.ssh/deploy_key

      - name: Deploy via ArgoCD
        id: deploy-argocd
        if: inputs.deploy_method == 'argocd' && env.ARGOCD_TOKEN != ''
        env:
          ARGOCD_TOKEN: ${{ secrets.ARGOCD_TOKEN }}
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
        run: |
          echo "Deploying ${{ inputs.app_name }}@${{ inputs.version }} via ArgoCD"
          curl -sSL -o /usr/local/bin/argocd \
            "https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64"
          chmod +x /usr/local/bin/argocd
          argocd app set "${{ inputs.app_name }}-${{ inputs.environment }}" \
            --parameter image.tag="${{ inputs.version }}" \
            --server "$ARGOCD_SERVER" \
            --auth-token "$ARGOCD_TOKEN" \
            --grpc-web
          argocd app sync "${{ inputs.app_name }}-${{ inputs.environment }}" \
            --server "$ARGOCD_SERVER" \
            --auth-token "$ARGOCD_TOKEN" \
            --grpc-web \
            --timeout 300

      - name: Deploy via UiPath
        id: deploy-uipath
        if: inputs.deploy_method == 'uipath' && env.UIPATH_CLIENT_ID != ''
        env:
          UIPATH_ORCHESTRATOR_URL: ${{ secrets.UIPATH_ORCHESTRATOR_URL }}
          UIPATH_TENANT: ${{ secrets.UIPATH_TENANT }}
          UIPATH_CLIENT_ID: ${{ secrets.UIPATH_CLIENT_ID }}
          UIPATH_CLIENT_SECRET: ${{ secrets.UIPATH_CLIENT_SECRET }}
        run: |
          echo "Deploying ${{ inputs.app_name }}@${{ inputs.version }} via UiPath Orchestrator"
          echo "Orchestrator: $UIPATH_ORCHESTRATOR_URL"
          echo "Tenant: $UIPATH_TENANT"

      - name: Graceful skip if no deploy credentials
        if: |
          (inputs.deploy_method == 'ssh' && env.SSH_PRIVATE_KEY == '') ||
          (inputs.deploy_method == 'argocd' && env.ARGOCD_TOKEN == '') ||
          (inputs.deploy_method == 'uipath' && env.UIPATH_CLIENT_ID == '')
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGOCD_TOKEN: ${{ secrets.ARGOCD_TOKEN }}
          UIPATH_CLIENT_ID: ${{ secrets.UIPATH_CLIENT_ID }}
        run: |
          echo "::warning::Deploy method '${{ inputs.deploy_method }}' selected but credentials not configured. Skipping deployment."

      - name: Health check
        id: health-check
        if: inputs.health_check_url != ''
        run: |
          echo "Running health check against ${{ inputs.health_check_url }}"
          RETRIES=5
          DELAY=10
          for i in $(seq 1 $RETRIES); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${{ inputs.health_check_url }}" || echo "000")
            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
              echo "Health check passed (HTTP $HTTP_CODE)"
              echo "healthy=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Attempt $i/$RETRIES: HTTP $HTTP_CODE - retrying in ${DELAY}s..."
            sleep "$DELAY"
          done
          echo "healthy=false" >> "$GITHUB_OUTPUT"
          echo "::error::Health check failed after $RETRIES attempts"
          exit 1

      - name: Rollback on failure
        if: failure() && inputs.rollback_on_failure && inputs.deploy_method == 'argocd' && env.ARGOCD_TOKEN != ''
        env:
          ARGOCD_TOKEN: ${{ secrets.ARGOCD_TOKEN }}
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
        run: |
          echo "::warning::Deployment failed - initiating rollback"
          argocd app rollback "${{ inputs.app_name }}-${{ inputs.environment }}" \
            --server "$ARGOCD_SERVER" \
            --auth-token "$ARGOCD_TOKEN" \
            --grpc-web
          echo "Rollback completed"

      - name: Update Cherwell on completion
        if: always() && (inputs.environment == 'stage' || inputs.environment == 'prod') && env.CHERWELL_API_KEY != ''
        env:
          CHERWELL_API_KEY: ${{ secrets.CHERWELL_API_KEY }}
          CHERWELL_BASE_URL: ${{ secrets.CHERWELL_BASE_URL }}
        run: |
          STATUS="${{ job.status }}"
          echo "Updating Cherwell change record: deployment $STATUS"

      - name: Deployment summary
        if: always()
        run: |
          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Application | ${{ inputs.app_name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | ${{ inputs.version }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | ${{ inputs.environment }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Method | ${{ inputs.deploy_method }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Jira Transition | ${{ steps.jira-map.outputs.transition }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Status | ${{ job.status }} |" >> "$GITHUB_STEP_SUMMARY"
