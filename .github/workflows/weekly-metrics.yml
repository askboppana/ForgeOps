name: Weekly DORA Metrics

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  metrics:
    name: Collect DORA Metrics
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Make scripts executable
        run: chmod +x scripts/*.sh scripts/*.py 2>/dev/null || true

      - name: Calculate DORA metrics
        id: dora
        run: |
          WEEK_AGO=$(date -u -d '7 days ago' +'%Y-%m-%dT%H:%M:%SZ' 2>/dev/null || date -u -v-7d +'%Y-%m-%dT%H:%M:%SZ')

          DEPLOY_COUNT=$(git log --since="$WEEK_AGO" --oneline --grep="deploy\|release" | wc -l | tr -d ' ')
          echo "deploy_frequency=$DEPLOY_COUNT" >> "$GITHUB_OUTPUT"

          TOTAL_COMMITS=$(git log --since="$WEEK_AGO" --oneline | wc -l | tr -d ' ')
          echo "total_commits=$TOTAL_COMMITS" >> "$GITHUB_OUTPUT"

          if [ "$TOTAL_COMMITS" -gt 0 ]; then
            AVG_LEAD=$(git log --since="$WEEK_AGO" --format="%ar" | head -1)
          else
            AVG_LEAD="N/A"
          fi
          echo "lead_time=$AVG_LEAD" >> "$GITHUB_OUTPUT"

          REVERTS=$(git log --since="$WEEK_AGO" --oneline --grep="revert\|rollback" | wc -l | tr -d ' ')
          echo "change_failure=$REVERTS" >> "$GITHUB_OUTPUT"

          echo "week_start=$WEEK_AGO" >> "$GITHUB_OUTPUT"

      - name: Create metrics issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Weekly DORA Metrics - ${new Date().toISOString().split('T')[0]}`;
            const body = `## DORA Metrics Report

            | Metric | Value |
            |--------|-------|
            | Deployment Frequency | ${{ steps.dora.outputs.deploy_frequency }} deploys |
            | Total Commits | ${{ steps.dora.outputs.total_commits }} |
            | Lead Time (latest) | ${{ steps.dora.outputs.lead_time }} |
            | Change Failure (reverts) | ${{ steps.dora.outputs.change_failure }} |
            | Period Start | ${{ steps.dora.outputs.week_start }} |

            *Auto-generated by weekly-metrics workflow*`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['metrics', 'automated']
            });
