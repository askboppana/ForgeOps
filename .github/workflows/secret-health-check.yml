name: Secret Health Check

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  validate:
    name: Validate Secrets
    uses: ./.github/workflows/_validate-secrets.yml
    secrets: inherit

  report:
    name: Report Missing Secrets
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.all_ok != 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set script permissions
        run: chmod +x scripts/*.sh scripts/*.py 2>/dev/null || true

      - name: Create issue for missing secrets
        uses: actions/github-script@v9
        with:
          script: |
            const missingCount = '${{ needs.validate.outputs.missing_count }}';
            const summary = `${{ needs.validate.outputs.summary }}`;
            const title = `Secret Health Check - ${missingCount} secrets MISSING - ${new Date().toISOString().split('T')[0]}`;

            const body = `## Secret Health Check Report

            ${summary}

            ### Action Required

            The above secrets marked as MISSING need to be configured in the repository settings.

            **Steps to fix:**
            1. Go to Repository Settings > Secrets and variables > Actions
            2. Add each MISSING secret listed above
            3. Re-run this workflow to verify

            ---
            Generated automatically by the secret-health-check workflow.`;

            // Check for existing open issues with the same label
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'secret-health',
              state: 'open'
            });

            if (existing.data.length > 0) {
              // Update existing issue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: body
              });
              console.log(`Updated existing issue #${existing.data[0].number}`);
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['secret-health', 'infrastructure']
              });
              console.log('Created new secret health issue');
            }

  all-ok:
    name: All Secrets OK
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.all_ok == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set script permissions
        run: chmod +x scripts/*.sh scripts/*.py 2>/dev/null || true

      - name: Report success
        run: |
          echo "All 18 secrets are configured. No action required."
          echo "## Secret Health Check: PASS" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "All 18 secrets are properly configured." >> "$GITHUB_STEP_SUMMARY"
