###############################################################################
# secret-health-check.yml - Scheduled secret health check
# Runs Monday at 9am UTC, calls _validate-secrets and creates issue if missing
###############################################################################
name: Secret Health Check

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  validate:
    name: Validate Secrets
    uses: ./.github/workflows/_validate-secrets.yml
    secrets: inherit

  report:
    name: Report Missing Secrets
    runs-on: ubuntu-latest
    needs: validate
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh scripts/*.py 2>/dev/null || true

      - name: Create issue if secrets missing
        if: needs.validate.outputs.all_configured != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          MISSING: ${{ needs.validate.outputs.missing_secrets }}
        run: |
          CHECK_DATE=$(date -u '+%Y-%m-%d')

          # Build missing secrets table
          MISSING_TABLE=""
          IFS=',' read -ra SECRETS <<< "$MISSING"
          for secret in "${SECRETS[@]}"; do
            secret=$(echo "$secret" | xargs)
            if [ -n "$secret" ]; then
              # Determine category
              case "$secret" in
                SONAR*)    CATEGORY="SAST" ;;
                BLACKDUCK*) CATEGORY="SCA" ;;
                JIRA*)     CATEGORY="ITSM" ;;
                CHERWELL*) CATEGORY="ITSM" ;;
                DEPLOY*)   CATEGORY="Deployment" ;;
                ARGOCD*)   CATEGORY="Deployment" ;;
                UIPATH*)   CATEGORY="Deployment" ;;
                SPLUNK*)   CATEGORY="Observability" ;;
                TEAMS*)    CATEGORY="Notifications" ;;
                SMTP*)     CATEGORY="Notifications" ;;
                *)         CATEGORY="Other" ;;
              esac
              MISSING_TABLE="${MISSING_TABLE}| \`${secret}\` | ${CATEGORY} | Not configured |\n"
            fi
          done

          # Check for existing open issue to avoid duplicates
          EXISTING=$(gh issue list \
            --label "secrets,automated" \
            --state open \
            --json number \
            --jq '.[0].number' \
            2>/dev/null || true)

          if [ -n "$EXISTING" ]; then
            echo "Updating existing issue #${EXISTING}"
            gh issue comment "$EXISTING" --body "## Updated Secret Health Check - ${CHECK_DATE}

          The following secrets are still missing:

          | Secret | Category | Status |
          |--------|----------|--------|
          $(echo -e "$MISSING_TABLE")

          *Checked automatically on ${CHECK_DATE}*"
          else
            echo "Creating new issue"
            gh issue create \
              --title "Missing Repository Secrets - ${CHECK_DATE}" \
              --label "secrets,automated" \
              --body "## Secret Health Check Failed

          The following secrets are not configured in this repository:

          | Secret | Category | Status |
          |--------|----------|--------|
          $(echo -e "$MISSING_TABLE")

          ### Impact
          Workflows that depend on these secrets will skip the corresponding integration steps gracefully, but full functionality requires all secrets to be configured.

          ### How to Fix
          1. Go to **Settings > Secrets and variables > Actions**
          2. Add the missing secrets listed above
          3. Re-run this workflow to verify

          ---
          *Generated automatically by Secret Health Check workflow on ${CHECK_DATE}*"
          fi

      - name: All secrets configured
        if: needs.validate.outputs.all_configured == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "All secrets are configured."

          # Close any existing open issues about missing secrets
          EXISTING=$(gh issue list \
            --label "secrets,automated" \
            --state open \
            --json number \
            --jq '.[].number' \
            2>/dev/null || true)

          for ISSUE_NUM in $EXISTING; do
            gh issue close "$ISSUE_NUM" \
              --comment "All secrets are now configured. Closing this issue automatically." \
              2>/dev/null || true
          done

      - name: Write summary
        if: always()
        run: |
          {
            echo "## Secret Health Check"
            echo ""
            if [ "${{ needs.validate.outputs.all_configured }}" = "true" ]; then
              echo "✅ All secrets are configured."
            else
              echo "⚠️ Missing secrets: ${{ needs.validate.outputs.missing_secrets }}"
              echo ""
              echo "A GitHub issue has been created/updated with details."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
