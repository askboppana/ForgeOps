###############################################################################
# deploy-dashboard.yml - Deploy dashboard to GitHub Pages
# Triggered on push to main (dashboard/** paths) and workflow_dispatch
###############################################################################
name: Deploy Dashboard

on:
  push:
    branches:
      - main
    paths:
      - "dashboard/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Dashboard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh scripts/*.py 2>/dev/null || true

      - name: Validate dashboard files
        run: |
          if [ ! -d "dashboard" ]; then
            echo "::error::dashboard/ directory not found"
            exit 1
          fi

          if [ ! -f "dashboard/index.html" ]; then
            echo "::warning::dashboard/index.html not found, creating placeholder"
            cat > dashboard/index.html << 'HTML_EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>ForgeOps Dashboard</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 40px; background: #0d1117; color: #c9d1d9; }
              h1 { color: #58a6ff; }
              .status { padding: 20px; border-radius: 6px; border: 1px solid #30363d; margin: 10px 0; }
            </style>
          </head>
          <body>
            <h1>ForgeOps Dashboard</h1>
            <div class="status">
              <p>Dashboard is being set up. Content will appear after the first pipeline run.</p>
            </div>
          </body>
          </html>
          HTML_EOF
          fi

          echo "Dashboard files:"
          ls -la dashboard/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Write summary
        if: always()
        run: |
          {
            echo "## Dashboard Deployment"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| **URL** | ${{ steps.deployment.outputs.page_url }} |"
            echo "| **Status** | ${{ job.status }} |"
            echo "| **Triggered by** | ${{ github.event_name }} |"
            echo "| **Commit** | ${{ github.sha }} |"
          } >> "$GITHUB_STEP_SUMMARY"
