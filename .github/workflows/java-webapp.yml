##############################################################################
# java-webapp.yml - CI/CD pipeline for java-webapp-api
##############################################################################
name: Java WebApp API Pipeline

on:
  push:
    branches:
      - int
      - qa
      - stage
      - main
      - "feature/*"
      - "hotfix/*"
  pull_request:
    branches:
      - int
      - qa
      - stage
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Target deployment environment"
        required: true
        type: choice
        options:
          - int
          - qa
          - stage
          - prod

env:
  APP_NAME: java-webapp-api
  JAVA_VERSION: "17"
  JAVA_DISTRIBUTION: temurin

permissions:
  contents: write
  checks: write
  actions: read
  packages: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# JOBS
# ---------------------------------------------------------------------------
jobs:
  # -------------------------------------------------------------------------
  # Validate Secrets
  # -------------------------------------------------------------------------
  validate-secrets:
    name: Validate Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        run: |
          missing=()
          if [ -z "${{ secrets.DOCKER_REGISTRY }}" ]; then missing+=("DOCKER_REGISTRY"); fi
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then missing+=("DOCKER_USERNAME"); fi
          if [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then missing+=("DOCKER_PASSWORD"); fi
          if [ -z "${{ secrets.DEPLOY_TOKEN }}" ]; then missing+=("DEPLOY_TOKEN"); fi
          if [ -z "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then missing+=("SLACK_WEBHOOK_URL"); fi
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            exit 1
          fi
          echo "All required secrets are configured."

  # -------------------------------------------------------------------------
  # Build
  # -------------------------------------------------------------------------
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: validate-secrets
    outputs:
      version: ${{ steps.version.outputs.version }}
      image_tag: ${{ steps.version.outputs.image_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Run tests
        run: ./gradlew test

      - name: Generate JaCoCo coverage report
        run: ./gradlew jacocoTestReport

      - name: Publish test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: JUnit Test Results
          path: "**/build/test-results/test/*.xml"
          reporter: java-junit

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage
          path: "**/build/reports/jacoco/"
          retention-days: 14

      - name: Compute version
        id: version
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          BRANCH="${GITHUB_REF_NAME//\//-}"
          VERSION="${BRANCH}-${SHORT_SHA}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${{ secrets.DOCKER_REGISTRY }}/${{ env.APP_NAME }}:${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and push container image
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login "${{ secrets.DOCKER_REGISTRY }}" \
            -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker build -t "${{ steps.version.outputs.image_tag }}" .
          docker push "${{ steps.version.outputs.image_tag }}"

  # -------------------------------------------------------------------------
  # Security Scan
  # -------------------------------------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build.outputs.image_tag }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

      - name: Run OWASP dependency check
        run: ./gradlew dependencyCheckAnalyze || true

  # -------------------------------------------------------------------------
  # Deploy - INT
  # -------------------------------------------------------------------------
  deploy-int:
    name: Deploy to INT
    runs-on: ubuntu-latest
    needs: [build, security]
    if: >-
      github.ref == 'refs/heads/int'
      || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'int')
    environment:
      name: int
      url: https://int.${{ env.APP_NAME }}.example.com
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to INT
        run: |
          echo "Deploying ${{ env.APP_NAME }} version ${{ needs.build.outputs.version }} to INT"
          # Placeholder for actual deployment commands (Helm, kubectl, etc.)

  notify-int:
    name: Notify - INT Deployment
    runs-on: ubuntu-latest
    needs: deploy-int
    if: always()
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "${{ env.APP_NAME }} deployed to INT - Status: ${{ needs.deploy-int.result }} - Version: ${{ needs.build.outputs.version || 'N/A' }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # -------------------------------------------------------------------------
  # Deploy - QA
  # -------------------------------------------------------------------------
  deploy-qa:
    name: Deploy to QA
    runs-on: ubuntu-latest
    needs: [build, security]
    if: >-
      github.ref == 'refs/heads/qa'
      || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'qa')
    environment:
      name: qa
      url: https://qa.${{ env.APP_NAME }}.example.com
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to QA
        run: |
          echo "Deploying ${{ env.APP_NAME }} version ${{ needs.build.outputs.version }} to QA"

  notify-qa:
    name: Notify - QA Deployment
    runs-on: ubuntu-latest
    needs: deploy-qa
    if: always()
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "${{ env.APP_NAME }} deployed to QA - Status: ${{ needs.deploy-qa.result }} - Version: ${{ needs.build.outputs.version || 'N/A' }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # -------------------------------------------------------------------------
  # Deploy - STAGE
  # -------------------------------------------------------------------------
  deploy-stage:
    name: Deploy to STAGE
    runs-on: ubuntu-latest
    needs: [build, security]
    if: >-
      github.ref == 'refs/heads/stage'
      || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'stage')
    environment:
      name: stage
      url: https://stage.${{ env.APP_NAME }}.example.com
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to STAGE
        run: |
          echo "Deploying ${{ env.APP_NAME }} version ${{ needs.build.outputs.version }} to STAGE"

  notify-stage:
    name: Notify - STAGE Deployment
    runs-on: ubuntu-latest
    needs: deploy-stage
    if: always()
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "${{ env.APP_NAME }} deployed to STAGE - Status: ${{ needs.deploy-stage.result }} - Version: ${{ needs.build.outputs.version || 'N/A' }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # -------------------------------------------------------------------------
  # Deploy - PROD
  # -------------------------------------------------------------------------
  deploy-prod:
    name: Deploy to PROD
    runs-on: ubuntu-latest
    needs: [build, security]
    if: >-
      github.ref == 'refs/heads/main'
      || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod')
    environment:
      name: prod
      url: https://${{ env.APP_NAME }}.example.com
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to PROD
        run: |
          echo "Deploying ${{ env.APP_NAME }} version ${{ needs.build.outputs.version }} to PROD"

  notify-prod:
    name: Notify - PROD Deployment
    runs-on: ubuntu-latest
    needs: deploy-prod
    if: always()
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "${{ env.APP_NAME }} deployed to PROD - Status: ${{ needs.deploy-prod.result }} - Version: ${{ needs.build.outputs.version || 'N/A' }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # -------------------------------------------------------------------------
  # Notify Failure
  # -------------------------------------------------------------------------
  notify-failure:
    name: Notify - Pipeline Failure
    runs-on: ubuntu-latest
    needs: [validate-secrets, build, security]
    if: failure()
    steps:
      - name: Send failure notification
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "PIPELINE FAILED: ${{ env.APP_NAME }} on branch ${{ github.ref_name }} - Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # -------------------------------------------------------------------------
  # Release Tag (main branch only)
  # -------------------------------------------------------------------------
  release-tag:
    name: Create Release Tag
    runs-on: ubuntu-latest
    needs: deploy-prod
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          else
            CHANGELOG=$(git log "${PREVIOUS_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          fi
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Determine next version tag
        id: tag
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 --match "v*" 2>/dev/null || echo "v0.0.0")
          MAJOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f3)
          PATCH=$((PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: "${{ env.APP_NAME }} ${{ steps.tag.outputs.new_tag }}"
          body: |
            ## Release ${{ steps.tag.outputs.new_tag }}

            ### Changelog
            ${{ steps.changelog.outputs.changelog }}

            ### Artifacts
            - Image: `${{ needs.build.outputs.image_tag }}`
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # -------------------------------------------------------------------------
  # Pipeline Summary
  # -------------------------------------------------------------------------
  pipeline-summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - validate-secrets
      - build
      - security
      - deploy-int
      - deploy-qa
      - deploy-stage
      - deploy-prod
      - release-tag
    steps:
      - name: Generate pipeline summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'SUMMARY'
          ## Pipeline Summary - java-webapp-api

          | Stage            | Status |
          |------------------|--------|
          | Validate Secrets | ${{ needs.validate-secrets.result }} |
          | Build & Test     | ${{ needs.build.result }} |
          | Security Scan    | ${{ needs.security.result }} |
          | Deploy INT       | ${{ needs.deploy-int.result }} |
          | Deploy QA        | ${{ needs.deploy-qa.result }} |
          | Deploy STAGE     | ${{ needs.deploy-stage.result }} |
          | Deploy PROD      | ${{ needs.deploy-prod.result }} |
          | Release Tag      | ${{ needs.release-tag.result }} |

          **Branch:** `${{ github.ref_name }}`
          **Commit:** `${{ github.sha }}`
          **Triggered by:** `${{ github.actor }}`
          **Run:** [View](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          SUMMARY
