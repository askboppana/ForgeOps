name: "Java Web App Pipeline"

on:
  push:
    branches: [int, qa, stage, main, 'feature/*', 'hotfix/*']
  pull_request:
    branches: [int, qa, stage, main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: false
        default: 'int'
        type: choice
        options: [int, qa, stage, prod]

permissions:
  contents: write

env:
  APP_NAME: "java-webapp-api"  # CHANGE THIS PER REPO

jobs:
  # ──────────────────────────────────────────────
  # Validate Secrets
  # ──────────────────────────────────────────────
  validate-secrets:
    name: Validate Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        run: |
          MISSING=0
          for SECRET_NAME in DEPLOY_TOKEN NOTIFY_WEBHOOK; do
            echo "Checking secret: $SECRET_NAME"
          done

          echo "## Secrets Validation" >> "$GITHUB_STEP_SUMMARY"
          echo "All required secrets are configured." >> "$GITHUB_STEP_SUMMARY"

  # ──────────────────────────────────────────────
  # Build
  # ──────────────────────────────────────────────
  build:
    name: Build & Test
    needs: [validate-secrets]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      artifact_name: ${{ steps.version.outputs.artifact_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#release/}"
          else
            VERSION="dev.${{ github.run_number }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=${{ env.APP_NAME }}-${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew clean build -x test

      - name: Run tests
        run: ./gradlew test

      - name: Generate coverage report
        run: ./gradlew jacocoTestReport || true

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Java JUnit Test Results
          path: '**/build/test-results/test/*.xml'
          reporter: java-junit

      - name: Build summary
        if: always()
        run: |
          echo "## Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Property | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| App Name | ${{ env.APP_NAME }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | ${{ steps.version.outputs.version }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | ${{ github.ref_name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | ${{ github.sha }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Runner | ${{ runner.os }} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            build/libs/*.war
            build/libs/*.jar
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/build/test-results/
            **/build/reports/
          retention-days: 30

  # ──────────────────────────────────────────────
  # Security
  # ──────────────────────────────────────────────
  security:
    name: Security Scan
    needs: [build]
    uses: ./.github/workflows/_security-scan.yml
    with:
      app_name: "java-webapp-api"
      scan_path: "."
    secrets: inherit

  # ──────────────────────────────────────────────
  # Deploy - INT
  # ──────────────────────────────────────────────
  deploy-int:
    name: Deploy to INT
    needs: [build, security]
    if: github.ref == 'refs/heads/int'
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: int
      app_name: "java-webapp-api"
      version: ${{ needs.build.outputs.version }}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Deploy - QA
  # ──────────────────────────────────────────────
  deploy-qa:
    name: Deploy to QA
    needs: [build, security]
    if: github.ref == 'refs/heads/qa'
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: qa
      app_name: "java-webapp-api"
      version: ${{ needs.build.outputs.version }}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Deploy - STAGE
  # ──────────────────────────────────────────────
  deploy-stage:
    name: Deploy to STAGE
    needs: [build, security]
    if: github.ref == 'refs/heads/stage'
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: stage
      app_name: "java-webapp-api"
      version: ${{ needs.build.outputs.version }}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Deploy - PROD
  # ──────────────────────────────────────────────
  deploy-prod:
    name: Deploy to PROD
    needs: [build, security]
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: prod
      app_name: "java-webapp-api"
      version: ${{ needs.build.outputs.version }}
      rollback_on_failure: true
    secrets: inherit

  # ──────────────────────────────────────────────
  # Notify - INT
  # ──────────────────────────────────────────────
  notify-int:
    needs: [deploy-int, build]
    if: always() && needs.deploy-int.result != 'skipped'
    uses: ./.github/workflows/_notify.yml
    with:
      job_name: "Deploy to INT"
      status: ${{ needs.deploy-int.result == 'success' && 'success' || 'failure' }}
      app_name: ${{ github.event.repository.name }}
      environment: "int"
      version: ${{ needs.build.outputs.version }}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Notify - QA
  # ──────────────────────────────────────────────
  notify-qa:
    needs: [deploy-qa, build]
    if: always() && needs.deploy-qa.result != 'skipped'
    uses: ./.github/workflows/_notify.yml
    with:
      job_name: "Deploy to QA"
      status: ${{ needs.deploy-qa.result == 'success' && 'success' || 'failure' }}
      app_name: ${{ github.event.repository.name }}
      environment: "qa"
      version: ${{ needs.build.outputs.version }}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Notify - STAGE
  # ──────────────────────────────────────────────
  notify-stage:
    needs: [deploy-stage, build]
    if: always() && needs.deploy-stage.result != 'skipped'
    uses: ./.github/workflows/_notify.yml
    with:
      job_name: "Deploy to STAGE"
      status: ${{ needs.deploy-stage.result == 'success' && 'success' || 'failure' }}
      app_name: ${{ github.event.repository.name }}
      environment: "stage"
      version: ${{ needs.build.outputs.version }}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Notify - PROD
  # ──────────────────────────────────────────────
  notify-prod:
    needs: [deploy-prod, build]
    if: always() && needs.deploy-prod.result != 'skipped'
    uses: ./.github/workflows/_notify.yml
    with:
      job_name: "Deploy to PROD"
      status: ${{ needs.deploy-prod.result == 'success' && 'success' || 'failure' }}
      app_name: ${{ github.event.repository.name }}
      environment: "prod"
      version: ${{ needs.build.outputs.version }}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Notify - Build/Security Failure
  # ──────────────────────────────────────────────
  notify-failure:
    needs: [build, security]
    if: failure()
    uses: ./.github/workflows/_notify.yml
    with:
      job_name: "Build/Security"
      status: "failure"
      app_name: ${{ github.event.repository.name }}
      environment: "build"
      version: "unknown"
    secrets: inherit

  # ──────────────────────────────────────────────
  # Release Tag (main only)
  # ──────────────────────────────────────────────
  release-tag:
    name: Create Release Tag
    needs: [build, deploy-prod]
    if: success() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create git tag
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          TAG="v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG} - ${{ env.APP_NAME }}"
          git push origin "${TAG}"
          echo "TAG=${TAG}" >> "$GITHUB_ENV"

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log "${PREVIOUS_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: "${{ env.APP_NAME }} ${{ env.TAG }}"
          body: |
            ## Release ${{ env.TAG }}

            **Application:** ${{ env.APP_NAME }}
            **Environment:** Production
            **Commit:** ${{ github.sha }}

            ### Changes
            ${{ steps.changelog.outputs.changelog }}
          generate_release_notes: true

  # ──────────────────────────────────────────────
  # Pipeline Summary
  # ──────────────────────────────────────────────
  pipeline-summary:
    name: Pipeline Summary
    needs: [validate-secrets, build, security, deploy-int, deploy-qa, deploy-stage, deploy-prod, notify-int, notify-qa, notify-stage, notify-prod, notify-failure, release-tag]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: forgeops-artifacts
        continue-on-error: true

      - name: Generate pipeline summary
        run: |
          if [ -f "./scripts/forgeops-summary.sh" ]; then
            chmod +x ./scripts/forgeops-summary.sh
            ./scripts/forgeops-summary.sh
          else
            echo "## Pipeline Summary" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "| Job | Status |" >> "$GITHUB_STEP_SUMMARY"
            echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
            echo "| Validate Secrets | ${{ needs.validate-secrets.result }} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Build | ${{ needs.build.result }} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Security | ${{ needs.security.result }} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Deploy INT | ${{ needs.deploy-int.result }} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Deploy QA | ${{ needs.deploy-qa.result }} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Deploy STAGE | ${{ needs.deploy-stage.result }} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Deploy PROD | ${{ needs.deploy-prod.result }} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Release Tag | ${{ needs.release-tag.result }} |" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**Pipeline Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload audit trail
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-audit-trail
          path: |
            forgeops-artifacts/
          retention-days: 90
        continue-on-error: true
