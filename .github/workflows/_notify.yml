name: Notify (Reusable)

on:
  workflow_call:
    inputs:
      job_name:
        description: "Name of the job that triggered notification"
        required: true
        type: string
      status:
        description: "Job status (success, failure, cancelled)"
        required: true
        type: string
      app_name:
        description: "Application name"
        required: true
        type: string
      environment:
        description: "Target environment"
        required: false
        type: string
        default: ""
      version:
        description: "Application version"
        required: false
        type: string
        default: ""
    secrets:
      MAIL_SERVER:
        required: false
      MAIL_PORT:
        required: false
      MAIL_USERNAME:
        required: false
      MAIL_PASSWORD:
        required: false
      MAIL_TO:
        required: false
      TEAMS_WEBHOOK_URL:
        required: false
      SPLUNK_HEC_URL:
        required: false
      SPLUNK_HEC_TOKEN:
        required: false

jobs:
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    steps:
      - name: Send email notification
        if: env.MAIL_USERNAME != ''
        uses: dawidd6/action-send-mail@v16
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[${{ inputs.status }}] ${{ inputs.app_name }} - ${{ inputs.job_name }}"
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            Workflow: ${{ inputs.job_name }}
            Application: ${{ inputs.app_name }}
            Environment: ${{ inputs.environment }}
            Version: ${{ inputs.version }}
            Status: ${{ inputs.status }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Send Teams notification
        if: env.TEAMS_WEBHOOK_URL != ''
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          STATUS_COLOR="default"
          if [ "${{ inputs.status }}" = "success" ]; then STATUS_COLOR="good"; fi
          if [ "${{ inputs.status }}" = "failure" ]; then STATUS_COLOR="attention"; fi

          cat <<CARD > /tmp/teams-card.json
          {
            "type": "message",
            "attachments": [{
              "contentType": "application/vnd.microsoft.card.adaptive",
              "content": {
                "type": "AdaptiveCard",
                "version": "1.4",
                "body": [
                  {
                    "type": "TextBlock",
                    "size": "Medium",
                    "weight": "Bolder",
                    "text": "${{ inputs.app_name }} - ${{ inputs.job_name }}",
                    "style": "heading"
                  },
                  {
                    "type": "FactSet",
                    "facts": [
                      { "title": "Status", "value": "${{ inputs.status }}" },
                      { "title": "Environment", "value": "${{ inputs.environment }}" },
                      { "title": "Version", "value": "${{ inputs.version }}" }
                    ]
                  }
                ],
                "actions": [
                  {
                    "type": "Action.OpenUrl",
                    "title": "View Run",
                    "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                ]
              }
            }]
          }
          CARD

          curl -sSf -H "Content-Type: application/json" -d @/tmp/teams-card.json "$TEAMS_WEBHOOK_URL"

      - name: Send Splunk event
        if: env.SPLUNK_HEC_TOKEN != ''
        env:
          SPLUNK_HEC_URL: ${{ secrets.SPLUNK_HEC_URL }}
          SPLUNK_HEC_TOKEN: ${{ secrets.SPLUNK_HEC_TOKEN }}
        run: |
          curl -sSf -k \
            -H "Authorization: Splunk $SPLUNK_HEC_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"event\": {
                \"job_name\": \"${{ inputs.job_name }}\",
                \"status\": \"${{ inputs.status }}\",
                \"app_name\": \"${{ inputs.app_name }}\",
                \"environment\": \"${{ inputs.environment }}\",
                \"version\": \"${{ inputs.version }}\",
                \"repository\": \"${{ github.repository }}\",
                \"run_id\": \"${{ github.run_id }}\",
                \"ref\": \"${{ github.ref }}\"
              },
              \"sourcetype\": \"github:actions\"
            }" \
            "$SPLUNK_HEC_URL/services/collector/event"
