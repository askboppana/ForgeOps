name: Rollback

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: "Application name to rollback"
        required: true
        type: string
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - int
          - qa
          - stage
          - prod

jobs:
  rollback:
    name: Rollback ${{ inputs.app_name }} in ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Make scripts executable
        run: chmod +x scripts/*.sh scripts/*.py 2>/dev/null || true

      - name: Log rollback info
        run: |
          echo "## Rollback Initiated" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Application | ${{ inputs.app_name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | ${{ inputs.environment }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Triggered by | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Timestamp | $(date -u +'%Y-%m-%dT%H:%M:%SZ') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Run ID | ${{ github.run_id }} |" >> "$GITHUB_STEP_SUMMARY"
          echo ""
          echo "Rollback request logged for ${{ inputs.app_name }} in ${{ inputs.environment }}"
          echo "Initiated by: ${{ github.actor }}"
