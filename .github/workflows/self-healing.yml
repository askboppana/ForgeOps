name: Self-Healing Checks

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  self-heal:
    name: Self-Healing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ github.token }}

      - name: Make scripts executable
        run: chmod +x scripts/*.sh scripts/*.py 2>/dev/null || true

      - name: Validate YAML files
        id: yaml-check
        run: |
          FIXED=0
          pip install --quiet yamllint
          for f in $(find .github/workflows -name '*.yml' -o -name '*.yaml'); do
            if ! yamllint -d relaxed "$f" > /dev/null 2>&1; then
              echo "::warning::YAML lint issue in $f"
            fi
          done
          echo "yaml_fixed=$FIXED" >> "$GITHUB_OUTPUT"

      - name: Fix script permissions
        id: perms-check
        run: |
          FIXED=0
          if [ -d scripts ]; then
            for f in scripts/*.sh scripts/*.py; do
              [ -f "$f" ] || continue
              if [ ! -x "$f" ]; then
                chmod +x "$f"
                FIXED=$((FIXED + 1))
                echo "Fixed permissions on $f"
              fi
            done
          fi
          echo "perms_fixed=$FIXED" >> "$GITHUB_OUTPUT"

      - name: Check dependabot config
        id: dependabot-check
        run: |
          if [ ! -f .github/dependabot.yml ]; then
            echo "Creating default dependabot.yml"
            mkdir -p .github
            cat > .github/dependabot.yml << 'DEPBOT'
          version: 2
          updates:
            - package-ecosystem: "github-actions"
              directory: "/"
              schedule:
                interval: "weekly"
          DEPBOT
            echo "dependabot_created=true" >> "$GITHUB_OUTPUT"
          else
            echo "dependabot_created=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check dashboard accessibility
        id: dashboard-check
        run: |
          if [ -d dashboard ]; then
            if [ -f dashboard/index.html ]; then
              echo "Dashboard index.html found"
              echo "dashboard_ok=true" >> "$GITHUB_OUTPUT"
            else
              echo "::warning::dashboard directory exists but index.html is missing"
              echo "dashboard_ok=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "No dashboard directory found (optional)"
            echo "dashboard_ok=skip" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit auto-fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: self-healing auto-fix [skip ci]"
            git push
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Self-Healing Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| YAML validation | Checked |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Script permissions fixed | ${{ steps.perms-check.outputs.perms_fixed }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dependabot created | ${{ steps.dependabot-check.outputs.dependabot_created }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dashboard accessible | ${{ steps.dashboard-check.outputs.dashboard_ok }} |" >> "$GITHUB_STEP_SUMMARY"
