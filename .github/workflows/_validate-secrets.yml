###############################################################################
# _validate-secrets.yml - Reusable secret validation workflow
# Checks all expected secrets and writes a status table to GITHUB_STEP_SUMMARY
###############################################################################
name: Validate Secrets

on:
  workflow_call:
    secrets:
      SONAR_HOST_URL:
        required: false
      SONAR_TOKEN:
        required: false
      BLACKDUCK_URL:
        required: false
      BLACKDUCK_TOKEN:
        required: false
      JIRA_URL:
        required: false
      JIRA_TOKEN:
        required: false
      JIRA_PROJECT:
        required: false
      CHERWELL_URL:
        required: false
      CHERWELL_TOKEN:
        required: false
      DEPLOY_SSH_KEY:
        required: false
      DEPLOY_SSH_USER:
        required: false
      DEPLOY_SSH_HOST:
        required: false
      ARGOCD_SERVER:
        required: false
      ARGOCD_TOKEN:
        required: false
      UIPATH_URL:
        required: false
      UIPATH_TOKEN:
        required: false
      SPLUNK_HEC_URL:
        required: false
      SPLUNK_HEC_TOKEN:
        required: false
      SPLUNK_INDEX:
        required: false
      TEAMS_WEBHOOK:
        required: false
      SMTP_SERVER:
        required: false
      SMTP_PORT:
        required: false
      SMTP_USERNAME:
        required: false
      SMTP_PASSWORD:
        required: false
    outputs:
      all_configured:
        description: "Whether all secrets are configured"
        value: ${{ jobs.validate.outputs.all_configured }}
      missing_secrets:
        description: "Comma-separated list of missing secrets"
        value: ${{ jobs.validate.outputs.missing_secrets }}

jobs:
  validate:
    name: Validate Secrets
    runs-on: ubuntu-latest
    outputs:
      all_configured: ${{ steps.check.outputs.all_configured }}
      missing_secrets: ${{ steps.check.outputs.missing_secrets }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh scripts/*.py 2>/dev/null || true

      - name: Check all secrets
        id: check
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          BLACKDUCK_URL: ${{ secrets.BLACKDUCK_URL }}
          BLACKDUCK_TOKEN: ${{ secrets.BLACKDUCK_TOKEN }}
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          JIRA_PROJECT: ${{ secrets.JIRA_PROJECT }}
          CHERWELL_URL: ${{ secrets.CHERWELL_URL }}
          CHERWELL_TOKEN: ${{ secrets.CHERWELL_TOKEN }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_TOKEN: ${{ secrets.ARGOCD_TOKEN }}
          UIPATH_URL: ${{ secrets.UIPATH_URL }}
          UIPATH_TOKEN: ${{ secrets.UIPATH_TOKEN }}
          SPLUNK_HEC_URL: ${{ secrets.SPLUNK_HEC_URL }}
          SPLUNK_HEC_TOKEN: ${{ secrets.SPLUNK_HEC_TOKEN }}
          SPLUNK_INDEX: ${{ secrets.SPLUNK_INDEX }}
          TEAMS_WEBHOOK: ${{ secrets.TEAMS_WEBHOOK }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          MISSING=""
          CONFIGURED_COUNT=0
          MISSING_COUNT=0
          TOTAL=0

          # Function to check a secret and build table row
          check_secret() {
            local NAME="$1"
            local VALUE="$2"
            local CATEGORY="$3"
            TOTAL=$((TOTAL + 1))

            if [ -n "$VALUE" ]; then
              CONFIGURED_COUNT=$((CONFIGURED_COUNT + 1))
              echo "| ${NAME} | ${CATEGORY} | ✅ Configured |"
            else
              MISSING_COUNT=$((MISSING_COUNT + 1))
              MISSING="${MISSING}${MISSING:+,}${NAME}"
              echo "| ${NAME} | ${CATEGORY} | ❌ Missing |"
            fi
          }

          {
            echo "## Secret Health Check"
            echo ""
            echo "| Secret | Category | Status |"
            echo "|--------|----------|--------|"

            # SAST
            check_secret "SONAR_HOST_URL" "$SONAR_HOST_URL" "SAST"
            check_secret "SONAR_TOKEN" "$SONAR_TOKEN" "SAST"

            # SCA
            check_secret "BLACKDUCK_URL" "$BLACKDUCK_URL" "SCA"
            check_secret "BLACKDUCK_TOKEN" "$BLACKDUCK_TOKEN" "SCA"

            # Jira
            check_secret "JIRA_URL" "$JIRA_URL" "ITSM"
            check_secret "JIRA_TOKEN" "$JIRA_TOKEN" "ITSM"
            check_secret "JIRA_PROJECT" "$JIRA_PROJECT" "ITSM"

            # Cherwell
            check_secret "CHERWELL_URL" "$CHERWELL_URL" "ITSM"
            check_secret "CHERWELL_TOKEN" "$CHERWELL_TOKEN" "ITSM"

            # SSH Deploy
            check_secret "DEPLOY_SSH_KEY" "$DEPLOY_SSH_KEY" "Deploy"
            check_secret "DEPLOY_SSH_USER" "$DEPLOY_SSH_USER" "Deploy"
            check_secret "DEPLOY_SSH_HOST" "$DEPLOY_SSH_HOST" "Deploy"

            # ArgoCD
            check_secret "ARGOCD_SERVER" "$ARGOCD_SERVER" "Deploy"
            check_secret "ARGOCD_TOKEN" "$ARGOCD_TOKEN" "Deploy"

            # UiPath
            check_secret "UIPATH_URL" "$UIPATH_URL" "Deploy"
            check_secret "UIPATH_TOKEN" "$UIPATH_TOKEN" "Deploy"

            # Observability
            check_secret "SPLUNK_HEC_URL" "$SPLUNK_HEC_URL" "Observability"
            check_secret "SPLUNK_HEC_TOKEN" "$SPLUNK_HEC_TOKEN" "Observability"
            check_secret "SPLUNK_INDEX" "$SPLUNK_INDEX" "Observability"

            # Notifications
            check_secret "TEAMS_WEBHOOK" "$TEAMS_WEBHOOK" "Notifications"
            check_secret "SMTP_SERVER" "$SMTP_SERVER" "Notifications"
            check_secret "SMTP_PORT" "$SMTP_PORT" "Notifications"
            check_secret "SMTP_USERNAME" "$SMTP_USERNAME" "Notifications"
            check_secret "SMTP_PASSWORD" "$SMTP_PASSWORD" "Notifications"

            echo ""
            echo "### Summary"
            echo "- **Configured:** ${CONFIGURED_COUNT}/${TOTAL}"
            echo "- **Missing:** ${MISSING_COUNT}/${TOTAL}"

            if [ "$MISSING_COUNT" -eq 0 ]; then
              echo ""
              echo "✅ All secrets are configured."
            else
              echo ""
              echo "⚠️ Some secrets are missing. Features depending on them will be skipped gracefully."
              echo ""
              echo "**Missing:** ${MISSING}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$MISSING_COUNT" -eq 0 ]; then
            echo "all_configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "all_configured=false" >> "$GITHUB_OUTPUT"
          fi
          echo "missing_secrets=${MISSING}" >> "$GITHUB_OUTPUT"
