name: ForgeOps Informatica CI/CD

on:
  push:
    branches: ['feature/*', 'hotfix/*']
  pull_request:
    branches: [int, qa, stage, main]
    types: [closed]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [int, qa, stage, prod]

permissions:
  contents: write
  checks: write

env:
  APP_NAME: "informatica-etl"

jobs:
  build:
    name: Build and Validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate XML Files
        run: |
          echo "Validating Informatica XML mapping files for ${{ env.APP_NAME }}"
          ERRORS=0
          for f in $(find . -name "*.xml" -not -path "./.git/*"); do
            python3 -c "
          import xml.etree.ElementTree as ET
          try:
              ET.parse('$f')
              print('VALID: $f')
          except ET.ParseError as e:
              print('INVALID: $f -- ' + str(e))
              exit(1)
          " || ERRORS=$((ERRORS + 1))
          done
          if [ "$ERRORS" -gt 0 ]; then
            echo "Found $ERRORS invalid XML files"
            exit 1
          fi
          echo "All XML files are valid"

      - name: Check Mapping References
        run: |
          echo "Checking Informatica mapping references"
          if ls *.xml 1>/dev/null 2>&1 || ls mappings/*.xml 1>/dev/null 2>&1; then
            echo "Validating source/target references in mapping files"
            grep -rn "SOURCE\|TARGET\|TRANSFORMATION" --include="*.xml" . | head -50 || echo "No mapping elements found"
          else
            echo "No mapping XML files found in root or mappings/ directory"
          fi

  test:
    name: Validate Workflow References
    needs: [build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Workflow References
        run: |
          echo "Validating Informatica workflow references for ${{ env.APP_NAME }}"
          if ls workflows/*.xml 1>/dev/null 2>&1; then
            for wf in workflows/*.xml; do
              echo "Checking workflow: $wf"
              python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('$wf')
          root = tree.getroot()
          for task in root.iter():
              if 'MAPPING' in task.tag.upper() or task.get('MAPPINGNAME'):
                  mapping = task.get('MAPPINGNAME', task.get('NAME', 'unknown'))
                  print('  Referenced mapping: ' + mapping)
          "
            done
          else
            echo "No workflow XML files found in workflows/ directory"
          fi

  security:
    name: Security Scan
    needs: [build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks-linux-amd64 -o gitleaks
          chmod +x gitleaks
          ./gitleaks detect --source . --no-git --verbose --exit-code 1

      - name: Scan for Hardcoded Credentials
        run: |
          echo "Scanning XML and properties files for hardcoded credentials"
          echo "--- XML files ---"
          grep -rni "password\|passwd\|secret\|apikey\|token\|credential" --include="*.xml" . || echo "No hardcoded credentials found in XML files"
          echo "--- Properties files ---"
          grep -rni "password\|passwd\|secret\|apikey\|token\|credential" --include="*.properties" . || echo "No hardcoded credentials found in properties files"
          echo "--- Connection strings ---"
          grep -rni "jdbc:\|Data Source=\|Server=" --include="*.xml" --include="*.properties" . || echo "No connection strings found"

  deploy-int:
    name: Deploy to INT
    needs: [security, test]
    runs-on: ubuntu-latest
    if: (github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'int') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'int')
    environment: int
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy
        run: # Real deploy command goes here (SSH, kubectl, Docker push, etc.)

      - name: Transition Jira Ticket
        if: always()
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_TRANSITION_NAME: "Ready for Unit Testing"
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          TICKET=$(echo "$BRANCH" | grep -oE '[A-Z]+-[0-9]+' | head -1)
          if [ -z "$TICKET" ]; then
            echo "No Jira ticket found in branch name: $BRANCH"
            exit 0
          fi
          if [ -z "$JIRA_BASE_URL" ] || [ -z "$JIRA_USER_EMAIL" ] || [ -z "$JIRA_API_TOKEN" ]; then
            echo "Jira secrets not configured -- skipping transition for $TICKET"
            exit 0
          fi
          AUTH=$(echo -n "${JIRA_USER_EMAIL}:${JIRA_API_TOKEN}" | base64)
          echo "Fetching transitions for $TICKET..."
          TRANSITIONS=$(curl -s -H "Authorization: Basic $AUTH" -H "Content-Type: application/json" \
            "${JIRA_BASE_URL}/rest/api/3/issue/${TICKET}/transitions" 2>/dev/null) || { echo "Failed to reach Jira API"; exit 0; }
          TID=$(echo "$TRANSITIONS" | jq -r --arg name "$JIRA_TRANSITION_NAME" '.transitions[]? | select(.name == $name) | .id' 2>/dev/null | head -1)
          if [ -z "$TID" ] || [ "$TID" = "null" ]; then
            echo "Transition '$JIRA_TRANSITION_NAME' not available for $TICKET"
            echo "Available transitions: $(echo "$TRANSITIONS" | jq -r '.transitions[]?.name' 2>/dev/null | tr '\n' ', ')"
            exit 0
          fi
          echo "Transitioning $TICKET to '$JIRA_TRANSITION_NAME' (id: $TID)..."
          curl -s -X POST -H "Authorization: Basic $AUTH" -H "Content-Type: application/json" \
            -d "{\"transition\":{\"id\":\"$TID\"}}" \
            "${JIRA_BASE_URL}/rest/api/3/issue/${TICKET}/transitions" && echo "Done" || echo "Transition request failed"
      - name: Add Jira Comment
        if: always()
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          TICKET=$(echo "$BRANCH" | grep -oE '[A-Z]+-[0-9]+' | head -1)
          if [ -z "$TICKET" ] || [ -z "$JIRA_BASE_URL" ]; then exit 0; fi
          AUTH=$(echo -n "${JIRA_USER_EMAIL}:${JIRA_API_TOKEN}" | base64)
          BODY='{"body":{"type":"doc","version":1,"content":[{"type":"paragraph","content":[{"type":"text","text":"Deployed to INT by ForgeOps pipeline. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}]}]}}'
          curl -s -X POST -H "Authorization: Basic $AUTH" -H "Content-Type: application/json" -d "$BODY" "${JIRA_BASE_URL}/rest/api/3/issue/${TICKET}/comment" && echo "Comment added to $TICKET" || echo "Comment failed"

  deploy-qa:
    name: Deploy to QA
    needs: [security, test]
    runs-on: ubuntu-latest
    if: (github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'qa') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'qa')
