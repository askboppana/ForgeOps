<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ForgeOps - DevSecOps Command Center</title>
<meta name="referrer" content="no-referrer">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://esm.sh 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src https://api.github.com https://raw.githubusercontent.com; img-src 'self' data: https://avatars.githubusercontent.com">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='40' y2='40' gradientUnits='userSpaceOnUse'%3E%3Cstop stop-color='%234f46e5'/%3E%3Cstop offset='1' stop-color='%237c3aed'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='40' height='40' rx='10' fill='url(%23g)'/%3E%3Cpath d='M20 8L11 22h6.5l-2 10L27 18h-6.5l2-10z' fill='white'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8f9fb;--pn:#fff;--cd:#fff;--sf:#f1f5f9;--bd:#e2e8f0;--tx:#0f172a;--ts:#475569;--td:#94a3b8;--pr:#4f46e5;--pl:rgba(79,70,229,.08);--ok:#059669;--er:#dc2626;--wa:#d97706;--in:#0284c7;--r:12px;--sh:0 1px 3px rgba(0,0,0,.06)}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:14px}
code,.mono{font-family:'JetBrains Mono',monospace}
a{color:var(--pr);text-decoration:none}button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;background:var(--pn);border:1px solid var(--bd);border-radius:8px;color:var(--tx);padding:10px 14px;font-size:13px;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--pr);box-shadow:0 0 0 3px var(--pl)}
textarea{resize:vertical;min-height:60px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes boltPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(1.1)}}
@keyframes sparkGlow{0%,100%{filter:drop-shadow(0 0 2px currentColor)}50%{filter:drop-shadow(0 0 8px currentColor)}}
.fu{animation:fadeUp .3s ease-out}
.sk{background:linear-gradient(90deg,var(--sf) 25%,var(--bd) 50%,var(--sf) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--r);height:20px;margin:8px 0}
.app{display:flex;height:100vh;overflow:hidden}
.sb{width:200px;background:var(--pn);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.mn{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
.hd{padding:10px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;background:var(--pn)}
.ct{flex:1;overflow-y:auto;padding:20px}
.c{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--sh)}
.g4{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
.g2{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-bottom:16px}
.bt{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.bp{background:var(--pr);color:#fff}.bp:hover{opacity:.9}
.bs{background:var(--sf);color:var(--ts);border:1px solid var(--bd)}.bs:hover{border-color:var(--pr)}
.bd{background:none;color:var(--er);border:1px solid rgba(220,38,38,.3)}
.bok{background:var(--ok);color:#fff}
.lr{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--bd)}.lr:last-child{border-bottom:none}
.badge{display:inline-flex;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.ni{display:flex;align-items:center;gap:7px;padding:6px 12px;margin:1px 4px;border-radius:8px;font-size:12px;color:var(--ts);cursor:pointer;border-left:3px solid transparent}
.ni:hover{background:var(--sf)}.ni.ac{background:var(--pl);color:var(--pr);font-weight:600;border-left-color:var(--pr)}
.ns{padding:12px 10px 3px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--td)}
.fl{display:flex;flex-direction:column;gap:10px}
.lb{font-size:10px;color:var(--ts);margin-bottom:3px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.tabs{display:flex;border-bottom:1px solid var(--bd);margin-bottom:14px}.tab{padding:8px 14px;font-size:13px;font-weight:500;color:var(--ts);cursor:pointer;border-bottom:2px solid transparent}.tab.ac{color:var(--pr);border-color:var(--pr)}
.toast{position:fixed;top:16px;right:16px;z-index:9999;padding:10px 18px;border-radius:8px;font-size:13px;background:var(--pn);border-left:4px solid var(--ok);box-shadow:0 4px 12px rgba(0,0,0,.1);animation:fadeUp .3s}
.toast-err{border-left-color:var(--er)}.toast-warn{border-left-color:var(--wa)}
.log-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:90}
.log-panel{position:fixed;top:0;right:0;width:50%;height:100vh;background:var(--pn);border-left:1px solid var(--bd);z-index:100;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease;box-shadow:-4px 0 24px rgba(0,0,0,.1)}
.log-panel.open{transform:translateX(0)}
.log-tabs{display:flex;gap:0;border-bottom:1px solid var(--bd);overflow-x:auto;flex-shrink:0}
.log-tab{padding:8px 14px;font-size:11px;font-weight:500;color:var(--ts);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}.log-tab.ac{color:var(--pr);border-color:var(--pr)}
.log-code{background:#1e1e2e;color:#cdd6f4;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.6;padding:12px;overflow-x:auto;max-height:400px;overflow-y:auto;white-space:pre;margin:0;border-radius:0 0 8px 8px}
.log-line-err{background:rgba(220,38,38,.15)}.log-line-warn{background:rgba(217,119,6,.12)}.log-line-ok{color:#a6e3a1}
.spark-btn{position:absolute;bottom:20px;right:20px;width:48px;height:48px;border-radius:50%;background:var(--pn);border:1.5px solid var(--in);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.1);transition:transform .15s;z-index:50}.spark-btn:hover{transform:scale(1.08)}
.spark-panel{position:absolute;bottom:76px;right:20px;width:320px;background:var(--pn);border:1px solid var(--bd);border-radius:14px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:50;max-height:480px;overflow-y:auto;padding:16px}
.hb{display:none}
.ni-badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;border-radius:9px;font-size:9px;font-weight:700;background:var(--pl);color:var(--pr);margin-left:auto}
.int-card{border-radius:12px;overflow:hidden;background:var(--cd);border:1px solid var(--bd);margin-bottom:12px;box-shadow:var(--sh)}
.int-header{padding:14px 16px;display:flex;align-items:center;gap:10px}
.int-body{padding:0 16px 16px}
.int-expand{padding:12px 16px;border-top:1px solid var(--bd);font-size:11px;color:var(--ts);cursor:pointer}
.int-expand:hover{background:var(--sf)}
.jira-flow{display:flex;align-items:center;gap:0;overflow-x:auto;padding:8px 0}
.jira-node{padding:6px 10px;border-radius:6px;font-size:10px;font-weight:600;border:1px solid var(--bd);background:var(--sf);white-space:nowrap;flex-shrink:0}
.jira-arrow{width:20px;display:flex;align-items:center;justify-content:center;color:var(--td);flex-shrink:0}
@media(max-width:900px){.sb{position:fixed;z-index:80;height:100%;transform:translateX(-100%);transition:transform .2s}.sb.open{transform:translateX(0)}.hb{display:block;font-size:18px;padding:4px 8px;cursor:pointer;color:var(--ts);background:none;border:none}.g4{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}.spark-panel{width:calc(100vw - 40px);right:10px}.log-panel{width:100%}}
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;gap:8px;color:#94a3b8">Loading ForgeOps...</div></div>
<script type="module">
import{h,render,Fragment}from'https://esm.sh/preact@10.22.0';
import{useState,useEffect,useRef,useCallback}from'https://esm.sh/preact@10.22.0/hooks';
import htm from'https://esm.sh/htm@3.1.1';
var html=htm.bind(h);
var ORG='askboppana';
var cache={};
function getToken(){return localStorage.getItem('fg_pat')||''}
function apiGet(url){var k=url;if(cache[k]&&Date.now()-cache[k].t<120000)return Promise.resolve(cache[k].d);var h={Accept:'application/vnd.github.v3+json'};var tk=getToken();if(tk)h.Authorization='token '+tk;return fetch(url,{headers:h}).then(function(r){if(r.status===403)throw new Error('RATE_LIMITED');if(!r.ok)throw new Error(r.status+'');return r.json()}).then(function(d){cache[k]={d:d,t:Date.now()};return d})}
function api(path,opts){var url='https://api.github.com'+path;if(!opts)return apiGet(url);var tk=getToken();var h={Accept:'application/vnd.github.v3+json'};if(tk)h.Authorization='token '+tk;if(opts.body)h['Content-Type']='application/json';return fetch(url,{method:opts.method||'POST',headers:h,body:opts.body?JSON.stringify(opts.body):undefined}).then(function(r){if(!r.ok)return r.json().then(function(e){throw new Error(e.message||r.status)});if(r.status===204)return null;return r.json()})}
function clearCache(){Object.keys(cache).forEach(function(k){delete cache[k]})}
function fetchCmdData(){return fetch('https://raw.githubusercontent.com/'+ORG+'/ForgeOps/main/dashboard-data.json').then(function(r){return r.ok?r.json():null}).catch(function(){return null})}
function fetchConfig(){return fetch('https://raw.githubusercontent.com/'+ORG+'/ForgeOps/main/forgeops-config.json').then(function(r){return r.ok?r.json():null}).catch(function(){return null})}
function toast(msg,type){var d=document.createElement('div');d.className='toast'+(type==='err'?' toast-err':type==='warn'?' toast-warn':'');d.textContent=msg;document.body.appendChild(d);setTimeout(function(){d.remove()},4000)}
function ago(d){if(!d)return'';var s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return s+'s';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'d'}
function sCol(s){return{success:'var(--ok)',completed:'var(--ok)',failure:'var(--er)',in_progress:'var(--in)',queued:'var(--wa)',waiting:'var(--wa)'}[s]||'var(--td)'}
function Logo(p){return html`<svg width=${(p&&p.s)||28} height=${(p&&p.s)||28} viewBox="0 0 40 40"><defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#4f46e5"/><stop offset="1" stop-color="#7c3aed"/></linearGradient></defs><rect width="40" height="40" rx="10" fill="url(#lg)"/><path d="M20 8L11 22h6.5l-2 10L27 18h-6.5l2-10z" fill="white" style="animation:boltPulse 3s infinite"/></svg>`}
function Skel(){return html`<div class="sk"></div>`}
function Skels(){return html`<div><${Skel}/><${Skel}/><${Skel}/></div>`}
function Empty(p){return html`<div class="c" style="text-align:center;padding:24px;color:var(--td)">${p.msg||'No data'}</div>`}

var SPARK=[
{p:['users'],q:'How do I invite a team member?',a:'Fill the invite form at the top of the Team page. It opens 3 tabs: GitHub collaborator page, config file editor, and an onboarding issue with checklist.'},
{p:['users'],q:'What role should I assign?',a:'Developer for coders, Tech Lead for reviewers, Release Engineer for deployments, QA for SIT testing, UAT for acceptance testing, Admin for full control.'},
{p:['users'],q:'How do I remove a team member?',a:'Click Edit on the Team page to open forgeops-config.json. Remove their entry from the users section. Also remove them from GitHub org.'},
{p:['overview'],q:'What do stat cards show?',a:'Total repos, passing, failing, running counts from the command center data file.'},
{p:['pipelines'],q:'How to run a pipeline?',a:'Click Run Pipeline, select repo/workflow/branch, click Run. It dispatches a workflow.'},
{p:['prs'],q:'How to create a PR?',a:'Select repo, pick source and target branches, add Jira ticket and title, click Create. Opens GitHub compare.'},
{p:['environments'],q:'What is Ready for SIT?',a:'Jira status meaning the build is in QA and ready for System Integration Testing.'},
{p:['security'],q:'SAST vs SCA?',a:'SAST scans source code. SCA scans dependencies for known vulnerabilities.'},
{p:['deploy'],q:'How does bulk deploy work?',a:'Select project and environment, click Deploy. It triggers workflows for all repos in that project.'},
{p:['all'],q:'What is ForgeOps?',a:'Enterprise DevSecOps platform on GitHub Actions replacing Jenkins.'},
{p:['all'],q:'How to get help?',a:'Click Create Ticket or check the Knowledge Base for guides.'},
{p:['all'],q:'What integrations are available?',a:'Jira, SonarQube, OWASP DC, Gitleaks, Trivy, Syft, Email, Teams, Splunk, Cherwell. All optional.'},
{p:['settings'],q:'How do I set up Microsoft Teams notifications?',a:'Add TEAMS_WEBHOOK_URL as a GitHub Actions secret. Create an Incoming Webhook connector in your Teams channel and paste the URL.'},
{p:['settings'],q:'How do I configure Splunk log forwarding?',a:'Add SPLUNK_HEC_URL and SPLUNK_HEC_TOKEN secrets. ForgeOps sends structured JSON events to your HTTP Event Collector endpoint.'},
{p:['settings'],q:'How do I connect Jira to ForgeOps?',a:'Add JIRA_BASE_URL, JIRA_USER_EMAIL, and JIRA_API_TOKEN secrets. ForgeOps will auto-transition tickets through your workflow statuses.'},
{p:['settings'],q:'How do I set up email notifications?',a:'Add SMTP_HOST, SMTP_PORT, SMTP_USER, and SMTP_PASS secrets. ForgeOps sends deployment and failure alerts to configured recipients.'},
{p:['settings'],q:'How do I integrate SonarQube?',a:'Add SONAR_HOST_URL and SONAR_TOKEN secrets. SAST analysis runs automatically on every pipeline after configuration.'},
{p:['alm'],q:'What is the Jira status flow?',a:'Tickets move through: Ready for Unit Testing, Unit Testing Complete, Ready for SIT, SIT Complete, Ready for UAT, UAT Complete, Deployed to Production.'},
{p:['alm'],q:'How are Jira tickets extracted?',a:'ForgeOps extracts ticket IDs matching the pattern PROJ-123 from branch names and repository names in pipeline runs.'}
];
function SparkPanel(p){var s=useState('');var search=s[0];var setS=s[1];var c=useState('');var chat=c[0];var setChat=c[1];var r=useState('');var reply=r[0];var setReply=r[1];
var qa=SPARK.filter(function(i){return i.p.indexOf(p.pg)>=0||i.p.indexOf('all')>=0});
var filtered=search?qa.filter(function(i){return(i.q+' '+i.a).toLowerCase().indexOf(search.toLowerCase())>=0}).slice(0,5):qa.slice(0,4);
function ask(){if(!chat.trim())return;var q=chat.toLowerCase();var best=null;var bs=0;SPARK.forEach(function(i){var sc=0;i.q.toLowerCase().split(' ').forEach(function(w){if(w.length>3&&q.indexOf(w)>=0)sc++});if(sc>bs){bs=sc;best=i}});setTimeout(function(){if(best&&bs>=2)setReply(best.a);else if(q.indexOf('deploy')>=0)setReply('Go to Deploy page to trigger workflows across projects.');else if(q.indexOf('fail')>=0||q.indexOf('error')>=0)setReply('Check Pipelines page, click Logs on the failing run to see details.');else if(q.indexOf('pr')>=0||q.indexOf('pull')>=0)setReply('Go to Pull Requests page, Create tab. Select repo and branches.');else if(q.indexOf('teams')>=0||q.indexOf('webhook')>=0)setReply('Go to Settings (Integration Hub) and expand the Microsoft Teams card for setup steps.');else if(q.indexOf('splunk')>=0)setReply('Go to Settings (Integration Hub) and expand the Splunk card for HEC setup instructions.');else if(q.indexOf('jira')>=0)setReply('Go to Settings (Integration Hub) and expand the Jira card, or visit the ALM/Jira page for status tracking.');else if(q.indexOf('email')>=0||q.indexOf('smtp')>=0)setReply('Go to Settings (Integration Hub) and expand the Email SMTP card for configuration steps.');else if(q.indexOf('sonar')>=0)setReply('Go to Settings (Integration Hub) and expand the SonarQube card to add your host URL and token.');else if(q.indexOf('integrat')>=0)setReply('Visit the Integration Hub (Settings page) to configure Teams, Splunk, Jira, Email, ServiceNow, SonarQube, and GitHub Copilot.');else setReply('Try the Knowledge Base for detailed guides.')},300)}
return html`<div class="spark-panel"><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><div style="width:26px;height:26px;border-radius:50%;background:rgba(2,132,199,.1);display:flex;align-items:center;justify-content:center"><svg width="12" height="12" viewBox="0 0 40 40"><path d="M20 8L11 22h6.5l-2 10L27 18h-6.5l2-10z" fill="var(--in)" style="animation:sparkGlow 3s infinite"/></svg></div><div style="flex:1"><div style="font-size:13px;font-weight:600">Spark AI</div></div><button onClick=${p.close} aria-label="Close Spark AI" style="color:var(--td)">x</button></div>
<div style="display:flex;gap:4px;margin-bottom:8px"><input value=${chat} onInput=${function(e){setChat(e.target.value)}} onKeyDown=${function(e){if(e.key==='Enter')ask()}} placeholder="Ask a question..." style="flex:1;font-size:11px;padding:8px 10px"/><button class="bt bp" style="padding:5px 10px;font-size:10px" onClick=${ask}>Ask</button></div>
${reply&&html`<div style="background:rgba(2,132,199,.06);border:1px solid rgba(2,132,199,.15);border-radius:8px;padding:8px;margin-bottom:8px;font-size:11px;color:var(--ts);line-height:1.4">${reply}</div>`}
<input value=${search} onInput=${function(e){setS(e.target.value)}} placeholder="Filter..." style="margin-bottom:6px;font-size:10px;padding:6px 8px"/>
${filtered.map(function(i){return html`<div key=${i.q} style="background:var(--sf);border-radius:6px;padding:6px;margin-bottom:4px;cursor:pointer;font-size:10px" onClick=${function(){setReply(i.a)}}><div style="font-weight:600;margin-bottom:1px">${i.q}</div><div style="color:var(--ts);line-height:1.3">${i.a}</div></div>`})}</div>`}

function LogPanel(p){var jb=useState([]);var jobs=jb[0];var setJobs=jb[1];var at=useState(0);var ld=useState(true);
useEffect(function(){if(!p.run)return;setJobs([]);at[1](0);ld[1](true);var repo=p.run.repository&&p.run.repository.full_name||'';apiGet('https://api.github.com/repos/'+repo+'/actions/runs/'+p.run.id+'/jobs').then(function(d){setJobs((d&&d.jobs)||[]);ld[1](false)}).catch(function(){ld[1](false)})},[p.run&&p.run.id]);
var job=jobs[at[0]];var steps=(job&&job.steps)||[];
return html`<${Fragment}>${p.run&&html`<div class="log-backdrop" onClick=${p.onClose}></div>`}<div class=${'log-panel'+(p.run?' open':'')}>
<div style="padding:14px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;flex-shrink:0"><div style="flex:1;min-width:0"><div style="font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.run&&p.run.repository&&p.run.repository.full_name||''}</div><div style="font-size:10px;color:var(--td)">Run #${p.run&&p.run.run_number||''} -- ${p.run&&(p.run.head_branch||'')}</div></div><button onClick=${p.onClose} aria-label="Close log panel" style="font-size:18px;color:var(--td)">x</button></div>
<div class="log-tabs">${jobs.map(function(j,i){return html`<div key=${j.id} class=${'log-tab'+(at[0]===i?' ac':'')} onClick=${function(){at[1](i)}}>${j.name}</div>`})}</div>
<div style="flex:1;overflow-y:auto;padding:12px">${ld[0]&&html`<${Skels}/>`}${!ld[0]&&steps.map(function(s,i){var dur='';if(s.started_at&&s.completed_at){var sec=Math.round((new Date(s.completed_at)-new Date(s.started_at))/1000);dur=sec<60?sec+'s':Math.floor(sec/60)+'m'}var dotCol=s.conclusion==='success'?'var(--ok)':s.conclusion==='failure'?'var(--er)':'var(--td)';return html`<div key=${i} style="border:1px solid var(--bd);border-radius:8px;margin-bottom:6px;padding:10px 12px;display:flex;align-items:center;gap:8px;font-size:12px"><span style=${'display:inline-block;width:8px;height:8px;border-radius:50%;background:'+dotCol+';flex-shrink:0'}></span><span style="flex:1;font-weight:500">${s.name}</span><span class="mono" style="font-size:10px;color:var(--td)">${dur}</span><span class="badge" style=${'background:'+sCol(s.conclusion||s.status).replace('var(','rgba(').replace(/\)/,',.1)')+';color:'+sCol(s.conclusion||s.status)+';font-size:9px'}>${s.conclusion||s.status||''}</span></div>`})}
${!ld[0]&&jobs.length===0&&html`<${Empty} msg="No jobs found"/>`}
${!ld[0]&&p.run&&html`<div style="text-align:center;padding:8px"><a href=${(p.run&&p.run.html_url)||'#'} target="_blank" rel="noopener noreferrer" style="font-size:11px;color:var(--td)">Open full run on GitHub</a></div>`}
</div></div><//>`}

function IntegrationCard(p){var ex=useState(false);var expanded=ex[0];var setExpanded=ex[1];
return html`<div class="int-card" style=${'border-top:4px solid '+p.color}>
<div class="int-header">
<div style="flex:1"><div style="font-weight:600;font-size:13px">${p.title}</div><div style="font-size:10px;color:var(--ts);margin-top:2px">${p.desc}</div></div>
<div style="display:flex;align-items:center;gap:4px"><span style=${'display:inline-block;width:7px;height:7px;border-radius:50%;background:'+('var(--td)')}></span><span style="font-size:10px;color:var(--td)">Not configured</span></div>
</div>

</div>`}

function App(){
var us=useState(null);var user=us[0];var setUser=us[1];
var pg=useState('overview');var page=pg[0];var setPage=pg[1];
var dd=useState(null);var cmdData=dd[0];var setCmdData=dd[1];
var cf=useState(null);var config=cf[0];var setConfig=cf[1];
var ld=useState(true);var loading=ld[0];var setLoading=ld[1];
var sk=useState(false);var sparkOpen=sk[0];var setSpark=sk[1];
var lr=useState(null);var logRun=lr[0];var setLogRun=lr[1];
var sb=useState(false);var sideOpen=sb[0];var setSideOpen=sb[1];
var lastRef=useState(null);
var pageSize=20;var ps=useState({});var pageNums=ps[0];var setPageNums=ps[1];
var srch=useState('');var searchTxt=srch[0];var setSearch=srch[1];var debounceRef=useRef(null);
var prTab=useState('create');
var prForm=useState({repo:'',src:'',tgt:'int',title:'',jira:''});
var branches=useState([]);
var inv=useState({username:'',name:'',email:'',role:'developer'});

useEffect(function(){
  var tk=getToken();
  if(tk){api('/user').then(function(u){setUser(u)}).catch(function(){})}
  Promise.all([fetchCmdData(),fetchConfig()]).then(function(res){
    setCmdData(res[0]);setConfig(res[1]);setLoading(false);lastRef[1](new Date())
  }).catch(function(){setLoading(false)})
},[]);

function refresh(){clearCache();setLoading(true);Promise.all([fetchCmdData(),fetchConfig()]).then(function(res){setCmdData(res[0]);setConfig(res[1]);setLoading(false);lastRef[1](new Date());toast('Refreshed')}).catch(function(){setLoading(false)})}
function onSearch(e){var v=e.target.value;setSearch(v);clearTimeout(debounceRef.current);debounceRef.current=setTimeout(function(){setPageNums({})},300)}
function getPage(key){return pageNums[key]||1}
function nextPage(key){setPageNums(function(p){var n={};Object.keys(p).forEach(function(k){n[k]=p[k]});n[key]=(p[key]||1)+1;return n})}
function paginate(arr,key){var pg=getPage(key);return arr.slice(0,pg*pageSize)}
function nav(p){setPage(p);setSideOpen(false);setPageNums({})}

var projects=(cmdData&&cmdData.projects)||((config&&config.projects)||{});
var projNames=Object.keys(projects);
var allRepos=[];var totalRepos=0;var passing=0;var failing=0;var running=0;var allRuns=[];
projNames.forEach(function(pn){var proj=projects[pn];(proj.repos||[]).forEach(function(r){totalRepos++;allRepos.push({name:typeof r==='string'?r:r.name,project:pn,runs:(r&&r.runs)||[]});var latest=(r&&r.runs&&r.runs[0]);if(!latest)return;if(latest.conclusion==='success')passing++;else if(latest.conclusion==='failure')failing++;else if(latest.status==='in_progress')running++;allRuns.push({id:latest.id||Math.random(),conclusion:latest.conclusion,status:latest.status,branch:latest.branch,created:latest.created,repo:typeof r==='string'?r:r.name,project:pn,html_url:'https://github.com/'+ORG+'/'+(typeof r==='string'?r:r.name)+'/actions',repository:{full_name:ORG+'/'+(typeof r==='string'?r:r.name),name:typeof r==='string'?r:r.name},head_branch:latest.branch,run_number:latest.id,created_at:latest.created})})});
allRuns.sort(function(a,b){return new Date(b.created_at||0)-new Date(a.created_at||0)});

var filteredRepos=searchTxt?allRepos.filter(function(r){return r.name.toLowerCase().indexOf(searchTxt.toLowerCase())>=0}):allRepos;

// Extract Jira tickets from allRuns
function extractTickets(){var tickets=[];var seen={};allRuns.forEach(function(r){var src=(r.branch||r.head_branch||'')+' '+(r.repo||'');var match=src.match(/[A-Z]+-\d+/);if(match){var tk=match[0];var key=tk+'-'+r.repo+'-'+(r.branch||r.head_branch||'');if(!seen[key]){seen[key]=true;var env='INT';var br=(r.branch||r.head_branch||'').toLowerCase();if(br.indexOf('prod')>=0||br==='main')env='PROD';else if(br.indexOf('stage')>=0)env='STAGE';else if(br.indexOf('qa')>=0)env='QA';tickets.push({ticket:tk,repo:r.repo||'',env:env,time:r.created||r.created_at||''})}}});return tickets}

// Build notifications from allRuns
function buildNotifications(){var notifs=[];allRuns.forEach(function(r){if(r.conclusion==='success'||r.conclusion==='failure'){var env='INT';var br=(r.branch||r.head_branch||'').toLowerCase();if(br.indexOf('prod')>=0||br==='main')env='PROD';else if(br.indexOf('stage')>=0)env='STAGE';else if(br.indexOf('qa')>=0)env='QA';notifs.push({type:'Teams',msg:(r.repo||'')+' deployed to '+env,time:r.created||r.created_at||''});notifs.push({type:'Email',msg:env+' team notified of '+(r.conclusion==='success'?'successful':'failed')+' deploy',time:r.created||r.created_at||''})}});return notifs.slice(0,10)}

if(!user&&!getToken()&&!loading)return html`<div style="display:flex;align-items:center;justify-content:center;height:100vh;padding:20px"><div style="text-align:center;max-width:360px"><${Logo} s=${40}/><h1 style="font-size:20px;margin:12px 0 4px">ForgeOps</h1><p style="color:var(--ts);font-size:12px;margin-bottom:16px">Enter your GitHub token once. Saved in this browser forever.</p><form onSubmit=${function(e){e.preventDefault();var v=e.target.elements.tok.value.trim();if(!v)return;localStorage.setItem('fg_pat',v);api('/user').then(function(u){setUser(u);toast('Connected as '+u.login)}).catch(function(err){localStorage.removeItem('fg_pat');toast('Invalid token','err')})}} style="display:flex;gap:6px"><input name="tok" type="password" placeholder="ghp_..." style="flex:1;font-family:'JetBrains Mono',monospace"/><button type="submit" class="bt bp">Go</button></form></div></div>`;

var sections={DELIVERY:['overview','pipelines','prs','deploy','environments'],QUALITY:['security','alm'],OPERATIONS:['users','settings']};
var labels={overview:'Overview',pipelines:'Pipelines',prs:'Pull Requests',deploy:'Deploy',environments:'Environments',security:'Security',alm:'ALM / Jira',users:'Team',settings:'Settings'};
var ROLE_DESC={developer:'Can commit code, create PRs to INT, view own pipelines',tech_lead:'Can review PRs, approve merges, view security, monitor analytics',release_engineer:'Can promote code between environments, deploy, rollback',qa_team:'Can view QA environment, mark SIT testing complete',uat_team:'Can view Stage environment, mark UAT testing complete',admin:'Full control over all features and settings'};

function renderPage(){
  if(loading)return html`<${Skels}/>`;
  if(!cmdData&&!config)return html`<${Empty} msg="Command center data not generated yet. The generate-dashboard-data workflow runs every 15 minutes."/>`;

  if(page==='overview'){var notifs=buildNotifications();return html`<div class="fu">
    <div class="g4">
      <div class="c" style="border-left:4px solid var(--pr);text-align:center"><div style="font-size:9px;color:var(--ts);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px">Repos</div><div style="font-size:24px;font-weight:700">${totalRepos}</div></div>
      <div class="c" style="border-left:4px solid var(--ok);text-align:center"><div style="font-size:9px;color:var(--ts);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px">Passing</div><div style="font-size:24px;font-weight:700;color:var(--ok)">${passing}</div></div>
      <div class="c" style="border-left:4px solid var(--er);text-align:center"><div style="font-size:9px;color:var(--ts);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px">Failing</div><div style="font-size:24px;font-weight:700;color:var(--er)">${failing}</div></div>
      <div class="c" style="border-left:4px solid var(--in);text-align:center"><div style="font-size:9px;color:var(--ts);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px">Running</div><div style="font-size:24px;font-weight:700;color:var(--in)">${running}</div></div>
    </div>
    <div class="g2">${projNames.map(function(pn){var proj=projects[pn];var repos=proj.repos||[];var ok=repos.filter(function(r){var l=r&&r.runs&&r.runs[0];return l&&l.conclusion==='success'}).length;return html`<div key=${pn} class="c"><div style="font-weight:600;font-size:13px;margin-bottom:2px">${pn}</div><div style="font-size:10px;color:var(--ts);margin-bottom:6px">${proj.team||proj.description||''} -- ${repos.length} repos</div><div style="height:5px;background:var(--sf);border-radius:3px;overflow:hidden"><div style=${'height:100%;width:'+(repos.length?Math.round(ok/repos.length*100):0)+'%;background:var(--ok);border-radius:3px'}></div></div></div>`})}</div>
    <div class="c"><div style="font-size:11px;font-weight:600;color:var(--ts);margin-bottom:6px">Recent Activity</div>${allRuns.slice(0,15).map(function(r){return html`<div class="lr" key=${r.id||r.repo} style="cursor:pointer" onClick=${function(){setLogRun(r)}}><span class="badge" style=${'background:'+sCol(r.conclusion||r.status).replace('var(','rgba(').replace(/\)/,',.1)')+';color:'+sCol(r.conclusion||r.status)}>${r.conclusion||r.status||'?'}</span><div style="flex:1;min-width:0"><div style="font-size:11px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.repo||''}</div><div class="mono" style="font-size:9px;color:var(--td)">${r.branch||r.head_branch||''}</div></div><span style="font-size:9px;color:var(--td)">${ago(r.created||r.created_at)}</span></div>`})}${allRuns.length===0&&html`<div style="color:var(--td);font-size:11px;text-align:center;padding:12px">No pipeline data yet. Push code to a registered repo.</div>`}</div>
    <div class="c"><div style="font-size:11px;font-weight:600;color:var(--ts);margin-bottom:6px">Recent Notifications</div>${notifs.length>0?notifs.map(function(n,i){return html`<div key=${i} class="lr" style="font-size:11px"><span class="badge" style="background:var(--pl);color:var(--pr)">${n.type}</span><div style="flex:1;min-width:0"><div style="font-size:11px;color:var(--tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${n.msg}</div></div><span style="font-size:9px;color:var(--td)">${ago(n.time)}</span></div>`}):html`<div style="color:var(--td);font-size:11px;text-align:center;padding:12px">Configure integrations in Settings to see notifications here</div>`}</div>
  </div>`}

  if(page==='pipelines'){var paged=paginate(filteredRepos,'pipes');return html`<div class="fu">
    <input value=${searchTxt} onInput=${onSearch} placeholder="Search repos..." style="margin-bottom:12px;font-size:12px;padding:8px 12px"/>
    <div class="c">${paged.map(function(r){var latest=r.runs&&r.runs[0];return html`<div key=${r.name} class="lr" style=${'border-left:3px solid '+sCol(latest&&(latest.conclusion||latest.status))+';padding-left:8px;cursor:pointer'} onClick=${function(){if(latest)setLogRun({id:latest.id,repository:{full_name:ORG+'/'+r.name,name:r.name},html_url:'https://github.com/'+ORG+'/'+r.name+'/actions',run_number:latest.id,head_branch:latest.branch,conclusion:latest.conclusion,status:latest.status,created_at:latest.created})}}>
      <span class="badge" style=${'background:'+sCol(latest&&(latest.conclusion||latest.status)).replace('var(','rgba(').replace(/\)/,',.1)')+';color:'+sCol(latest&&(latest.conclusion||latest.status))}>${latest&&(latest.conclusion||latest.status)||'none'}</span>
      <div style="flex:1;min-width:0"><div style="font-size:11px;font-weight:500">${r.name}</div><div style="font-size:9px;color:var(--td)">${r.project} ${latest&&latest.branch?'-- '+latest.branch:''}</div></div>
      <span style="font-size:9px;color:var(--td)">${latest&&ago(latest.created)||''}</span>
      <a href=${'https://github.com/'+ORG+'/'+r.name+'/actions'} target="_blank" rel="noopener noreferrer" class="bt bs" style="font-size:9px;padding:3px 6px" onClick=${function(e){e.stopPropagation()}}>GitHub</a>
    </div>`})}${paged.length===0&&html`<div style="text-align:center;padding:16px;color:var(--td);font-size:11px">No repos found.</div>`}</div>
    ${paged.length<filteredRepos.length&&html`<button class="bt bs" style="width:100%" onClick=${function(){nextPage('pipes')}}>Show more (${filteredRepos.length-paged.length} remaining)</button>`}
  </div>`}

  if(page==='prs')return html`<div class="fu">
    <div class="tabs"><div class=${'tab'+(prTab[0]==='create'?' ac':'')} onClick=${function(){prTab[1]('create')}}>Create PR</div></div>
    <div class="c"><div style="font-size:12px;font-weight:600;margin-bottom:8px">Create Pull Request</div><div class="fl">
      <div><div class="lb">Repository</div><select value=${prForm[0].repo} onChange=${function(e){var v=e.target.value;prForm[1](function(p){return{repo:v,src:'',tgt:p.tgt,title:p.title,jira:p.jira}});if(v)api('/repos/'+ORG+'/'+v+'/branches?per_page=100').then(function(b){branches[1]((b||[]).map(function(x){return x.name}))}).catch(function(){branches[1]([])})}}><option value="">Select repo...</option>${filteredRepos.slice(0,50).map(function(r){return html`<option key=${r.name} value=${r.name}>${r.name}</option>`})}</select></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div><div class="lb">Source Branch</div><select value=${prForm[0].src} onChange=${function(e){prForm[1](function(p){return{repo:p.repo,src:e.target.value,tgt:p.tgt,title:p.title,jira:p.jira}})}}><option value="">Select...</option>${branches[0].map(function(b){return html`<option key=${b} value=${b}>${b}</option>`})}</select></div><div><div class="lb">Target Branch</div><select value=${prForm[0].tgt} onChange=${function(e){prForm[1](function(p){return{repo:p.repo,src:p.src,tgt:e.target.value,title:p.title,jira:p.jira}})}}>${['int','qa','stage','main'].map(function(b){return html`<option key=${b} value=${b}>${b}</option>`})}</select></div></div>
      <div><div class="lb">Jira Ticket</div><input value=${prForm[0].jira} onInput=${function(e){prForm[1](function(p){return{repo:p.repo,src:p.src,tgt:p.tgt,title:p.title,jira:e.target.value}})}} placeholder="PROJ-123"/></div>
      <div><div class="lb">Title</div><input value=${prForm[0].title} onInput=${function(e){prForm[1](function(p){return{repo:p.repo,src:p.src,tgt:p.tgt,title:e.target.value,jira:p.jira}})}} placeholder="Add feature X"/></div>
      <button class="bt bp" onClick=${function(){var f=prForm[0];if(!f.repo||!f.src||!f.title){toast('Fill repo, source, title','err');return}var t=encodeURIComponent((f.jira?f.jira+' ':'')+f.title);var url='https://github.com/'+ORG+'/'+f.repo+'/compare/'+f.tgt+'...'+f.src+'?expand=1&title='+t;window.open(url,'_blank','noopener,noreferrer');toast('Opening GitHub...')}}>Create on GitHub</button>
    </div></div>
  </div>`;

  if(page==='deploy')return html`<div class="fu">
    <div class="c"><div style="font-weight:600;margin-bottom:6px">Bulk Operations</div><div style="font-size:11px;color:var(--ts);margin-bottom:10px;line-height:1.5">Select a project to trigger deployments across all its repos via GitHub dispatch.</div>
    ${projNames.map(function(pn){var proj=projects[pn];return html`<div key=${pn} class="c"><div style="font-weight:600;font-size:13px;margin-bottom:3px">${pn}</div><div style="font-size:10px;color:var(--ts);margin-bottom:6px">${(proj.repos||[]).length} repos -- ${proj.team||proj.description||''}</div><div style="display:flex;gap:4px;flex-wrap:wrap">${['qa','stage','prod'].map(function(env){return html`<a key=${env} href=${'https://github.com/'+ORG+'/ForgeOps/issues/new?title=%5BFORGEOPS%5D+deploy+'+pn+'+'+env+'&labels=forgeops-dispatch'} target="_blank" rel="noopener noreferrer" class="bt bs" style="font-size:10px;padding:4px 8px">Deploy ${env.toUpperCase()}</a>`})}</div></div>`})}</div>
  </div>`;

  if(page==='environments'){var envs=['INT','QA','STAGE','PROD'];var cols=['var(--in)','var(--wa)','var(--wa)','var(--er)'];var jiraMap={INT:'Jira: Ready for Unit Testing',QA:'Jira: Ready for SIT',STAGE:'Jira: Ready for UAT',PROD:'Jira: Deployed to Production'};return html`<div class="fu"><div style="display:flex;gap:6px;overflow-x:auto">${envs.map(function(e,i){return html`<div key=${e} style="flex:1;min-width:140px"><div class="c" style=${'border-top:4px solid '+cols[i]}><div style="font-weight:700;font-size:13px;margin-bottom:6px">${e}</div><div style="font-size:10px;color:var(--ts)">${totalRepos} repos registered</div><div style="font-size:9px;color:var(--td);margin-top:4px">Push to ${e.toLowerCase()} branch to deploy</div><div style="font-size:9px;color:var(--in);margin-top:6px;font-weight:600">${jiraMap[e]}</div></div></div>`})}</div></div>`}

  if(page==='security')return html`<div class="fu"><div class="g4"><div class="c" style="border-left:4px solid var(--ok);text-align:center"><div style="font-size:9px;color:var(--ts);text-transform:uppercase;letter-spacing:1px">Gitleaks</div><div style="font-size:18px;font-weight:700;color:var(--ok)">Active</div></div><div class="c" style="border-left:4px solid var(--ok);text-align:center"><div style="font-size:9px;color:var(--ts);text-transform:uppercase;letter-spacing:1px">OWASP DC</div><div style="font-size:18px;font-weight:700;color:var(--ok)">Active</div></div><div class="c" style="border-left:4px solid var(--ok);text-align:center"><div style="font-size:9px;color:var(--ts);text-transform:uppercase;letter-spacing:1px">Syft SBOM</div><div style="font-size:18px;font-weight:700;color:var(--ok)">Active</div></div><div class="c" style="border-left:4px solid var(--td);text-align:center"><div style="font-size:9px;color:var(--ts);text-transform:uppercase;letter-spacing:1px">SonarQube</div><div style="font-size:18px;font-weight:700;color:var(--td)">Add secret</div></div></div><div class="c"><div style="font-size:11px;color:var(--ts);line-height:1.6">Free tools (Gitleaks, OWASP Dependency-Check, Syft) run automatically on every pipeline. Add SONAR_HOST_URL + SONAR_TOKEN for SAST.</div></div></div>`;

  if(page==='alm'){var tickets=extractTickets();var jiraStatuses=['Ready for Unit Testing','Unit Testing Complete','Ready for SIT','SIT Complete','Ready for UAT','UAT Complete','Deployed to Production'];return html`<div class="fu">

    <div class="jira-flow">${jiraStatuses.map(function(st,i){var items=[html`<div key=${st} class="jira-node">${st}</div>`];if(i<jiraStatuses.length-1)items.push(html`<div key=${'arrow-'+i} class="jira-arrow">></div>`);return items})}</div></div>
    <div class="c"><div style="font-size:12px;font-weight:600;margin-bottom:8px">Ticket Tracker</div>

    <tbody>${tickets.slice(0,20).map(function(t,i){return html`<tr key=${i} style="border-bottom:1px solid var(--bd)"><td style="padding:6px 8px;font-weight:600;color:var(--pr)">${t.ticket}</td><td style="padding:6px 8px">${t.repo}</td><td style="padding:6px 8px"><span class="badge" style="background:var(--sf);color:var(--ts)">${t.env}</span></td><td style="padding:6px 8px;color:var(--td)">${ago(t.time)}</td></tr>`})}</tbody>
    </table></div>`:html`<div style="color:var(--td);font-size:11px;text-align:center;padding:12px">No Jira tickets found in branch names. Use branch naming like feature/PROJ-123-description.</div>`}
    </div>
    <div class="c" style="border-left:4px solid var(--in)"><div style="font-size:12px;font-weight:600;margin-bottom:4px">Jira Integration Setup</div><div style="font-size:11px;color:var(--ts);line-height:1.6">To enable automatic Jira status transitions, add these GitHub Actions secrets: <code style="background:var(--sf);padding:1px 4px;border-radius:3px;font-size:10px">JIRA_BASE_URL</code>, <code style="background:var(--sf);padding:1px 4px;border-radius:3px;font-size:10px">JIRA_USER_EMAIL</code>, <code style="background:var(--sf);padding:1px 4px;border-radius:3px;font-size:10px">JIRA_API_TOKEN</code></div><div style="margin-top:8px"><a href=${'https://github.com/'+ORG+'/ForgeOps/settings/secrets/actions'} target="_blank" rel="noopener noreferrer" class="bt bp" style="font-size:10px">Configure Secrets</a></div></div>
  </div>`}

  if(page==='users'){
    var invF=inv[0];var setInv=inv[1];var invMsg=useState('');
    var ROLE_COLORS={admin:'#7c3aed',release_engineer:'var(--ok)',developer:'var(--in)',tech_lead:'var(--wa)',qa_team:'var(--er)',uat_team:'var(--er)'};
    function doInvite(){
      if(!invF.username||!invF.name||!invF.email){toast('Fill all fields','err');return}
      var onboardBody=encodeURIComponent('## Onboarding: '+invF.username+'\n\n- [ ] GitHub access granted\n- [ ] Added to forgeops-config.json as '+invF.role+'\n- [ ] VS Code extensions installed (Actions, Copilot, PR)\n- [ ] First feature branch created\n- [ ] First PR submitted and reviewed\n- [ ] Completed ForgeOps knowledge base review\n\nRole: '+invF.role+'\nEmail: '+invF.email+'\nName: '+invF.name);
      window.open('https://github.com/'+ORG+'/ForgeOps/settings/access','_blank');
      toast('Opening GitHub to add collaborator...');
      setTimeout(function(){window.open('https://github.com/'+ORG+'/ForgeOps/edit/main/forgeops-config.json','_blank');toast('Add user to forgeops-config.json')},500);
      setTimeout(function(){window.open('https://github.com/'+ORG+'/ForgeOps/issues/new?title=%5BONBOARD%5D+'+encodeURIComponent(invF.username)+'&body='+onboardBody+'&labels=onboarding','_blank');toast('Onboarding ticket created')},1000);
      invMsg[1](invF.username);
    }
    var cfgUsers=(config&&config.users)||{};var userList=Object.keys(cfgUsers);
    var PERMS=[['View all pipelines','Y','Y','Y','Own','QA','Stage'],['Create PR to INT','Y','Y','Y','Y','',''],['Promote INT to QA','Y','Y','','','',''],['Promote QA to Stage','Y','Y','','','',''],['Promote Stage to Prod','Y','Y','','','',''],['Approve prod deploy','Y','Y','Y','','',''],['Mark SIT Complete','Y','Y','','','Y',''],['Mark UAT Complete','Y','Y','','','','Y'],['Manage users','Y','','','','',''],['Configure integrations','Y','','','','',''],['View security results','Y','Y','Y','Y','',''],['Trigger rollback','Y','Y','','','','']];
    return html`<div class="fu">
      <div class="c" style="border-top:4px solid var(--pr)">
        <div style="font-weight:600;font-size:14px;margin-bottom:10px">Invite Team Member</div>
        <div class="fl">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div><div class="lb">GitHub Username</div><input value=${invF.username} onInput=${function(e){setInv(function(p){return{username:e.target.value,name:p.name,email:p.email,role:p.role}});invMsg[1]('')}} placeholder="jsmith"/></div><div><div class="lb">Full Name</div><input value=${invF.name} onInput=${function(e){setInv(function(p){return{username:p.username,name:e.target.value,email:p.email,role:p.role}})}} placeholder="Jane Smith"/></div></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div><div class="lb">Email</div><input value=${invF.email} onInput=${function(e){setInv(function(p){return{username:p.username,name:p.name,email:e.target.value,role:p.role}})}} placeholder="jane@company.com"/></div><div><div class="lb">Role</div><select value=${invF.role} onChange=${function(e){setInv(function(p){return{username:p.username,name:p.name,email:p.email,role:e.target.value}})}}>${Object.keys(ROLE_DESC).map(function(r){return html`<option key=${r} value=${r}>${r.replace('_',' ')}</option>`})}</select></div></div>
          <div style="background:var(--sf);border-radius:8px;padding:10px;font-size:11px;color:var(--ts)">${ROLE_DESC[invF.role]||''}</div>
          <button class="bt bp" onClick=${doInvite}>Invite Member</button>
          ${invMsg[0]&&html`<div style="background:rgba(5,150,105,.06);border:1px solid rgba(5,150,105,.2);border-radius:8px;padding:12px;font-size:11px;color:var(--ok);line-height:1.7">3 tabs opened:<br/>1. GitHub -- add ${invMsg[0]} as collaborator<br/>2. Config -- add ${invMsg[0]} to forgeops-config.json<br/>3. Issue -- onboarding checklist created for ${invMsg[0]}<br/><br/>After completing all 3 steps, ${invMsg[0]} can access ForgeOps immediately.</div>`}
        </div>
      </div>
      <div class="c">
        <div style="font-weight:600;margin-bottom:8px">Current Team (${userList.length})</div>
        <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">
          <thead><tr style="border-bottom:2px solid var(--bd)"><th style="padding:8px;text-align:left;color:var(--ts);font-size:10px;text-transform:uppercase;letter-spacing:1px">Username</th><th style="padding:8px;text-align:left;color:var(--ts);font-size:10px;text-transform:uppercase;letter-spacing:1px">Name</th><th style="padding:8px;text-align:left;color:var(--ts);font-size:10px;text-transform:uppercase;letter-spacing:1px">Role</th><th style="padding:8px;text-align:left;color:var(--ts);font-size:10px;text-transform:uppercase;letter-spacing:1px">Email</th><th style="padding:8px;text-align:right;color:var(--ts);font-size:10px;text-transform:uppercase;letter-spacing:1px">Actions</th></tr></thead>
          <tbody>${userList.map(function(u){var ud=cfgUsers[u];var rc=ROLE_COLORS[ud.role]||'var(--td)';return html`<tr key=${u} style="border-bottom:1px solid var(--bd)"><td style="padding:8px;font-weight:500">${u}</td><td style="padding:8px;color:var(--ts)">${ud.name||'-'}</td><td style="padding:8px"><span class="badge" style=${'background:'+rc+';color:#fff;font-size:9px'}>${(ud.role||'').replace('_',' ')}</span></td><td style="padding:8px;color:var(--ts);font-size:11px">${ud.email||'-'}</td><td style="padding:8px;text-align:right"><a href=${'https://github.com/'+ORG+'/ForgeOps/edit/main/forgeops-config.json'} target="_blank" rel="noopener noreferrer" class="bt bs" style="font-size:9px;padding:3px 8px">Edit</a></td></tr>`})}</tbody>
        </table></div>
        ${userList.length===0&&html`<div style="text-align:center;padding:12px;color:var(--td);font-size:11px">No users in config. Invite your first team member above.</div>`}
      </div>
      <div class="c">
        <div style="font-weight:600;margin-bottom:8px">Role Permissions Matrix</div>
        <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:11px">
          <thead><tr style="border-bottom:2px solid var(--bd)"><th style="padding:6px;text-align:left;color:var(--ts);font-size:9px">Permission</th><th style="padding:6px;text-align:center;font-size:9px;color:#7c3aed">Admin</th><th style="padding:6px;text-align:center;font-size:9px;color:var(--ok)">Release</th><th style="padding:6px;text-align:center;font-size:9px;color:var(--wa)">Lead</th><th style="padding:6px;text-align:center;font-size:9px;color:var(--in)">Dev</th><th style="padding:6px;text-align:center;font-size:9px;color:var(--er)">QA</th><th style="padding:6px;text-align:center;font-size:9px;color:var(--er)">UAT</th></tr></thead>
          <tbody>${PERMS.map(function(row){return html`<tr key=${row[0]} style="border-bottom:1px solid var(--bd)"><td style="padding:6px;font-weight:500">${row[0]}</td>${row.slice(1).map(function(cell,ci){var bg=cell==='Y'?'rgba(5,150,105,.08)':cell?'rgba(2,132,199,.06)':'transparent';var clr=cell==='Y'?'var(--ok)':cell?'var(--in)':'var(--td)';return html`<td key=${ci} style=${'padding:6px;text-align:center;background:'+bg+';color:'+clr+';font-weight:'+(cell?'600':'400')}>${cell||'-'}</td>`})}</tr>`})}</tbody>
        </table></div>
      </div>
    </div>`}

  if(page==='settings')return html`<div class="fu">
    <div class="c" style="margin-bottom:16px"><div style="font-weight:600;margin-bottom:4px">Integration Hub</div><div style="font-size:11px;color:var(--ts);margin-bottom:6px">ForgeOps v6.0 -- ${totalRepos} repos across ${projNames.length} projects</div>${user&&html`<div style="font-size:11px;margin-bottom:8px">Connected as: ${user.login}</div>`}<div style="display:flex;gap:6px"><button class="bt bd" onClick=${function(){localStorage.removeItem('fg_pat');setUser(null);toast('Disconnected')}} aria-label="Disconnect account">Disconnect</button><a href=${'https://github.com/'+ORG+'/ForgeOps'} target="_blank" rel="noopener noreferrer" class="bt bs" style="font-size:11px">GitHub Repo</a></div></div>
    <div class="g2">
    <${IntegrationCard} color="#7c3aed" title="Microsoft Teams" desc="Send deployment and failure notifications to Teams channels." secrets=${['TEAMS_WEBHOOK_URL']} steps=${['Open Microsoft Teams and navigate to the target channel.','Click the channel name, then Connectors (or Workflows).','Add an Incoming Webhook connector and name it ForgeOps.','Copy the generated webhook URL.','Add it as TEAMS_WEBHOOK_URL in GitHub Actions secrets.']}/>
    <${IntegrationCard} color="#059669" title="Splunk" desc="Forward structured pipeline logs to Splunk via HTTP Event Collector." secrets=${['SPLUNK_HEC_URL','SPLUNK_HEC_TOKEN']} steps=${['In Splunk, go to Settings > Data Inputs > HTTP Event Collector.','Create a new token with a target index for ForgeOps events.','Copy the HEC URL and token value.','Add SPLUNK_HEC_URL and SPLUNK_HEC_TOKEN as GitHub secrets.','Use SPL: index=forgeops sourcetype=_json | stats count by repo, status']}/>
    <${IntegrationCard} color="#0284c7" title="Jira" desc="Auto-transition tickets through your workflow on deploy events." secrets=${['JIRA_BASE_URL','JIRA_USER_EMAIL','JIRA_API_TOKEN']} steps=${['Go to Atlassian account settings and create an API token.','Note your Jira base URL (e.g. https://yourorg.atlassian.net).','Add JIRA_BASE_URL, JIRA_USER_EMAIL, and JIRA_API_TOKEN as secrets.','ForgeOps maps: INT=Ready for Unit Testing, QA=Ready for SIT, STAGE=Ready for UAT, PROD=Deployed to Production.']}/>
    <${IntegrationCard} color="#d97706" title="Email SMTP" desc="Send deployment alerts and failure notifications via email." secrets=${['SMTP_HOST','SMTP_PORT','SMTP_USER','SMTP_PASS']} steps=${['Obtain SMTP credentials from your email provider.','Common: smtp.gmail.com:587 with an app password for Gmail.','Add SMTP_HOST, SMTP_PORT, SMTP_USER, and SMTP_PASS as secrets.','ForgeOps sends HTML-formatted alerts on deploy and failure events.']}/>
    <${IntegrationCard} color="#94a3b8" title="Cherwell / ServiceNow" desc="Create and update ITSM tickets on pipeline events." secrets=${['ITSM_BASE_URL','ITSM_API_KEY']} steps=${['Obtain API credentials from your Cherwell or ServiceNow instance.','Create a dedicated integration user with ticket create/update permissions.','Add ITSM_BASE_URL and ITSM_API_KEY as GitHub Actions secrets.','ForgeOps creates incidents on failure and resolves on successful redeploy.']}/>
    <${IntegrationCard} color="#0d9488" title="SonarQube" desc="Run SAST analysis on every pipeline for code quality and security." secrets=${['SONAR_HOST_URL','SONAR_TOKEN']} steps=${['Log in to your SonarQube instance.','Go to My Account > Security > Generate Token.','Copy the token and your SonarQube server URL.','Add SONAR_HOST_URL and SONAR_TOKEN as GitHub Actions secrets.','Analysis runs automatically on every pipeline after configuration.']}/>
    <${IntegrationCard} color="#8b5cf6" title="GitHub Copilot" desc="AI-powered code suggestions and PR review assistance." secrets=${['COPILOT_ENABLED']} steps=${['Ensure GitHub Copilot is enabled for your organization.','Go to Organization Settings > Copilot > Enable for all members.','Add COPILOT_ENABLED=true as a GitHub Actions secret to enable AI PR summaries.','Copilot will provide automated code review suggestions on pull requests.']}/>
    </div>
  </div>`;

  return html`<${Empty} msg="Coming soon"/>`;
}

return html`<div class="app">
  ${sideOpen&&html`<div style="position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:70" onClick=${function(){setSideOpen(false)}}></div>`}
  <div class=${'sb'+(sideOpen?' open':'')}>
    <div style="padding:10px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--bd)"><${Logo} s=${20}/><div style="font-weight:700;font-size:12px">ForgeOps</div></div>
    ${Object.keys(sections).map(function(sec){return html`<${Fragment} key=${sec}><div class="ns">${sec}</div>${sections[sec].map(function(k){var badge=null;if(k==='pipelines'&&running>0)badge=html`<span class="ni-badge">${running}</span>`;if(k==='deploy')badge=html`<span class="ni-badge">${projNames.length}</span>`;return html`<div key=${k} class=${'ni'+(page===k?' ac':'')} onClick=${function(){nav(k)}}><span style="flex:1">${labels[k]}</span>${badge}</div>`})}<//>`})}
    <div style="margin-top:auto;padding:8px 10px;border-top:1px solid var(--bd);font-size:9px;color:var(--td)"><span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--ok);margin-right:3px"></span>ForgeOps v6.0${lastRef[0]?' -- '+lastRef[0].toLocaleTimeString():''}</div>
  </div>
  <div class="mn">
    <div class="hd"><button class="hb" onClick=${function(){setSideOpen(!sideOpen)}} aria-label="Toggle menu">Menu</button><span style="font-size:15px;font-weight:700;flex:1">${labels[page]||''}</span><button class="bt bs" style="font-size:10px" onClick=${refresh} aria-label="Refresh data">${loading?'...':'Refresh'}</button></div>
    <div class="ct">${renderPage()}</div>
    <div class="spark-btn" onClick=${function(){setSpark(!sparkOpen)}} aria-label="Open Spark AI assistant"><svg width="20" height="20" viewBox="0 0 40 40"><path d="M20 8L11 22h6.5l-2 10L27 18h-6.5l2-10z" fill="var(--in)" style="animation:sparkGlow 3s infinite"/></svg></div>
    ${sparkOpen&&html`<${SparkPanel} pg=${page} close=${function(){setSpark(false)}}/>`}
    <${LogPanel} run=${logRun} onClose=${function(){setLogRun(null)}}/>
  </div>
</div>`;
}
render(html`<${App}/>`,document.getElementById('root'));
</script>
</body>
</html>
