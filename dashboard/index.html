<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ForgeOps - DevSecOps Command Center</title>
<meta name="referrer" content="no-referrer">

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='40' y2='40' gradientUnits='userSpaceOnUse'%3E%3Cstop stop-color='%234f46e5'/%3E%3Cstop offset='1' stop-color='%237c3aed'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='40' height='40' rx='10' fill='url(%23g)'/%3E%3Cpath d='M20 8L11 22h6.5l-2 10L27 18h-6.5l2-10z' fill='white'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8f9fb;--pn:#fff;--cd:#fff;--sf:#f1f5f9;--bd:#e2e8f0;--tx:#0f172a;--ts:#475569;--td:#94a3b8;--pr:#4f46e5;--pl:rgba(79,70,229,.08);--ok:#059669;--er:#dc2626;--wa:#d97706;--in:#0284c7;--r:12px;--sh:0 1px 3px rgba(0,0,0,.06)}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:14px}
code,.mono{font-family:'JetBrains Mono',monospace}
a{color:var(--pr);text-decoration:none}button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;background:var(--pn);border:1px solid var(--bd);border-radius:8px;color:var(--tx);padding:10px 14px;font-size:13px;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--pr);box-shadow:0 0 0 3px var(--pl)}
textarea{resize:vertical;min-height:60px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes boltPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(1.1)}}
@keyframes sparkGlow{0%,100%{filter:drop-shadow(0 0 2px currentColor)}50%{filter:drop-shadow(0 0 8px currentColor)}}
.fu{animation:fadeUp .3s ease-out}
.sk{background:linear-gradient(90deg,var(--sf) 25%,var(--bd) 50%,var(--sf) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--r);height:20px;margin:8px 0}
.app{display:flex;height:100vh;overflow:hidden}
.sb{width:200px;background:var(--pn);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.mn{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
.hd{padding:10px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;background:var(--pn)}
.ct{flex:1;overflow-y:auto;padding:20px}
.c{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--sh)}
.g4{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
.g2{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-bottom:16px}
.bt{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.bp{background:var(--pr);color:#fff}.bp:hover{opacity:.9}
.bs{background:var(--sf);color:var(--ts);border:1px solid var(--bd)}.bs:hover{border-color:var(--pr)}
.bd{background:none;color:var(--er);border:1px solid rgba(220,38,38,.3)}
.bok{background:var(--ok);color:#fff}
.lr{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--bd)}.lr:last-child{border-bottom:none}
.badge{display:inline-flex;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.ni{display:flex;align-items:center;gap:7px;padding:6px 12px;margin:1px 4px;border-radius:8px;font-size:12px;color:var(--ts);cursor:pointer;border-left:3px solid transparent}
.ni:hover{background:var(--sf)}.ni.ac{background:var(--pl);color:var(--pr);font-weight:600;border-left-color:var(--pr)}
.ns{padding:12px 10px 3px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--td)}
.fl{display:flex;flex-direction:column;gap:10px}
.lb{font-size:10px;color:var(--ts);margin-bottom:3px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.tabs{display:flex;border-bottom:1px solid var(--bd);margin-bottom:14px}.tab{padding:8px 14px;font-size:13px;font-weight:500;color:var(--ts);cursor:pointer;border-bottom:2px solid transparent}.tab.ac{color:var(--pr);border-color:var(--pr)}
.toast{position:fixed;top:16px;right:16px;z-index:9999;padding:10px 18px;border-radius:8px;font-size:13px;background:var(--pn);border-left:4px solid var(--ok);box-shadow:0 4px 12px rgba(0,0,0,.1);animation:fadeUp .3s}
.toast-err{border-left-color:var(--er)}.toast-warn{border-left-color:var(--wa)}
.log-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:90}
.log-panel{position:fixed;top:0;right:0;width:50%;height:100vh;background:var(--pn);border-left:1px solid var(--bd);z-index:100;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease;box-shadow:-4px 0 24px rgba(0,0,0,.1)}
.log-panel.open{transform:translateX(0)}
.log-tabs{display:flex;gap:0;border-bottom:1px solid var(--bd);overflow-x:auto;flex-shrink:0}
.log-tab{padding:8px 14px;font-size:11px;font-weight:500;color:var(--ts);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}.log-tab.ac{color:var(--pr);border-color:var(--pr)}
.spark-btn{position:absolute;bottom:20px;right:20px;width:48px;height:48px;border-radius:50%;background:var(--pn);border:1.5px solid var(--in);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.1);transition:transform .15s;z-index:50}.spark-btn:hover{transform:scale(1.08)}
.spark-panel{position:absolute;bottom:76px;right:20px;width:320px;background:var(--pn);border:1px solid var(--bd);border-radius:14px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:50;max-height:480px;overflow-y:auto;padding:16px}
.hb{display:none}
.ni-badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;border-radius:9px;font-size:9px;font-weight:700;background:var(--pl);color:var(--pr);margin-left:auto}
.int-card{border-radius:12px;overflow:hidden;background:var(--cd);border:1px solid var(--bd);margin-bottom:12px;box-shadow:var(--sh)}
.int-header{padding:14px 16px;display:flex;align-items:center;gap:10px}
.int-body{padding:0 16px 16px}
.int-expand{padding:12px 16px;border-top:1px solid var(--bd);font-size:11px;color:var(--ts);cursor:pointer}
.int-expand:hover{background:var(--sf)}
.jira-flow{display:flex;align-items:center;gap:0;overflow-x:auto;padding:8px 0}
.jira-node{padding:6px 10px;border-radius:6px;font-size:10px;font-weight:600;border:1px solid var(--bd);background:var(--sf);white-space:nowrap;flex-shrink:0;text-align:center;min-width:60px}
.jira-arrow{width:20px;display:flex;align-items:center;justify-content:center;color:var(--td);flex-shrink:0}
.jira-card{background:var(--pn);border:1px solid var(--bd);border-radius:8px;padding:10px;margin-bottom:6px;font-size:11px;cursor:pointer;transition:border-color .15s}
.jira-card:hover{border-color:var(--pr)}
.jira-col{min-width:180px;max-width:220px;flex-shrink:0;background:var(--sf);border-radius:10px;padding:8px}
.tour-overlay{position:fixed;inset:0;z-index:200;pointer-events:none}
.tour-spot{position:fixed;z-index:201;box-shadow:0 0 0 3px var(--pr),0 0 0 9999px rgba(0,0,0,.45);border-radius:8px;pointer-events:none;animation:spotPulse 2s infinite}
@keyframes spotPulse{0%,100%{box-shadow:0 0 0 3px var(--pr),0 0 0 9999px rgba(0,0,0,.45)}50%{box-shadow:0 0 0 5px var(--pr),0 0 0 9999px rgba(0,0,0,.45)}}
.tour-tip{position:fixed;z-index:202;background:var(--pn);border:1px solid var(--bd);border-radius:12px;padding:16px;max-width:280px;box-shadow:0 8px 24px rgba(0,0,0,.15);pointer-events:auto}
.tour-arrow-down{width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:8px solid var(--pn);position:absolute;bottom:-8px;left:24px}
.tour-arrow-up{width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:8px solid var(--pn);position:absolute;top:-8px;left:24px}
.welcome-modal{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;padding:20px}
.welcome-box{background:var(--pn);border-radius:16px;padding:32px;max-width:400px;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.2)}
@media(max-width:900px){.sb{position:fixed;z-index:80;height:100%;transform:translateX(-100%);transition:transform .2s}.sb.open{transform:translateX(0)}.hb{display:block;font-size:18px;padding:4px 8px;cursor:pointer;color:var(--ts);background:none;border:none}.g4{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}.spark-panel{width:calc(100vw - 40px);right:10px}.log-panel{width:100%}}
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;gap:8px;color:#94a3b8">Loading ForgeOps...</div></div>
<script type="module">
import{h,render,Fragment}from'https://esm.sh/preact@10.22.0';
import{useState,useEffect,useRef,useCallback}from'https://esm.sh/preact@10.22.0/hooks';
import htm from'https://esm.sh/htm@3.1.1';
var html=htm.bind(h);
var ORG='askboppana';
var cache={};
function getToken(){return sessionStorage.getItem('fg_pat')||''}
var rateLimit={remaining:5000,limit:5000};
function api(path){
  var k=path;
  if(cache[k]&&Date.now()-cache[k].t<300000)return Promise.resolve(cache[k].d);
  try{
    var hdrs={Accept:'application/vnd.github.v3+json'};var tk=getToken();if(tk)hdrs.Authorization='token '+tk;
    return fetch('https://api.github.com'+path,{headers:hdrs}).then(function(r){
      var rem=r.headers.get('x-ratelimit-remaining');var lim=r.headers.get('x-ratelimit-limit');
      if(rem)rateLimit.remaining=parseInt(rem);if(lim)rateLimit.limit=parseInt(lim);
      if(!r.ok){console.warn('API '+r.status+': '+path);if(!cache[k])toast('API error '+r.status,'warn');return cache[k]?cache[k].d:null}
      return r.json();
    }).then(function(d){if(d)cache[k]={d:d,t:Date.now()};return d}).catch(function(){console.warn('API failed: '+path);if(!cache[k])toast('API request failed','warn');return cache[k]?cache[k].d:null});
  }catch(e){return Promise.resolve(null)}
}
function apiPost(path,body){
  var hdrs={Accept:'application/vnd.github.v3+json','Content-Type':'application/json'};var tk=getToken();if(tk)hdrs.Authorization='token '+tk;
  return fetch('https://api.github.com'+path,{method:'POST',headers:hdrs,body:JSON.stringify(body)}).then(function(r){if(!r.ok)return r.json().then(function(e){throw new Error(e.message||r.status)});if(r.status===204)return null;return r.json()})
}
function apiPut(path,body){
  var hdrs={Accept:'application/vnd.github.v3+json','Content-Type':'application/json'};var tk=getToken();if(tk)hdrs.Authorization='token '+tk;
  return fetch('https://api.github.com'+path,{method:'PUT',headers:hdrs,body:JSON.stringify(body)}).then(function(r){if(!r.ok)return r.json().then(function(e){throw new Error(e.message||r.status)});if(r.status===204)return null;return r.json()})
}

// ── Jira Helper Functions ──
var JIRA_PROXY_DEFAULT='https://jira-proxy.crimson-bird-4c46.workers.dev';
function getJiraConfig(){return{url:(localStorage.getItem('fg_jira_url')||'').replace(/\/jira\/?$/,'').replace(/\/+$/,''),email:localStorage.getItem('fg_jira_email')||'',token:localStorage.getItem('fg_jira_token')||'',project:localStorage.getItem('fg_jira_project')||'',proxy:localStorage.getItem('fg_jira_proxy')||JIRA_PROXY_DEFAULT}}
function saveJiraConfig(cfg){if(cfg.url)localStorage.setItem('fg_jira_url',cfg.url.replace(/\/jira\/?$/,'').replace(/\/+$/,''));if(cfg.email)localStorage.setItem('fg_jira_email',cfg.email);if(cfg.token)localStorage.setItem('fg_jira_token',cfg.token);if(cfg.project)localStorage.setItem('fg_jira_project',cfg.project);if(cfg.proxy)localStorage.setItem('fg_jira_proxy',cfg.proxy)}
var jiraCache={};
function jiraFetch(path,opts){
  var cfg=getJiraConfig();if(!cfg.url||!cfg.email||!cfg.token)return Promise.resolve(null);
  var method=(opts&&opts.method)||'GET';
  var k='jira:'+method+':'+path;
  if(method==='GET'&&jiraCache[k]&&Date.now()-jiraCache[k].t<300000)return Promise.resolve(jiraCache[k].d);
  var auth=btoa(cfg.email+':'+cfg.token);
  var targetUrl=cfg.url+path;
  var fetchUrl=cfg.proxy?cfg.proxy+'?url='+encodeURIComponent(targetUrl):targetUrl;
  var fetchOpts={method:method,headers:{'Authorization':'Basic '+auth,'Content-Type':'application/json'}};
  if(opts&&opts.body)fetchOpts.body=JSON.stringify(opts.body);
  return fetch(fetchUrl,fetchOpts).then(function(r){
    if(!r.ok){console.warn('Jira '+r.status+': '+path);return null}
    if(r.status===204)return{ok:true};return r.json()
  }).then(function(d){if(d&&method==='GET')jiraCache[k]={d:d,t:Date.now()};return d}).catch(function(e){console.warn('Jira request failed: '+path);return null})
}
function jiraApi(path){return jiraFetch(path)}
function jiraPost(path,body){return jiraFetch(path,{method:'POST',body:body})}
function jiraTransition(ticket,statusName){
  return jiraApi('/rest/api/3/issue/'+ticket+'/transitions').then(function(d){
    if(!d||!d.transitions)return null;
    var t=d.transitions.find(function(tr){return tr.name===statusName||tr.to.name===statusName});
    if(!t)return null;
    return jiraPost('/rest/api/3/issue/'+ticket+'/transitions',{transition:{id:t.id}})
  })
}
function extractTicket(str){if(!str)return'';var m=str.match(/[A-Z]+-\d+/);return m?m[0]:''}
function jiraStatusColor(status){
  if(!status)return'var(--td)';var s=status.toLowerCase();
  if(s.indexOf('done')>=0||s.indexOf('deployed')>=0)return'var(--ok)';
  if(s.indexOf('progress')>=0)return'var(--in)';
  if(s.indexOf('ready')>=0)return'var(--wa)';
  if(s.indexOf('complete')>=0)return'#0d9488';
  if(s==='to do'||s==='backlog')return'var(--td)';
  return'var(--pr)';
}

function clearCache(){Object.keys(cache).forEach(function(k){delete cache[k]});Object.keys(jiraCache).forEach(function(k){delete jiraCache[k]})}
function loadData(){
  return fetch('https://raw.githubusercontent.com/'+ORG+'/ForgeOps/main/dashboard-data.json').then(function(r){return r.ok?r.json():null}).catch(function(){return null}).then(function(cmdData){
    if(cmdData&&cmdData.repos&&cmdData.repos.length>0)return{repos:cmdData.repos,source:'json',config:null,jira:cmdData.jira||null};
    return fetch('https://raw.githubusercontent.com/'+ORG+'/ForgeOps/main/forgeops-config.json').then(function(r){return r.ok?r.json():null}).catch(function(){return null}).then(function(cfg){
      if(cfg&&cfg.projects){var repos=[];var projects=cfg.projects||{};for(var key in projects){var proj=projects[key];var pRepos=proj.repos||proj.sample_repos||[];for(var i=0;i<pRepos.length;i++){repos.push({name:typeof pRepos[i]==='string'?pRepos[i]:pRepos[i].name||'',project:key,language:proj.template||''})}}if(repos.length>0)return{repos:repos,source:'config',config:cfg,jira:null}}
      return api('/users/'+ORG+'/repos?per_page=100&sort=updated').then(function(apiRepos){
        if(apiRepos&&apiRepos.length)return{repos:apiRepos.map(function(r){return{name:r.name,language:r.language||''}}),source:'api',config:null,jira:null};
        return{repos:[],source:'none',config:null,jira:null}
      })
    })
  })
}
function loadBranches(repo){
  return api('/repos/'+ORG+'/'+repo+'/branches?per_page=100').then(function(d){
    if(d&&d.length>0)return{branches:d.map(function(b){return b.name}),fromApi:true};
    return{branches:['main','int','qa','stage'],fromApi:false}
  }).catch(function(){return{branches:['main','int','qa','stage'],fromApi:false}})
}
function toast(msg,type){var d=document.createElement('div');d.className='toast'+(type==='err'?' toast-err':type==='warn'?' toast-warn':'');d.textContent=msg;document.body.appendChild(d);setTimeout(function(){d.remove()},4000)}
function ago(d){if(!d)return'';var s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return s+'s';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'d'}
function sCol(s){return{success:'var(--ok)',completed:'var(--ok)',failure:'var(--er)',in_progress:'var(--in)',queued:'var(--wa)',waiting:'var(--wa)'}[s]||'var(--td)'}
function Logo(p){return html`<svg width=${(p&&p.s)||28} height=${(p&&p.s)||28} viewBox="0 0 40 40"><defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#4f46e5"/><stop offset="1" stop-color="#7c3aed"/></linearGradient></defs><rect width="40" height="40" rx="10" fill="url(#lg)"/><path d="M20 8L11 22h6.5l-2 10L27 18h-6.5l2-10z" fill="white" style="animation:boltPulse 3s infinite"/></svg>`}
function Skel(){return html`<div class="sk"></div>`}
function Skels(){return html`<div><${Skel}/><${Skel}/><${Skel}/></div>`}
function Empty(p){return html`<div class="c" style="text-align:center;padding:24px;color:var(--td)">${p.msg||'No data'}</div>`}

var SPARK=[
{p:['users'],q:'How do I invite a team member?',a:'Fill the invite form at the top of the Team page. It opens 3 tabs: GitHub collaborator page, config file editor, and an onboarding issue with checklist.'},
{p:['users'],q:'What role should I assign?',a:'Developer for coders, Tech Lead for reviewers, Release Engineer for deployments, QA for SIT testing, UAT for acceptance testing, Admin for full control.'},
{p:['overview'],q:'What do stat cards show?',a:'Total repos, passing, failing, running, and open Jira ticket counts from the command center data.'},
{p:['pipelines'],q:'How to run a pipeline?',a:'Click Run Pipeline, select repo/workflow/branch, click Run. It dispatches a workflow.'},
{p:['prs'],q:'How to create a PR?',a:'Select repo, pick source and target branches, search Jira tickets for auto-fill, click Create. Opens GitHub compare.'},
{p:['environments'],q:'What is Ready for SIT?',a:'Jira status meaning the build is in QA and ready for System Integration Testing.'},
{p:['security'],q:'SAST vs SCA?',a:'SAST scans source code. SCA scans dependencies for known vulnerabilities.'},
{p:['deploy'],q:'How does bulk deploy work?',a:'Select project and environment, click Deploy. It triggers workflows for all repos in that project.'},
{p:['all'],q:'What is ForgeOps?',a:'Enterprise DevSecOps platform on GitHub Actions replacing Jenkins.'},
{p:['all'],q:'What integrations are available?',a:'Jira, SonarQube, OWASP DC, Gitleaks, Trivy, Syft, Email, Teams, Splunk, Cherwell. All optional.'},
{p:['settings'],q:'How do I connect Jira to ForgeOps?',a:'Go to Settings, fill in your Jira URL, email, API token, and project key. Click Test Connection to verify.'},
{p:['alm'],q:'What is the Jira status flow?',a:'Tickets move through: To Do, In Progress, Ready for Unit Testing, Unit Testing Complete, Ready for SIT, SIT Complete, Ready for UAT, UAT Complete, Deployed to Production, Done.'},
{p:['alm'],q:'How are Jira tickets extracted?',a:'ForgeOps extracts ticket IDs matching the pattern PROJ-123 from branch names in pipeline runs.'}
];
function SparkPanel(p){var s=useState('');var search=s[0];var setS=s[1];var c=useState('');var chat=c[0];var setChat=c[1];var r=useState('');var reply=r[0];var setReply=r[1];
var qa=SPARK.filter(function(i){return i.p.indexOf(p.pg)>=0||i.p.indexOf('all')>=0});

    <div class="jira-flow">${jiraStatuses.map(function(st,i){var count=byStatus[st]||grouped[st].length||0;var items=[html`<div key=${st} class="jira-node" style=${'border-color:'+jiraStatusColor(st)}><div>${st}</div>${count>0&&html`<div style="font-size:14px;font-weight:700;margin-top:2px;color:${jiraStatusColor(st)}">${count}</div>`}</div>`];if(i<jiraStatuses.length-1)items.push(html`<div key=${'a'+i} class="jira-arrow">></div>`);return items})}</div></div>

    ${allJiraTickets.length>0?html`<div style="display:flex;gap:10px;overflow-x:auto;padding-bottom:12px">${jiraStatuses.filter(function(s){return grouped[s].length>0}).map(function(st){return html`<div key=${st} class="jira-col"><div style="font-size:10px;font-weight:700;color:var(--ts);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:flex;align-items:center;gap:4px"><span style=${'display:inline-block;width:8px;height:8px;border-radius:50%;background:'+jiraStatusColor(st)}></span>${st} <span class="ni-badge">${grouped[st].length}</span></div>${grouped[st].map(function(t){return html`<a key=${t.key} href=${cfg.url?cfg.url+'/browse/'+t.key:'#'} target="_blank" rel="noopener noreferrer" class="jira-card" style="text-decoration:none;color:inherit"><div style="display:flex;align-items:center;gap:4px;margin-bottom:2px"><span style="font-weight:600;color:var(--pr)">${t.key}</span>${t.priority&&html`<span style=${'font-size:9px;color:'+(t.priority==='Highest'||t.priority==='High'?'var(--er)':'var(--td)')}>${t.priority==='Highest'?'!!':t.priority==='High'?'!':''}</span>`}</div><div style="color:var(--ts);line-height:1.4">${t.summary||''}</div>${t.assignee&&html`<div style="font-size:9px;color:var(--td);margin-top:4px">${t.assignee}</div>`}</a>`})}</div>`})}</div>`:html`
    <div class="c"><div style="font-size:12px;font-weight:600;margin-bottom:8px">Ticket Tracker</div>
    ${jiraLiveLoading[0]?html`<${Skels}/>`:tickets.length>0?html`<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:11px">
    <thead><tr style="border-bottom:2px solid var(--bd)"><th style="text-align:left;padding:6px 8px;color:var(--ts);font-size:10px">Ticket</th><th style="text-align:left;padding:6px 8px;color:var(--ts);font-size:10px">Repository</th><th style="text-align:left;padding:6px 8px;color:var(--ts);font-size:10px">Environment</th><th style="text-align:left;padding:6px 8px;color:var(--ts);font-size:10px">Time</th></tr></thead>
    <tbody>${tickets.slice(0,20).map(function(t,i){return html`<tr key=${i} style="border-bottom:1px solid var(--bd)"><td style="padding:6px 8px;font-weight:600;color:var(--pr)">${t.ticket}</td><td style="padding:6px 8px">${t.repo}</td><td style="padding:6px 8px"><span class="badge" style="background:var(--sf);color:var(--ts)">${t.env}</span></td><td style="padding:6px 8px;color:var(--td)">${ago(t.time)}</td></tr>`})}</tbody>
    </table></div>`:html`<div style="color:var(--td);font-size:11px;text-align:center;padding:12px">No Jira tickets found. Configure Jira in Settings to see the Kanban board, or use branch naming like feature/PROJ-123-description.</div>`}
    </div>`}

    <div class="c" style="border-left:4px solid var(--in)"><div style="font-size:12px;font-weight:600;margin-bottom:4px">Jira Integration</div><div style="font-size:11px;color:var(--ts);line-height:1.6">${jiraConnected[0]?'Connected to Jira via proxy. Live data displayed above.':'Go to Settings > Jira to configure your connection. All API calls route through the CORS proxy.'}</div>${!jiraConnected[0]&&html`<div style="margin-top:8px"><button class="bt bp" style="font-size:10px" onClick=${function(){nav('settings')}}>Configure in Settings</button></div>`}</div>
  </div>`}

  // ── TEAM ──
  if(page==='users'){
    var invF=inv[0];var setInv=inv[1];var invMsg=useState('');
    var ROLE_COLORS={admin:'#7c3aed',release_engineer:'var(--ok)',developer:'var(--in)',tech_lead:'var(--wa)',qa_team:'var(--er)',uat_team:'var(--er)'};
    function doInvite(){
      if(!invF.username||!invF.name||!invF.email){toast('Fill all fields','err');return}
      var onboardBody=encodeURIComponent('## Onboarding: '+invF.username+'\n\n- [ ] GitHub access granted\n- [ ] Added to forgeops-config.json as '+invF.role+'\n- [ ] First feature branch created\n\nRole: '+invF.role+'\nEmail: '+invF.email);
      window.open('https://github.com/'+ORG+'/ForgeOps/settings/access','_blank');
      toast('Opening GitHub to add collaborator...');
      setTimeout(function(){window.open('https://github.com/'+ORG+'/ForgeOps/edit/main/forgeops-config.json','_blank')},500);
      setTimeout(function(){window.open('https://github.com/'+ORG+'/ForgeOps/issues/new?title=%5BONBOARD%5D+'+encodeURIComponent(invF.username)+'&body='+onboardBody+'&labels=onboarding','_blank')},1000);
      invMsg[1](invF.username);
    }
    var cfgUsers=(config&&config.users)||{};var userList=Object.keys(cfgUsers);
    var PERMS=[['View all pipelines','Y','Y','Y','Own','QA','Stage'],['Create PR to INT','Y','Y','Y','Y','',''],['Promote INT to QA','Y','Y','','','',''],['Promote Stage to Prod','Y','Y','','','',''],['Approve prod deploy','Y','Y','Y','','',''],['Mark SIT Complete','Y','Y','','','Y',''],['Mark UAT Complete','Y','Y','','','','Y'],['Manage users','Y','','','','',''],['View security results','Y','Y','Y','Y','','']];
    return html`<div class="fu">
      <div class="c" style="border-top:4px solid var(--pr)"><div style="font-weight:600;font-size:14px;margin-bottom:10px">Invite Team Member</div><div class="fl">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div><div class="lb">GitHub Username</div><input value=${invF.username} onInput=${function(e){setInv(function(p){return{username:e.target.value,name:p.name,email:p.email,role:p.role}});invMsg[1]('')}} placeholder="jsmith"/></div><div><div class="lb">Full Name</div><input value=${invF.name} onInput=${function(e){setInv(function(p){return{username:p.username,name:e.target.value,email:p.email,role:p.role}})}} placeholder="Jane Smith"/></div></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div><div class="lb">Email</div><input value=${invF.email} onInput=${function(e){setInv(function(p){return{username:p.username,name:p.name,email:e.target.value,role:p.role}})}} placeholder="jane@company.com"/></div><div><div class="lb">Role</div><select value=${invF.role} onChange=${function(e){setInv(function(p){return{username:p.username,name:p.name,email:p.email,role:e.target.value}})}}>${Object.keys(ROLE_DESC).map(function(r){return html`<option key=${r} value=${r}>${r.replace('_',' ')}</option>`})}</select></div></div>
        <div style="background:var(--sf);border-radius:8px;padding:10px;font-size:11px;color:var(--ts)">${ROLE_DESC[invF.role]||''}</div>
        <button class="bt bp" onClick=${doInvite}>Invite Member</button>
        ${invMsg[0]&&html`<div style="background:rgba(5,150,105,.06);border:1px solid rgba(5,150,105,.2);border-radius:8px;padding:12px;font-size:11px;color:var(--ok);line-height:1.7">3 tabs opened for ${invMsg[0]}: GitHub access, config edit, onboarding ticket.</div>`}
      </div></div>
      <div class="c"><div style="font-weight:600;margin-bottom:8px">Current Team (${userList.length})</div>
      <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead><tr style="border-bottom:2px solid var(--bd)"><th style="padding:8px;text-align:left;color:var(--ts);font-size:10px">Username</th><th style="padding:8px;text-align:left;color:var(--ts);font-size:10px">Name</th><th style="padding:8px;text-align:left;color:var(--ts);font-size:10px">Role</th><th style="padding:8px;text-align:left;color:var(--ts);font-size:10px">Email</th></tr></thead>
        <tbody>${userList.map(function(u){var ud=cfgUsers[u];var rc=ROLE_COLORS[ud.role]||'var(--td)';return html`<tr key=${u} style="border-bottom:1px solid var(--bd)"><td style="padding:8px;font-weight:500">${u}</td><td style="padding:8px;color:var(--ts)">${ud.name||'-'}</td><td style="padding:8px"><span class="badge" style=${'background:'+rc+';color:#fff;font-size:9px'}>${(ud.role||'').replace('_',' ')}</span></td><td style="padding:8px;color:var(--ts);font-size:11px">${ud.email||'-'}</td></tr>`})}</tbody>
      </table></div></div>
      <div class="c"><div style="font-weight:600;margin-bottom:8px">Role Permissions Matrix</div>
      <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:11px">
        <thead><tr style="border-bottom:2px solid var(--bd)"><th style="padding:6px;text-align:left;color:var(--ts);font-size:9px">Permission</th><th style="padding:6px;text-align:center;font-size:9px;color:#7c3aed">Admin</th><th style="padding:6px;text-align:center;font-size:9px;color:var(--ok)">Release</th><th style="padding:6px;text-align:center;font-size:9px;color:var(--wa)">Lead</th><th style="padding:6px;text-align:center;font-size:9px;color:var(--in)">Dev</th><th style="padding:6px;text-align:center;font-size:9px;color:var(--er)">QA</th><th style="padding:6px;text-align:center;font-size:9px;color:var(--er)">UAT</th></tr></thead>
        <tbody>${PERMS.map(function(row){return html`<tr key=${row[0]} style="border-bottom:1px solid var(--bd)"><td style="padding:6px;font-weight:500">${row[0]}</td>${row.slice(1).map(function(cell,ci){var bg=cell==='Y'?'rgba(5,150,105,.08)':cell?'rgba(2,132,199,.06)':'transparent';var clr=cell==='Y'?'var(--ok)':cell?'var(--in)':'var(--td)';return html`<td key=${ci} style=${'padding:6px;text-align:center;background:'+bg+';color:'+clr+';font-weight:'+(cell?'600':'400')}>${cell||'-'}</td>`})}</tr>`})}</tbody>
      </table></div></div>
    </div>`}

  // ── SETTINGS ──
  if(page==='settings'){
    var jc=jiraCfg[0];var setJc=jiraCfg[1];var testing=useState(false);var testResult=useState('');
    function testJira(){testing[1](true);testResult[1]('');saveJiraConfig(jc);
      jiraFetch('/rest/api/3/myself').then(function(u){testing[1](false);if(u){jiraConnected[1](true);testResult[1]('Connected as: '+(u.displayName||u.emailAddress||'OK'))}else{testResult[1]('Connection failed. Check URL, credentials, and proxy URL.')}})
    }
    return html`<div class="fu" data-tour="integrations">
    <div class="c" style="margin-bottom:16px"><div style="font-weight:600;margin-bottom:4px">Integration Hub</div><div style="font-size:11px;color:var(--ts);margin-bottom:6px">ForgeOps v6.0 -- ${totalRepos} repos across ${projNames.length} projects</div>${user&&html`<div style="font-size:11px;margin-bottom:8px">Connected as: ${user.login}</div>`}<div style="display:flex;gap:6px"><button class="bt bd" onClick=${function(){sessionStorage.removeItem('fg_pat');setUser(null);toast('Disconnected')}} aria-label="Disconnect account">Disconnect</button><a href=${'https://github.com/'+ORG+'/ForgeOps'} target="_blank" rel="noopener noreferrer" class="bt bs" style="font-size:11px">GitHub Repo</a></div></div>

    <div class="c" style="border-top:4px solid #0284c7;margin-bottom:16px" data-tour="integration-jira"><div style="font-weight:600;font-size:14px;margin-bottom:4px">Jira Configuration</div><div style="font-size:11px;color:var(--ts);margin-bottom:12px;line-height:1.5">Connect Jira to enable ticket tracking across all dashboard pages. All calls route through the CORS proxy.</div>
    <div class="fl">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div><div class="lb">Jira Base URL</div><input value=${jc.url} onInput=${function(e){setJc(function(p){return{url:e.target.value,email:p.email,token:p.token,project:p.project,proxy:p.proxy}})}} placeholder="https://yourorg.atlassian.net"/></div><div><div class="lb">Jira Email</div><input value=${jc.email} onInput=${function(e){setJc(function(p){return{url:p.url,email:e.target.value,token:p.token,project:p.project,proxy:p.proxy}})}} placeholder="you@company.com"/></div></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div><div class="lb">API Token</div><input type="password" value=${jc.token} onInput=${function(e){setJc(function(p){return{url:p.url,email:p.email,token:e.target.value,project:p.project,proxy:p.proxy}})}} placeholder="Your Jira API token"/></div><div><div class="lb">Project Key</div><input value=${jc.project} onInput=${function(e){setJc(function(p){return{url:p.url,email:p.email,token:p.token,project:e.target.value,proxy:p.proxy}})}} placeholder="SCRUM"/></div></div>
      <div><div class="lb">Proxy URL</div><input value=${jc.proxy} onInput=${function(e){setJc(function(p){return{url:p.url,email:p.email,token:p.token,project:p.project,proxy:e.target.value}})}} placeholder=${JIRA_PROXY_DEFAULT}/></div>
      <div style="display:flex;gap:6px;align-items:center"><button class="bt bp" onClick=${function(){saveJiraConfig(jc);toast('Jira settings saved');jiraCfg[1](Object.assign({},jc))}}>Save</button><button class="bt bs" onClick=${testJira}>${testing[0]?'Testing...':'Test Connection'}</button><div style="display:flex;align-items:center;gap:4px"><span style=${'display:inline-block;width:8px;height:8px;border-radius:50%;background:'+(jiraConnected[0]?'var(--ok)':'var(--td)')}></span><span style="font-size:10px;color:var(--ts)">${jiraConnected[0]?'Connected':'Not connected'}</span></div></div>
      ${testResult[0]&&html`<div style=${'font-size:11px;padding:8px;border-radius:6px;background:'+(testResult[0].indexOf('Connected')===0?'rgba(5,150,105,.06)':'rgba(220,38,38,.06)')+';color:'+(testResult[0].indexOf('Connected')===0?'var(--ok)':'var(--er)')}>${testResult[0]}</div>`}
    </div></div>

    <div class="g2" data-tour="integration-teams">
    <${IntegrationCard} color="#7c3aed" title="Microsoft Teams" desc="Send deployment and failure notifications to Teams channels." secrets=${['TEAMS_WEBHOOK_URL']} steps=${['Open Microsoft Teams and navigate to the target channel.','Click the channel name, then Connectors (or Workflows).','Add an Incoming Webhook connector and name it ForgeOps.','Copy the generated webhook URL.','Add it as TEAMS_WEBHOOK_URL in GitHub Actions secrets.']}/>
    <${IntegrationCard} color="#059669" title="Splunk" desc="Forward structured pipeline logs to Splunk via HTTP Event Collector." secrets=${['SPLUNK_HEC_URL','SPLUNK_HEC_TOKEN']} steps=${['In Splunk, go to Settings > Data Inputs > HTTP Event Collector.','Create a new token with a target index for ForgeOps events.','Copy the HEC URL and token value.','Add SPLUNK_HEC_URL and SPLUNK_HEC_TOKEN as GitHub secrets.']} data-tour="integration-splunk"/>
    <${IntegrationCard} color="#d97706" title="Email SMTP" desc="Send deployment alerts and failure notifications via email." secrets=${['SMTP_HOST','SMTP_PORT','SMTP_USER','SMTP_PASS']} steps=${['Obtain SMTP credentials from your email provider.','Common: smtp.gmail.com:587 with an app password for Gmail.','Add SMTP_HOST, SMTP_PORT, SMTP_USER, and SMTP_PASS as secrets.']}/>
    <${IntegrationCard} color="#94a3b8" title="Cherwell / ServiceNow" desc="Create and update ITSM tickets on pipeline events." secrets=${['ITSM_BASE_URL','ITSM_API_KEY']} steps=${['Obtain API credentials from your Cherwell or ServiceNow instance.','Create a dedicated integration user.','Add ITSM_BASE_URL and ITSM_API_KEY as GitHub Actions secrets.']}/>
    <${IntegrationCard} color="#0d9488" title="SonarQube" desc="Run SAST analysis on every pipeline for code quality and security." secrets=${['SONAR_HOST_URL','SONAR_TOKEN']} steps=${['Log in to your SonarQube instance.','Go to My Account > Security > Generate Token.','Add SONAR_HOST_URL and SONAR_TOKEN as GitHub Actions secrets.']}/>
    <${IntegrationCard} color="#8b5cf6" title="GitHub Copilot" desc="AI-powered code suggestions and PR review assistance." secrets=${['COPILOT_ENABLED']} steps=${['Ensure GitHub Copilot is enabled for your organization.','Add COPILOT_ENABLED=true as a GitHub Actions secret.']}/>
    </div>
  </div>`}

  return html`<${Empty} msg="Coming soon"/>`;
}

return html`<div class="app">
  ${sideOpen&&html`<div style="position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:70" onClick=${function(){setSideOpen(false)}}></div>`}
  <div class=${'sb'+(sideOpen?' open':'')}>
    <div style="padding:10px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--bd)"><${Logo} s=${20}/><div style="font-weight:700;font-size:12px">ForgeOps</div></div>
    ${Object.keys(sections).map(function(sec){return html`<${Fragment} key=${sec}><div class="ns">${sec}</div>${sections[sec].map(function(k){var badge=null;if(k==='pipelines'&&running>0)badge=html`<span class="ni-badge">${running}</span>`;if(k==='deploy')badge=html`<span class="ni-badge">${projNames.length}</span>`;if(k==='alm'&&openTicketCount>0)badge=html`<span class="ni-badge">${openTicketCount}</span>`;return html`<div key=${k} class=${'ni'+(page===k?' ac':'')} onClick=${function(){nav(k)}}><span style="flex:1">${labels[k]}</span>${badge}</div>`})}<//>`})}
    <div style="margin-top:auto;padding:8px 10px;border-top:1px solid var(--bd);font-size:9px;color:var(--td)"><span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--ok);margin-right:3px"></span>ForgeOps v6.0${lastRef[0]?' -- '+lastRef[0].toLocaleTimeString():''}</div>
  </div>
  <div class="mn">
    <div class="hd"><button class="hb" onClick=${function(){setSideOpen(!sideOpen)}} aria-label="Toggle menu">Menu</button><span style="font-size:15px;font-weight:700;flex:1">${labels[page]||''}</span><span style=${'font-size:10px;font-weight:500;color:'+(rateLimit.remaining>20?'var(--ok)':rateLimit.remaining>5?'var(--wa)':'var(--er)')}>API: ${rateLimit.remaining}/${rateLimit.limit}</span><button class="bt bs" style="font-size:10px" onClick=${refresh} aria-label="Refresh data">${loading?'...':'Refresh'}</button></div>
    <div class="ct">${renderPage()}</div>
    <div class="spark-btn" onClick=${function(){setSpark(!sparkOpen)}} aria-label="Open Spark assistant"><svg width="20" height="20" viewBox="0 0 40 40"><path d="M20 8L11 22h6.5l-2 10L27 18h-6.5l2-10z" fill="var(--in)" style="animation:sparkGlow 3s infinite"/></svg></div>
    ${sparkOpen&&html`<${SparkPanel} pg=${page} close=${function(){setSpark(false)}} startTour=${startTour}/>`}
    <${LogPanel} run=${logRun} onClose=${function(){setLogRun(null)}}/>
    <${TourOverlay} tour=${tour[0]} step=${tourStep[0]} setStep=${tourStep[1]} setPage=${setPage} onClose=${endTour}/>
    <${WelcomeModal} show=${showWelcome[0]} onClose=${function(){showWelcome[1](false)}} onStart=${function(){startTour('quick-start')}}/>
  </div>
</div>`;
}
render(html`<${App}/>`,document.getElementById('root'));
</script>
</body>
</html>
