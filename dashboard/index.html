<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ForgeOps DevSecOps Platform</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%2326c6da'/><stop offset='1' stop-color='%237c4dff'/></linearGradient></defs><rect width='40' height='40' rx='8' fill='url(%23g)'/><path d='M22 8l-8 16h6l-2 10 10-18h-7z' fill='white'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07090f;--panel:#0c1017;--card:#111621;--surface:#1a2233;--border:#1e2940;--text:#edf2f7;--text-soft:#8b9dc3;--text-dim:#4a5d80;--cyan:#26c6da;--violet:#7c4dff;--success:#06d6a0;--danger:#ef476f;--warning:#ffd166;--info:#118ab2;--sidebar-w:260px;--header-h:60px}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:14px;overflow:hidden}
code,pre,.mono{font-family:'JetBrains Mono',monospace}
a{color:var(--cyan);text-decoration:none}
a:hover{text-decoration:underline}
input,select,textarea,button{font-family:inherit;font-size:inherit;color:inherit;border:none;outline:none;background:none}
button{cursor:pointer}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--panel)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
/* Layout */
.app{display:flex;height:100vh}
.sidebar{width:var(--sidebar-w);background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;transition:transform .25s}
.sidebar-brand{padding:20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.sidebar-brand h1{font-size:18px;font-weight:700;line-height:1}
.sidebar-brand small{display:block;font-size:9px;font-weight:700;letter-spacing:3px;background:linear-gradient(90deg,var(--cyan),var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sidebar-section{padding:16px 12px 4px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim)}
.sidebar-link{display:flex;align-items:center;gap:10px;padding:10px 16px;margin:2px 8px;border-radius:8px;color:var(--text-soft);font-weight:500;cursor:pointer;transition:all .15s}
.sidebar-link:hover,.sidebar-link.active{background:var(--surface);color:var(--text)}
.sidebar-link.active{border-left:3px solid var(--cyan)}
.sidebar-footer{margin-top:auto;padding:16px;border-top:1px solid var(--border);font-size:11px;color:var(--text-dim)}
.sidebar-footer .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.sidebar-footer .dot.on{background:var(--success)}
.sidebar-footer .dot.off{background:var(--danger)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.header{height:var(--header-h);padding:0 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--panel);flex-shrink:0}
.header h2{font-size:20px;font-weight:600}
.header-actions{display:flex;align-items:center;gap:12px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-weight:600;font-size:13px;transition:all .15s}
.btn-primary{background:linear-gradient(135deg,var(--cyan),var(--violet));color:#fff}
.btn-primary:hover{opacity:.85}
.btn-secondary{background:var(--surface);color:var(--text-soft);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--cyan);color:var(--text)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-danger{background:var(--danger);color:#fff}
.btn-success{background:var(--success);color:#07090f}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),var(--violet));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff}
.content{flex:1;overflow-y:auto;padding:24px}
/* Cards & Grid */
.grid{display:grid;gap:16px}
.grid-4{grid-template-columns:repeat(4,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-2{grid-template-columns:repeat(2,1fr)}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.stat-card{text-align:center}
.stat-card .val{font-size:32px;font-weight:700}
.stat-card .label{font-size:12px;color:var(--text-soft);margin-top:4px}
/* Chart */
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:140px;padding-top:8px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{width:100%;border-radius:4px 4px 0 0;transition:height .4s;min-height:2px}
.bar-label{font-size:10px;color:var(--text-dim)}
/* Table */
.tbl{width:100%;border-collapse:collapse}
.tbl th,.tbl td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
.tbl th{font-size:11px;text-transform:uppercase;color:var(--text-dim);letter-spacing:1px;font-weight:600}
.tbl tr:hover td{background:var(--surface)}
/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-success{background:rgba(6,214,160,.12);color:var(--success)}
.badge-danger{background:rgba(239,71,111,.12);color:var(--danger)}
.badge-warning{background:rgba(255,209,102,.12);color:var(--warning)}
.badge-info{background:rgba(17,138,178,.12);color:var(--info)}
.badge-neutral{background:var(--surface);color:var(--text-soft)}
/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:-1px}
.tab{padding:10px 16px;font-weight:600;color:var(--text-dim);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab:hover{color:var(--text-soft)}
.tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
/* Forms */
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text-soft);margin-bottom:5px}
.input{width:100%;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);transition:border-color .15s}
.input:focus{border-color:var(--cyan)}
select.input{appearance:auto}
/* Toast */
.toast-wrap{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 20px;border-radius:10px;font-weight:500;font-size:13px;animation:slideIn .25s;max-width:360px}
.toast-success{background:var(--success);color:#07090f}
.toast-error{background:var(--danger);color:#fff}
.toast-info{background:var(--info);color:#fff}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;width:480px;max-width:92vw;max-height:85vh;overflow-y:auto}
.modal h3{margin-bottom:20px;font-size:18px}
/* Pipeline stages */
.stage-graph{display:flex;align-items:center;gap:0;flex-wrap:wrap;margin:12px 0}
.stage-box{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600}
.stage-arrow{color:var(--text-dim);margin:0 4px;font-size:16px}
/* Env cards */
.env-flow{display:flex;align-items:flex-start;gap:0;overflow-x:auto;padding:8px 0}
.env-arrow{display:flex;align-items:center;font-size:28px;color:var(--text-dim);padding:40px 4px 0}
.env-card{flex:1;min-width:200px}
/* Coverage bar */
.cov-bar-bg{height:8px;background:var(--surface);border-radius:4px;overflow:hidden}
.cov-bar-fg{height:100%;border-radius:4px;transition:width .4s}
/* Skeleton */
.skel{background:linear-gradient(90deg,var(--surface) 25%,var(--border) 50%,var(--surface) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px;height:20px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
/* Login */
/* login styles removed — internal tool, minimal token prompt only */
/* Empty */
.empty{text-align:center;padding:48px;color:var(--text-dim)}
.empty svg{opacity:.25;margin-bottom:16px}
/* Responsive */
.menu-toggle{display:none;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);font-size:18px}
@media(max-width:900px){
  .sidebar{position:fixed;z-index:999;height:100%;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .menu-toggle{display:block}
  .login-right{display:none}
  .grid-4{grid-template-columns:repeat(2,1fr)}
  .env-flow{flex-direction:column;align-items:stretch}
  .env-arrow{padding:4px 0;justify-content:center;transform:rotate(90deg)}
}
@media(max-width:600px){
  .grid-4,.grid-3,.grid-2{grid-template-columns:1fr}
  .content{padding:16px}
}
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#8b9dc3;font-family:sans-serif"><p>Loading ForgeOps Dashboard...</p></div></div>
<div class="toast-wrap" id="toasts"></div>
<script type="module">
import{h,render,Component}from'https://esm.sh/preact@10.22.0';
import{useState,useEffect,useCallback,useRef,useMemo}from'https://esm.sh/preact@10.22.0/hooks';
import htm from'https://esm.sh/htm@3.1.1';
const html=htm.bind(h);
try{
/* ── Helpers ── */
const PAGES=['overview','pipelines','prs','environments','security','settings'];
const PAGE_TITLES={overview:'Overview',pipelines:'Pipelines',prs:'Pull Requests',environments:'Environments',security:'Security',settings:'Settings'};
const ENVS=['INT','QA','STAGE','PROD'];
const PR_FLOWS=[['Feature','INT'],['INT','QA'],['QA','STAGE'],['STAGE','PROD']];
const DAY_NAMES=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const cache={};
const CACHE_TTL=60000;

function store(k,v){if(v===undefined){return localStorage.getItem(k)||sessionStorage.getItem(k)}sessionStorage.setItem(k,v)}
function ss(k,v){if(v===undefined){return localStorage.getItem(k)||sessionStorage.getItem(k)}sessionStorage.setItem(k,v)}
function persist(k,v){localStorage.setItem(k,v);sessionStorage.setItem(k,v)}
function clearAuth(){['pat','user','avatar'].forEach(function(k){sessionStorage.removeItem(k);localStorage.removeItem(k)})}

function toast(msg,type){
  const el=document.getElementById('toasts');if(!el)return;
  const t=document.createElement('div');t.className='toast toast-'+(type||'info');t.textContent=msg;
  el.appendChild(t);setTimeout(function(){t.remove()},4000);
}

function api(path,opts){
  var token=ss('pat');var base='https://api.github.com';
  var url=base+path;var key=url+JSON.stringify(opts||{});
  var method=(opts&&opts.method)||'GET';
  if(method==='GET'&&cache[key]&&Date.now()-cache[key].t<CACHE_TTL){
    return Promise.resolve(cache[key].d);
  }
  var headers={'Authorization':'token '+token,'Accept':'application/vnd.github+json'};
  if(opts&&opts.body)headers['Content-Type']='application/json';
  return fetch(url,{method:method,headers:headers,body:opts&&opts.body?JSON.stringify(opts.body):undefined})
    .then(function(r){
      if(!r.ok)return r.json().then(function(e){throw new Error(e.message||r.statusText)});
      if(r.status===204)return null;return r.json();
    }).then(function(d){if(method==='GET'){cache[key]={d:d,t:Date.now()}}return d;});
}

function statusBadge(s){
  var map={completed:'success',success:'success',failure:'danger',cancelled:'warning',in_progress:'info',queued:'neutral',pending:'info'};
  return html`<span class="badge badge-${map[s]||'neutral'}">${s||'unknown'}</span>`;
}

function Logo(){
  return html`<svg width="40" height="40" viewBox="0 0 40 40"><defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#26c6da"/><stop offset="1" stop-color="#7c4dff"/></linearGradient></defs><rect width="40" height="40" rx="8" fill="url(#lg)"/><path d="M22 8l-8 16h6l-2 10 10-18h-7z" fill="white"/></svg>`;
}

function EmptyState(props){return html`<div class="empty"><${Logo}/><p>${props.msg||'No data yet'}</p></div>`}
function Skeleton(){return html`<div class="skel" style="margin:8px 0"/>`}
function LoadingBlock(){return html`<div>${[1,2,3].map(function(){return html`<${Skeleton}/>`})}</div>`}

/* ── App ── */
function App(){
  const[page,setPage]=useState('overview');
  const[user,setUser]=useState(null);
  const[sideOpen,setSideOpen]=useState(false);
  const tick=useRef(null);
  const[refreshKey,setRefreshKey]=useState(0);

  const[authChecking,setAuthChecking]=useState(true);
  useEffect(function(){
    var p=ss('pat');
    if(!p){setAuthChecking(false);return}
    api('/user').then(function(u){
      ss('user',JSON.stringify(u));setUser(u);setAuthChecking(false);
    }).catch(function(){
      clearAuth();setAuthChecking(false);toast('Session expired. Please sign in again.','error');
    });
  },[]);

  useEffect(function(){
    if(!user)return;
    var id=setInterval(function(){setRefreshKey(function(k){return k+1})},20000);
    tick.current=id;
    return function(){clearInterval(id)};
  },[user]);

  useEffect(function(){
    function onKey(e){
      if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
      if(e.key==='Escape'){setSideOpen(false);return}
      if(e.key==='r'){setRefreshKey(function(k){return k+1});return}
      var n=parseInt(e.key);if(n>=1&&n<=6){setPage(PAGES[n-1]);setSideOpen(false)}
    }
    window.addEventListener('keydown',onKey);return function(){window.removeEventListener('keydown',onKey)}
  },[]);

  function doLogin(pat,remember){
    if(remember){persist('pat',pat)}else{ss('pat',pat)}
    return api('/user').then(function(u){
      var save=remember?persist:ss;
      save('user',JSON.stringify(u));
      if(u.avatar_url)save('avatar',u.avatar_url);
      setUser(u);toast('Signed in as '+u.login,'success');
    }).catch(function(e){clearAuth();toast('Auth failed: '+e.message,'error');throw e});
  }
  function logout(){clearAuth();setUser(null);Object.keys(cache).forEach(function(k){delete cache[k]})}
  function nav(p){setPage(p);setSideOpen(false)}
  function refresh(){Object.keys(cache).forEach(function(k){delete cache[k]});setRefreshKey(function(k){return k+1});toast('Refreshed','info')}

  if(authChecking)return html`<div style="display:flex;align-items:center;justify-content:center;height:100vh;gap:12px;color:var(--cyan)"><${Logo}/>Loading...</div>`;
  if(!user)return html`<${TokenPrompt} onLogin=${doLogin}/>`;

  var initials=(user.login||'?').slice(0,2).toUpperCase();
  var connected=!!ss('pat');

  return html`<div class="app">
    <aside class=${"sidebar"+(sideOpen?" open":"")}>
      <div class="sidebar-brand"><${Logo}/><div><h1>ForgeOps</h1><small>DEVSECOPS</small></div></div>
      <div class="sidebar-section">Delivery</div>
      ${['overview','pipelines','prs','environments'].map(function(p){
        return html`<div class=${"sidebar-link"+(page===p?" active":"")} onClick=${function(){nav(p)}}>${PAGE_TITLES[p]}</div>`
      })}
      <div class="sidebar-section">Quality</div>
      <div class=${"sidebar-link"+(page==='security'?" active":"")} onClick=${function(){nav('security')}}>Security</div>
      <div class="sidebar-section">Operations</div>
      <div class=${"sidebar-link"+(page==='settings'?" active":"")} onClick=${function(){nav('settings')}}>Settings</div>
      <div class="sidebar-footer"><span class=${"dot "+(connected?"on":"off")}/> ${connected?'Connected':'Disconnected'}</div>
    </aside>
    <div class="main">
      <header class="header">
        <div style="display:flex;align-items:center;gap:12px">
          <button class="menu-toggle" onClick=${function(){setSideOpen(!sideOpen)}}>☰</button>
          <h2>${PAGE_TITLES[page]||'Dashboard'}</h2>
        </div>
        <div class="header-actions">
          <button class="btn btn-secondary btn-sm" onClick=${refresh}>↻ Refresh</button>
          <div class="avatar">${initials}</div>
        </div>
      </header>
      <div class="content">
        ${page==='overview'&&html`<${OverviewPage} key=${refreshKey} user=${user}/>`}
        ${page==='pipelines'&&html`<${PipelinesPage} key=${refreshKey} user=${user}/>`}
        ${page==='prs'&&html`<${PRsPage} key=${refreshKey} user=${user}/>`}
        ${page==='environments'&&html`<${EnvironmentsPage} key=${refreshKey} user=${user}/>`}
        ${page==='security'&&html`<${SecurityPage} key=${refreshKey} user=${user}/>`}
        ${page==='settings'&&html`<${SettingsPage} user=${user} onLogout=${logout}/>`}
      </div>
    </div>
  </div>`;
}

/* ── Token Prompt (minimal — no login page, just a quick token entry) ── */
function TokenPrompt(props){
  const[pat,setPat]=useState('');
  const[loading,setLoading]=useState(false);
  function submit(e){
    e.preventDefault();if(!pat.trim()){toast('Token required','error');return}
    setLoading(true);props.onLogin(pat.trim(),true).catch(function(){}).finally(function(){setLoading(false)});
  }
  return html`<div style="display:flex;align-items:center;justify-content:center;height:100vh;padding:24px">
    <div style="max-width:420px;width:100%;text-align:center">
      <${Logo}/><h1 style="font-size:22px;margin:12px 0 4px">ForgeOps</h1>
      <p style="color:var(--text-soft);font-size:13px;margin-bottom:24px">Paste your GitHub token to continue. <a href="https://github.com/settings/tokens/new?description=ForgeOps&scopes=repo,workflow" target="_blank" rel="noopener" style="color:var(--cyan)">Create one here →</a></p>
      <form onSubmit=${submit} style="display:flex;gap:8px">
        <input class="input" type="password" value=${pat} onInput=${function(e){setPat(e.target.value)}} placeholder="ghp_..." style="flex:1;font-family:var(--mono)"/>
        <button class="btn btn-primary" disabled=${loading}>${loading?'...':'Go'}</button>
      </form>
      <p style="color:var(--text-dim);font-size:11px;margin-top:12px">Token is saved in this browser. Sign out from Settings.</p>
    </div>
  </div>`;
}

/* ── Overview ── */
function OverviewPage(props){
  const[data,setData]=useState(null);
  const[runs,setRuns]=useState(null);
  useEffect(function(){
    var owner=props.user.login;
    api('/user/repos?per_page=100&sort=updated').then(function(repos){
      setData({repos:repos});
      var repoNames=repos.slice(0,5).map(function(r){return r.full_name});
      return Promise.all(repoNames.map(function(name){return api('/repos/'+name+'/actions/runs?per_page=15').catch(function(){return{workflow_runs:[]}})}));
    }).then(function(results){
      var all=[];results.forEach(function(r){if(r&&r.workflow_runs)all=all.concat(r.workflow_runs)});
      all.sort(function(a,b){return new Date(b.created_at)-new Date(a.created_at)});
      setRuns(all.slice(0,15));
    }).catch(function(e){toast('Failed to load overview: '+e.message,'error')});
  },[]);

  if(!data)return html`<${LoadingBlock}/>`;
  var totalRuns=runs?runs.length:0;
  var successRuns=runs?runs.filter(function(r){return r.conclusion==='success'}).length:0;
  var rate=totalRuns?Math.round(successRuns/totalRuns*100):0;
  var active=runs?runs.filter(function(r){return r.status==='in_progress'||r.status==='queued'}).length:0;

  var dayBuckets=[0,0,0,0,0,0,0];var dayLabels=[];
  for(var i=6;i>=0;i--){var d=new Date();d.setDate(d.getDate()-i);dayLabels.push(DAY_NAMES[d.getDay()]);
    if(runs)runs.forEach(function(r){var rd=new Date(r.created_at);if(rd.toDateString()===d.toDateString())dayBuckets[6-i]++});
  }
  var maxB=Math.max.apply(null,dayBuckets)||1;

  return html`<div>
    <div class="grid grid-4" style="margin-bottom:20px">
      <div class="card stat-card"><div class="val" style="color:var(--cyan)">${active}</div><div class="label">Active Runs</div></div>
      <div class="card stat-card"><div class="val" style="color:var(--success)">${rate}%</div><div class="label">Success Rate</div></div>
      <div class="card stat-card"><div class="val" style="color:var(--violet)">${data.repos?data.repos.length:0}</div><div class="label">Repositories</div></div>
      <div class="card stat-card"><div class="val" style="color:var(--warning)">${totalRuns}</div><div class="label">Recent Runs</div></div>
    </div>
    <div class="grid grid-2">
      <div class="card"><div class="card-header"><strong>Runs (7 days)</strong></div>
        <div class="bar-chart">${dayBuckets.map(function(v,idx){
          var pct=Math.round(v/maxB*100);
          return html`<div class="bar-col"><div class="bar" style=${"height:"+pct+"%;background:linear-gradient(0deg,var(--cyan),var(--violet))"}></div><span class="bar-label">${dayLabels[idx]}</span></div>`;
        })}</div>
      </div>
      <div class="card"><div class="card-header"><strong>Recent Activity</strong></div>
        ${!runs||!runs.length?html`<${EmptyState} msg="No recent runs"/>`:html`<div style="max-height:260px;overflow-y:auto">
          <table class="tbl"><thead><tr><th>Repo</th><th>Status</th><th>When</th></tr></thead><tbody>
          ${runs.slice(0,15).map(function(r){return html`<tr><td class="mono" style="font-size:12px">${r.repository?r.repository.name:'-'}</td><td>${statusBadge(r.conclusion||r.status)}</td><td style="color:var(--text-dim);font-size:12px">${new Date(r.created_at).toLocaleDateString()}</td></tr>`})}
          </tbody></table></div>`}
      </div>
    </div>
  </div>`;
}

/* ── Pipelines ── */
function PipelinesPage(props){
  const[repos,setRepos]=useState(null);
  const[expanded,setExpanded]=useState(null);
  const[jobs,setJobs]=useState({});
  const[modal,setModal]=useState(false);
  const[workflows,setWorkflows]=useState([]);
  const[branches,setBranches]=useState([]);
  const[selRepo,setSelRepo]=useState('');
  const[selWf,setSelWf]=useState('');
  const[selBr,setSelBr]=useState('');

  useEffect(function(){
    api('/user/repos?per_page=100&sort=updated').then(function(repos){
      return Promise.all(repos.slice(0,20).map(function(repo){
        return api('/repos/'+repo.full_name+'/actions/runs?per_page=1').then(function(d){
          return Object.assign({},repo,{latestRun:(d.workflow_runs&&d.workflow_runs[0])||null});
        }).catch(function(){return Object.assign({},repo,{latestRun:null})});
      }));
    }).then(setRepos).catch(function(e){toast('Error: '+e.message,'error')});
  },[]);

  function toggle(repo){
    if(expanded===repo.full_name){setExpanded(null);return}
    setExpanded(repo.full_name);
    if(repo.latestRun&&!jobs[repo.latestRun.id]){
      api('/repos/'+repo.full_name+'/actions/runs/'+repo.latestRun.id+'/jobs').then(function(d){
        var nj=Object.assign({},jobs);nj[repo.latestRun.id]=d.jobs||[];setJobs(nj);
      }).catch(function(){});
    }
  }

  function openModal(){
    setModal(true);
    if(!repos||!repos.length)return;
    var first=repos[0];setSelRepo(first.full_name);
    loadWfBr(first.full_name);
  }
  function loadWfBr(repoName){
    setSelRepo(repoName);
    api('/repos/'+repoName+'/actions/workflows').then(function(d){setWorkflows(d.workflows||[]);if(d.workflows&&d.workflows.length)setSelWf(d.workflows[0].id+'')}).catch(function(){setWorkflows([])});
    api('/repos/'+repoName+'/branches?per_page=30').then(function(d){setBranches(d||[]);if(d&&d.length)setSelBr(d[0].name)}).catch(function(){setBranches([])});
  }
  function dispatch(){
    if(!selRepo||!selWf||!selBr){toast('Select all fields','error');return}
    api('/repos/'+selRepo+'/actions/workflows/'+selWf+'/dispatches',{method:'POST',body:{ref:selBr}})
      .then(function(){toast('Pipeline dispatched','success');setModal(false)})
      .catch(function(e){toast('Dispatch failed: '+e.message,'error')});
  }

  var conclusionColor={success:'var(--success)',failure:'var(--danger)',cancelled:'var(--warning)',skipped:'var(--text-dim)'};

  if(!repos)return html`<${LoadingBlock}/>`;
  return html`<div>
    <div style="display:flex;justify-content:space-between;margin-bottom:16px">
      <span style="color:var(--text-soft)">${repos.length} repositories</span>
      <button class="btn btn-primary btn-sm" onClick=${openModal}>Run Pipeline</button>
    </div>
    ${repos.map(function(repo){
      var lr=repo.latestRun;var isExp=expanded===repo.full_name;
      return html`<div class="card" style="margin-bottom:8px;cursor:pointer" onClick=${function(){toggle(repo)}}>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div><strong>${repo.name}</strong> <span style="color:var(--text-dim);font-size:12px;margin-left:8px">${repo.full_name}</span></div>
          <div style="display:flex;align-items:center;gap:8px">
            ${lr?statusBadge(lr.conclusion||lr.status):html`<span class="badge badge-neutral">no runs</span>`}
            ${lr&&html`<a class="btn btn-secondary btn-sm" href=${lr.html_url} target="_blank" onClick=${function(e){e.stopPropagation()}}>Logs</a>`}
            <span style="color:var(--text-dim)">${isExp?'▲':'▼'}</span>
          </div>
        </div>
        ${isExp&&lr&&jobs[lr.id]&&html`<div class="stage-graph" onClick=${function(e){e.stopPropagation()}}>
          ${jobs[lr.id].map(function(j,i){return html`
            ${i>0&&html`<span class="stage-arrow">→</span>`}
            <span class="stage-box" style=${"background:"+(conclusionColor[j.conclusion]||'var(--info)')+";color:#fff"}>${j.name}</span>`})}
        </div>`}
        ${isExp&&lr&&!jobs[lr.id]&&html`<${Skeleton}/>`}
      </div>`;
    })}
    ${modal&&html`<div class="modal-overlay" onClick=${function(){setModal(false)}}><div class="modal" onClick=${function(e){e.stopPropagation()}}>
      <h3>Run Pipeline</h3>
      <div class="field"><label>Repository</label><select class="input" value=${selRepo} onChange=${function(e){loadWfBr(e.target.value)}}>${repos.map(function(r){return html`<option value=${r.full_name}>${r.full_name}</option>`})}</select></div>
      <div class="field"><label>Workflow</label><select class="input" value=${selWf} onChange=${function(e){setSelWf(e.target.value)}}>${workflows.map(function(w){return html`<option value=${w.id}>${w.name}</option>`})}</select></div>
      <div class="field"><label>Branch</label><select class="input" value=${selBr} onChange=${function(e){setSelBr(e.target.value)}}>${branches.map(function(b){return html`<option value=${b.name}>${b.name}</option>`})}</select></div>
      <div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn btn-secondary" onClick=${function(){setModal(false)}}>Cancel</button><button class="btn btn-primary" onClick=${dispatch}>Dispatch</button></div>
    </div></div>`}
  </div>`;
}

/* ── Pull Requests ── */
function PRsPage(props){
  const[tab,setTab]=useState('create');
  const[repos,setRepos]=useState([]);
  const[branches,setBranches]=useState([]);
  const[selRepo,setSelRepo]=useState('');
  const[srcBr,setSrcBr]=useState('');
  const[tgtBr,setTgtBr]=useState('');
  const[title,setTitle]=useState('');
  const[desc,setDesc]=useState('');
  const[jira,setJira]=useState('');
  const[openPRs,setOpenPRs]=useState([]);
  const[mergedPRs,setMergedPRs]=useState([]);
  const[loading,setLoading]=useState(false);

  useEffect(function(){
    api('/user/repos?per_page=100&sort=updated').then(function(r){setRepos(r||[]);if(r&&r.length){setSelRepo(r[0].full_name);loadBranches(r[0].full_name)}}).catch(function(){});
  },[]);
  useEffect(function(){if(tab==='open')loadOpen();if(tab==='merged')loadMerged()},[tab]);

  function loadBranches(name){
    setSelRepo(name);
    api('/repos/'+name+'/branches?per_page=50').then(function(b){setBranches(b||[]);if(b&&b.length>=2){setSrcBr(b[0].name);setTgtBr(b.length>1?b[1].name:b[0].name)}}).catch(function(){setBranches([])});
  }
  function loadOpen(){
    if(!repos.length)return;
    Promise.all(repos.slice(0,10).map(function(r){return api('/repos/'+r.full_name+'/pulls?state=open&per_page=5').catch(function(){return[]})}))
      .then(function(all){var flat=[];all.forEach(function(a){flat=flat.concat(a)});setOpenPRs(flat)});
  }
  function loadMerged(){
    if(!repos.length)return;
    Promise.all(repos.slice(0,10).map(function(r){return api('/repos/'+r.full_name+'/pulls?state=closed&per_page=5').catch(function(){return[]})}))
      .then(function(all){var flat=[];all.forEach(function(a){flat=flat.concat(a)});setMergedPRs(flat.filter(function(p){return p.merged_at}).slice(0,15))});
  }
  function quickCreate(src,tgt){
    if(!selRepo){toast('Select a repo first','error');return}
    setSrcBr(src);setTgtBr(tgt);setTitle(src+' -> '+tgt+' promotion');
  }
  function createPR(){
    if(!selRepo||!srcBr||!tgtBr||!title){toast('Fill all required fields','error');return}
    setLoading(true);
    var body=desc;if(jira)body='Jira: '+jira+'\n\n'+body;
    api('/repos/'+selRepo+'/pulls',{method:'POST',body:{title:title,head:srcBr,base:tgtBr,body:body}})
      .then(function(pr){toast('PR #'+pr.number+' created','success');setTitle('');setDesc('');setJira('')})
      .catch(function(e){toast('Failed: '+e.message,'error')})
      .finally(function(){setLoading(false)});
  }
  function approvePR(pr){
    api('/repos/'+pr.base.repo.full_name+'/pulls/'+pr.number+'/reviews',{method:'POST',body:{event:'APPROVE'}})
      .then(function(){toast('Approved PR #'+pr.number,'success');loadOpen()}).catch(function(e){toast(e.message,'error')});
  }
  function mergePR(pr){
    api('/repos/'+pr.base.repo.full_name+'/pulls/'+pr.number+'/merge',{method:'PUT',body:{merge_method:'squash'}})
      .then(function(){toast('Merged PR #'+pr.number,'success');loadOpen()}).catch(function(e){toast(e.message,'error')});
  }

  return html`<div>
    <div class="tabs">
      ${['create','open','merged'].map(function(t){return html`<div class=${"tab"+(tab===t?" active":"")} onClick=${function(){setTab(t)}}>${t.charAt(0).toUpperCase()+t.slice(1)}</div>`})}
    </div>
    ${tab==='create'&&html`<div>
      <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">
        ${PR_FLOWS.map(function(f){return html`<button class="btn btn-secondary btn-sm" onClick=${function(){quickCreate(f[0],f[1])}}>${f[0]} → ${f[1]}</button>`})}
      </div>
      <div class="grid grid-2">
        <div class="field"><label>Repository</label><select class="input" value=${selRepo} onChange=${function(e){loadBranches(e.target.value)}}>${repos.map(function(r){return html`<option value=${r.full_name}>${r.full_name}</option>`})}</select></div>
        <div/>
        <div class="field"><label>Source Branch</label><select class="input" value=${srcBr} onChange=${function(e){setSrcBr(e.target.value)}}>${branches.map(function(b){return html`<option value=${b.name}>${b.name}</option>`})}</select></div>
        <div class="field"><label>Target Branch</label><select class="input" value=${tgtBr} onChange=${function(e){setTgtBr(e.target.value)}}>${branches.map(function(b){return html`<option value=${b.name}>${b.name}</option>`})}</select></div>
      </div>
      <div class="field"><label>Jira Ticket</label><input class="input" value=${jira} onInput=${function(e){setJira(e.target.value)}} placeholder="PROJ-123"/></div>
      <div class="field"><label>Title</label><input class="input" value=${title} onInput=${function(e){setTitle(e.target.value)}} placeholder="PR title"/></div>
      <div class="field"><label>Description</label><textarea class="input" rows="3" value=${desc} onInput=${function(e){setDesc(e.target.value)}} placeholder="Details..."/></div>
      <button class="btn btn-primary" onClick=${createPR} disabled=${loading}>${loading?'Creating...':'Create Pull Request'}</button>
    </div>`}
    ${tab==='open'&&html`<div>
      ${!openPRs.length?html`<${EmptyState} msg="No open pull requests"/>`:openPRs.map(function(pr){
        return html`<div class="card" style="margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div><a href=${pr.html_url} target="_blank"><strong>#${pr.number}</strong> ${pr.title}</a><div style="font-size:12px;color:var(--text-dim)">${pr.base.repo.full_name} · ${pr.head.ref} → ${pr.base.ref}</div></div>
            <div style="display:flex;gap:6px">
              <button class="btn btn-success btn-sm" onClick=${function(){approvePR(pr)}}>Approve</button>
              <button class="btn btn-primary btn-sm" onClick=${function(){mergePR(pr)}}>Merge</button>
            </div>
          </div>
        </div>`;
      })}</div>`}
    ${tab==='merged'&&html`<div>
      ${!mergedPRs.length?html`<${EmptyState} msg="No recently merged PRs"/>`:html`<table class="tbl"><thead><tr><th>PR</th><th>Repo</th><th>Merged</th></tr></thead><tbody>
        ${mergedPRs.map(function(pr){return html`<tr><td><a href=${pr.html_url} target="_blank">#${pr.number} ${pr.title}</a></td><td style="color:var(--text-dim);font-size:12px">${pr.base.repo.full_name}</td><td style="color:var(--text-dim);font-size:12px">${new Date(pr.merged_at).toLocaleDateString()}</td></tr>`})}
      </tbody></table>`}
    </div>`}
  </div>`;
}

/* ── Environments ── */
function EnvironmentsPage(props){
  const[repos,setRepos]=useState([]);
  const[deploys,setDeploys]=useState({});
  const[completed,setCompleted]=useState({});

  useEffect(function(){
    api('/user/repos?per_page=100&sort=updated').then(function(r){
      setRepos(r||[]);
      var envD={};ENVS.forEach(function(e){envD[e]=[]});
      return Promise.all((r||[]).slice(0,10).map(function(repo){
        return api('/repos/'+repo.full_name+'/deployments?per_page=5').then(function(deps){
          (deps||[]).forEach(function(d){
            var env=(d.environment||'').toUpperCase();
            ENVS.forEach(function(e){if(env.indexOf(e)!==-1&&envD[e].length<5)envD[e].push(Object.assign({},d,{repo_name:repo.full_name}))});
          });
        }).catch(function(){});
      })).then(function(){setDeploys(envD)});
    }).catch(function(){});
  },[]);

  function markComplete(env,depId){
    var nC=Object.assign({},completed);nC[env+'-'+depId]=true;setCompleted(nC);toast(env+' deploy marked complete','success');
  }
  function promote(from,to){toast('Promotion '+from+' → '+to+' triggered','info')}

  return html`<div>
    <div class="env-flow">
      ${ENVS.map(function(env,i){
        var envDeps=deploys[env]||[];
        return html`
          ${i>0&&html`<div class="env-arrow">→</div>`}
          <div class="env-card card">
            <div style="text-align:center;margin-bottom:12px"><span class="badge badge-info" style="font-size:14px;padding:6px 18px">${env}</span></div>
            ${!envDeps.length?html`<p style="color:var(--text-dim);font-size:12px;text-align:center">No deployments</p>`:envDeps.map(function(d){
              var done=completed[env+'-'+d.id];
              return html`<div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:12px">
                <div class="mono" style="color:var(--text-soft)">${d.repo_name}</div>
                <div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px">
                  ${done?html`<span class="badge badge-success">Complete</span>`:html`<span class="badge badge-warning">Pending</span>`}
                  ${!done&&html`<button class="btn btn-sm btn-secondary" onClick=${function(){markComplete(env,d.id)}}>Mark Complete</button>`}
                </div>
              </div>`;
            })}
            ${i<ENVS.length-1&&html`<button class="btn btn-primary btn-sm" style="width:100%;justify-content:center;margin-top:12px" onClick=${function(){promote(env,ENVS[i+1])}}>Promote to ${ENVS[i+1]}</button>`}
          </div>`;
      })}
    </div>
  </div>`;
}

/* ── Security ── */
function SecurityPage(props){
  const[alerts,setAlerts]=useState(null);
  const[repos,setRepos]=useState([]);

  useEffect(function(){
    api('/user/repos?per_page=100&sort=updated').then(function(r){
      setRepos(r||[]);
      return Promise.all((r||[]).slice(0,10).map(function(repo){
        return api('/repos/'+repo.full_name+'/vulnerability-alerts').then(function(){return{repo:repo.full_name,enabled:true}}).catch(function(){return{repo:repo.full_name,enabled:false}});
      }));
    }).then(function(results){setAlerts(results||[])}).catch(function(){setAlerts([])});
  },[]);

  var enabled=alerts?alerts.filter(function(a){return a.enabled}).length:0;
  var total=alerts?alerts.length:0;
  var pct=total?Math.round(enabled/total*100):0;

  return html`<div>
    <div class="grid grid-4" style="margin-bottom:20px">
      <div class="card stat-card"><div class="val" style="color:var(--success)">${enabled}</div><div class="label">Repos with Alerts</div></div>
      <div class="card stat-card"><div class="val" style="color:var(--cyan)">${total}</div><div class="label">Scanned Repos</div></div>
      <div class="card stat-card"><div class="val" style="color:var(--violet)">${pct}%</div><div class="label">Coverage</div></div>
      <div class="card stat-card"><div class="val" style="color:var(--warning)">Free</div><div class="label">Tier</div></div>
    </div>
    <div class="grid grid-2">
      <div class="card">
        <div class="card-header"><strong>Security Coverage</strong></div>
        <div style="margin-bottom:12px"><span style="font-size:12px;color:var(--text-soft)">Dependabot Alerts</span>
          <div class="cov-bar-bg" style="margin-top:4px"><div class="cov-bar-fg" style=${"width:"+pct+"%;background:var(--success)"}/></div>
        </div>
        <div><span style="font-size:12px;color:var(--text-soft)">Code Scanning (requires GHAS)</span>
          <div class="cov-bar-bg" style="margin-top:4px"><div class="cov-bar-fg" style="width:0%;background:var(--info)"/></div>
        </div>
        <div style="margin-top:8px"><span style="font-size:12px;color:var(--text-soft)">Secret Scanning (requires GHAS)</span>
          <div class="cov-bar-bg" style="margin-top:4px"><div class="cov-bar-fg" style="width:0%;background:var(--violet)"/></div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><strong>Free Security Tools</strong></div>
        <div style="font-size:13px;color:var(--text-soft);line-height:1.8">
          <div><span style="color:var(--success)">●</span> <strong>Dependabot</strong> — Dependency vulnerability alerts (free)</div>
          <div><span style="color:var(--info)">●</span> <strong>CodeQL</strong> — Code scanning via Actions (free for public repos)</div>
          <div><span style="color:var(--violet)">●</span> <strong>Secret Scanning</strong> — Push protection (free for public repos)</div>
          <div><span style="color:var(--warning)">●</span> <strong>Trivy / Grype</strong> — Container scanning via Actions (OSS)</div>
          <div><span style="color:var(--cyan)">●</span> <strong>OSSF Scorecard</strong> — Supply chain security (OSS)</div>
        </div>
      </div>
    </div>
    ${alerts&&html`<div class="card" style="margin-top:16px">
      <div class="card-header"><strong>Repository Security Status</strong></div>
      <table class="tbl"><thead><tr><th>Repository</th><th>Dependabot</th></tr></thead><tbody>
        ${alerts.map(function(a){return html`<tr><td class="mono" style="font-size:12px">${a.repo}</td><td>${a.enabled?html`<span class="badge badge-success">Enabled</span>`:html`<span class="badge badge-neutral">Disabled</span>`}</td></tr>`})}
      </tbody></table>
    </div>`}
  </div>`;
}
