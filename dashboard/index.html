<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ForgeOps - DevSecOps Command Center</title>
<meta name="referrer" content="no-referrer">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='40' y2='40' gradientUnits='userSpaceOnUse'%3E%3Cstop stop-color='%234f46e5'/%3E%3Cstop offset='1' stop-color='%237c3aed'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='40' height='40' rx='10' fill='url(%23g)'/%3E%3Cpath d='M20 8L11 22h6.5l-2 10L27 18h-6.5l2-10z' fill='white'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8f9fb;--pn:#fff;--cd:#fff;--sf:#f1f5f9;--bd:#e2e8f0;--tx:#0f172a;--ts:#475569;--td:#94a3b8;--pr:#4f46e5;--pl:rgba(79,70,229,.08);--ok:#059669;--ol:rgba(5,150,105,.08);--er:#dc2626;--el:rgba(220,38,38,.08);--wa:#d97706;--wl:rgba(217,119,6,.08);--in:#0284c7;--il:rgba(2,132,199,.08);--r:12px;--sh:0 1px 3px rgba(0,0,0,.06)}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Inter',system-ui,sans-serif;font-size:14px}
code,.mono{font-family:'JetBrains Mono',monospace}
a{color:var(--pr);text-decoration:none}button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;background:var(--pn);border:1px solid var(--bd);border-radius:8px;color:var(--tx);padding:10px 14px;font-size:13px;outline:none;width:100%}input:focus{border-color:var(--pr);box-shadow:0 0 0 3px var(--pl)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes boltPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(1.1)}}
@keyframes sparkGlow{0%,100%{filter:drop-shadow(0 0 2px currentColor)}50%{filter:drop-shadow(0 0 8px currentColor)}}
.fu{animation:fadeUp .3s ease-out}.sk{background:linear-gradient(90deg,var(--sf) 25%,var(--bd) 50%,var(--sf) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--r);height:20px;margin:8px 0}
.app{display:flex;height:100vh;overflow:hidden}.sb{width:200px;background:var(--pn);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}.mn{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}.hd{padding:10px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;background:var(--pn)}.ct{flex:1;overflow-y:auto;padding:20px}
.c{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--sh)}.g4{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}.g2{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px;margin-bottom:16px}
.bt{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:5px;transition:all .15s}.bp{background:var(--pr);color:#fff}.bp:hover{opacity:.9}.bs{background:var(--sf);color:var(--ts);border:1px solid var(--bd)}.bs:hover{border-color:var(--pr)}
.lr{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--bd)}.lr:last-child{border-bottom:none}.badge{display:inline-flex;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.ni{display:flex;align-items:center;gap:7px;padding:6px 12px;margin:1px 4px;border-radius:8px;font-size:12px;color:var(--ts);cursor:pointer;border-left:3px solid transparent}.ni:hover{background:var(--sf)}.ni.ac{background:var(--pl);color:var(--pr);font-weight:600;border-left-color:var(--pr)}.ns{padding:12px 10px 3px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--td)}
.tp{display:flex;gap:3px}.tpl{width:16px;height:16px;border-radius:50%;cursor:pointer;border:2px solid var(--bd)}.tpl.ac{border-color:var(--pr);box-shadow:0 0 0 2px var(--pl)}
.spark-btn{position:absolute;bottom:20px;right:20px;width:48px;height:48px;border-radius:50%;background:var(--pn);border:1.5px solid var(--in);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.1);transition:transform .15s;z-index:50}.spark-btn:hover{transform:scale(1.08)}
.spark-panel{position:absolute;bottom:76px;right:20px;width:320px;background:var(--pn);border:1px solid var(--bd);border-radius:14px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:50;max-height:480px;overflow-y:auto;padding:16px}
@media(max-width:900px){.sb{display:none}.g4{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}.spark-panel{width:calc(100vw - 40px);right:10px}}
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;gap:8px;color:#94a3b8"><svg width="28" height="28" viewBox="0 0 40 40"><defs><linearGradient id="flg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse"><stop stop-color="#4f46e5"/><stop offset="1" stop-color="#7c3aed"/></linearGradient></defs><rect width="40" height="40" rx="10" fill="url(#flg)"/><path d="M20 8L11 22h6.5l-2 10L27 18h-6.5l2-10z" fill="white"/></svg>Loading ForgeOps...</div></div>
<script type="module">
import{h,render,Fragment}from'https://esm.sh/preact@10.22.0';
import{useState,useEffect,useRef}from'https://esm.sh/preact@10.22.0/hooks';
import htm from'https://esm.sh/htm@3.1.1';
var html=htm.bind(h);
var ORG='askboppana';var cache={};
function api(p){var k=p;if(cache[k]&&Date.now()-cache[k].t<120000)return Promise.resolve(cache[k].d);return fetch('https://api.github.com'+p,{headers:{Accept:'application/vnd.github.v3+json'}}).then(function(r){if(!r.ok)throw new Error(r.status+'');return r.json()}).then(function(d){cache[k]={d:d,t:Date.now()};return d})}
function fetchCmdData(){return fetch('https://raw.githubusercontent.com/'+ORG+'/ForgeOps/main/dashboard-data.json').then(function(r){return r.ok?r.json():null}).catch(function(){return null})}
var themes={light:{bg:'#f8f9fb',pr:'#4f46e5',pl:'rgba(79,70,229,.08)'},ocean:{bg:'#f0f7ff',pr:'#0369a1',pl:'rgba(3,105,161,.08)'},forest:{bg:'#f0fdf4',pr:'#15803d',pl:'rgba(21,128,61,.08)'},sunset:{bg:'#fdf8f6',pr:'#c2410c',pl:'rgba(194,65,12,.08)'}};
function applyTheme(n){var t=themes[n];if(!t)return;var s=document.documentElement.style;s.setProperty('--bg',t.bg);s.setProperty('--pr',t.pr);s.setProperty('--pl',t.pl);localStorage.setItem('fg_theme',n)}
function ago(d){if(!d)return'';var s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return s+'s';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'d'}
function sCol(s){return{success:'var(--ok)',completed:'var(--ok)',failure:'var(--er)',in_progress:'var(--in)',queued:'var(--wa)',waiting:'var(--wa)'}[s]||'var(--td)'}
function Logo(p){return html`<svg width=${(p&&p.s)||32} height=${(p&&p.s)||32} viewBox="0 0 40 40"><defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#4f46e5"/><stop offset="1" stop-color="#7c3aed"/></linearGradient></defs><rect width="40" height="40" rx="10" fill="url(#lg)"/><path d="M20 8L11 22h6.5l-2 10L27 18h-6.5l2-10z" fill="white" style="animation:boltPulse 3s infinite"/></svg>`}
function Skel(){return html`<div class="sk"></div>`}
function TP(p){return html`<div class="tp">${Object.keys(themes).map(function(n){return html`<div key=${n} class=${'tpl'+(p.c===n?' ac':'')} style=${'background:'+themes[n].pr} onClick=${function(){p.f(n)}}></div>`})}</div>`}
var SPARK=[
{p:['overview'],q:'What do stat cards show?',a:'Repos, passing, failing, running counts from command center data.'},
{p:['overview'],q:'I see failures',a:'Go to Pipelines, find the failing run, click View Logs.'},
{p:['pipelines'],q:'How to run a pipeline?',a:'Push to a branch or use GitHub Actions Run workflow button.'},
{p:['pipelines'],q:'Pipeline stuck?',a:'GitHub free tier: 20 concurrent jobs. Wait or use self-hosted runners.'},
{p:['prs'],q:'How to create PR?',a:'Click the promote card (e.g. Feature to INT) to open GitHub compare.'},
{p:['environments'],q:'What is Ready for SIT?',a:'Jira status: build deployed to QA, ready for QA team testing.'},
{p:['environments'],q:'How to promote?',a:'Click promote button between env cards. Opens GitHub compare.'},
{p:['security'],q:'SAST vs SCA?',a:'SAST scans source code. SCA scans dependencies for vulnerabilities.'},
{p:['deploy'],q:'How does bulk deploy work?',a:'Creates GitHub Issue with forgeops-dispatch label. Workflow triggers all repos.'},
{p:['variables'],q:'How to add a secret?',a:'GitHub > Org Settings > Secrets > Actions > New Secret.'},
{p:['all'],q:'What is ForgeOps?',a:'Enterprise DevSecOps platform on GitHub Actions replacing Jenkins.'},
{p:['all'],q:'How to get help?',a:'Create support ticket via GitHub Issues.'},
{p:['all'],q:'What is Copilot?',a:'AI that helps write code, review PRs, fix vulnerabilities, analyze failures.'}
];
function SparkPanel(p){var sq=useState('');var search=sq[0];var setS=sq[1];var qa=SPARK.filter(function(i){return i.p.indexOf(p.pg)>=0||i.p.indexOf('all')>=0});var filtered=search?qa.filter(function(i){return(i.q+' '+i.a).toLowerCase().indexOf(search.toLowerCase())>=0}).slice(0,5):qa.slice(0,4);
return html`<div class="spark-panel"><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><div style="width:26px;height:26px;border-radius:50%;background:var(--il);display:flex;align-items:center;justify-content:center"><svg width="12" height="12" viewBox="0 0 40 40"><path d="M20 8L11 22h6.5l-2 10L27 18h-6.5l2-10z" fill="var(--in)" style="animation:sparkGlow 3s infinite"/></svg></div><div style="flex:1"><div style="font-size:13px;font-weight:600">Spark</div><div style="font-size:9px;color:var(--td)">ForgeOps AI</div></div><button onClick=${p.close} style="color:var(--td)">x</button></div>
<input value=${search} onInput=${function(e){setS(e.target.value)}} placeholder="Ask Spark anything..." style="margin-bottom:10px;font-size:11px;padding:8px 10px"/>
<div style="font-size:9px;font-weight:600;color:var(--td);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">On this page</div>
${filtered.map(function(i){return html`<div key=${i.q} style="background:var(--sf);border-radius:8px;padding:8px;margin-bottom:6px"><div style="font-size:11px;font-weight:600;margin-bottom:2px">${i.q}</div><div style="font-size:10px;color:var(--ts);line-height:1.4">${i.a}</div></div>`})}
${filtered.length===0&&html`<div style="text-align:center;padding:12px;color:var(--td);font-size:11px">No match found.</div>`}
<div style="display:flex;gap:4px;margin-top:6px"><a href=${'https://github.com/'+ORG+'/ForgeOps/tree/main/docs/knowledge'} target="_blank" rel="noopener" class="bt bs" style="flex:1;justify-content:center;font-size:10px">Knowledge Base</a><a href=${'https://github.com/'+ORG+'/ForgeOps/issues/new/choose'} target="_blank" rel="noopener" class="bt bs" style="flex:1;justify-content:center;font-size:10px">Create Ticket</a></div></div>`}

function LandingPage(p){var stages=['Commit','Build','Scan','INT','QA','Stage','Prod'];var colors=['#6366f1','#3b82f6','#8b5cf6','#06b6d4','#f59e0b','#f97316','#10b981'];var prog=useRef(0);var tick=useRef(null);var frc=useState(0);useEffect(function(){tick.current=setInterval(function(){prog.current=(prog.current+0.3)%100;frc[1](function(n){return n+1})},50);return function(){clearInterval(tick.current)}},[]);var active=Math.floor(prog.current/100*7);
return html`<div style="height:100vh;overflow-y:auto;background:var(--bg)">
<div style="padding:12px 20px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--bd);background:var(--pn)"><${Logo} s=${24}/><span style="font-weight:700;font-size:14px">ForgeOps</span><span style="font-size:8px;color:var(--td);font-weight:600;letter-spacing:1px">COMMAND CENTER</span><div style="flex:1"></div><${TP} c=${p.t} f=${p.th}/><button class="bt bs" onClick=${function(){p.ss('kb')}}>Knowledge Base</button><button class="bt bp" onClick=${function(){p.ss('dashboard')}}>Open Dashboard</button></div>
<div class="fu" style="text-align:center;padding:44px 20px 24px"><span class="badge" style="background:var(--pl);color:var(--pr);font-size:10px;padding:4px 12px;display:inline-block;margin-bottom:12px">Enterprise DevSecOps Platform</span><h1 style="font-size:34px;font-weight:700;line-height:1.2;max-width:500px;margin:0 auto 10px">Ship code safely, from commit to production</h1><p style="color:var(--ts);max-width:420px;margin:0 auto 24px;line-height:1.6;font-size:13px">Replace Jenkins with GitHub Actions. Security scanning, Jira sync, email and Teams alerts, approval gates -- fully automated.</p>
<svg viewBox="0 0 640 90" style="max-width:560px;width:100%;margin:0 auto 6px;display:block">${stages.map(function(name,i){var x=i*90+46;var done=i<active;var act=i===active;return html`<g key=${i}>${i>0?html`<line x1=${(i-1)*90+64} y1="45" x2=${x-18} y2="45" stroke=${done||act?colors[i]:'#e2e8f0'} stroke-width="2"/>`:null}<circle cx=${x} cy="45" r=${act?17:15} fill=${done?colors[i]:act?colors[i]:'#f1f5f9'} stroke=${colors[i]} stroke-width="2"/>${act?html`<circle cx=${x} cy="45" r="22" fill="none" stroke=${colors[i]} stroke-width="1" opacity=".3"><animate attributeName="r" values="19;25;19" dur="1.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.4;0.1;0.4" dur="1.5s" repeatCount="indefinite"/></circle>`:null}${done?html`<path d=${'M'+(x-4)+' 45L'+(x-1)+' 48L'+(x+5)+' 42'} fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>`:null}<text x=${x} y="48" text-anchor="middle" fill=${done||act?'#fff':'#94a3b8'} font-size="7" font-weight="600" font-family="Inter,sans-serif">${name.substring(0,4)}</text></g>`})}</svg>
<div style="font-size:9px;color:var(--td);display:flex;justify-content:center;gap:14px"><span>Origin: developer commit</span><span style="animation:pulse 2s infinite">Pipeline in progress...</span><span>Destination: production</span></div></div>
<div style="max-width:640px;margin:0 auto;padding:0 20px 20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px">${[{t:'Pipeline visibility',d:'See every job running across all repos with live status.'},{t:'Environment promotion',d:'One-click promote. Jira auto-updates at each stage.'},{t:'Security scanning',d:'SAST, SCA, secrets, containers, SBOM on every commit.'},{t:'AI-powered with Copilot',d:'Code review, autofix, test generation, failure analysis.'}].map(function(f){return html`<div key=${f.t} class="c"><div style="font-weight:600;font-size:12px;color:var(--pr);margin-bottom:3px">${f.t}</div><div style="font-size:10px;color:var(--ts);line-height:1.5">${f.d}</div></div>`})}</div>
<div style="text-align:center;padding:16px"><button class="bt bp" style="padding:10px 24px;font-size:13px" onClick=${function(){p.ss('dashboard')}}>Open ForgeOps Dashboard</button><div style="font-size:9px;color:var(--td);margin-top:4px">No login required. Public read-only access.</div></div>
<div style="text-align:center;padding:8px 20px 24px;display:flex;flex-wrap:wrap;gap:4px;justify-content:center">${['GitHub Actions','Copilot','SonarQube','OWASP DC','Gitleaks','Trivy','Syft','Jira','Splunk','Teams','Email','Cherwell'].map(function(t){return html`<span key=${t} style="background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:3px 9px;font-size:9px;color:var(--ts)">${t}</span>`})}</div></div>`}

function KBPage(p){var sections=[{t:'Getting started',items:[{n:'onboarding-new-developer',t:'Onboarding'},{n:'how-to-register-a-repo',t:'Register repo'},{n:'how-to-create-a-pr',t:'Create PR'},{n:'how-to-read-pipeline-logs',t:'Pipeline logs'}]},{t:'Workflow',items:[{n:'how-to-promote-to-production',t:'Promote to prod'},{n:'how-to-rollback',t:'Rollback'},{n:'how-to-read-security-results',t:'Security results'},{n:'how-to-request-support',t:'Support'}]},{t:'Configuration',items:[{n:'how-to-configure-jira',t:'Jira'},{n:'how-to-setup-email-notifications',t:'Email'},{n:'how-to-setup-teams-notifications',t:'Teams'},{n:'app-repo-setup-template',t:'New repo'}]}];
return html`<div style="height:100vh;overflow-y:auto;background:var(--bg)"><div style="padding:12px 20px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--bd);background:var(--pn)"><${Logo} s=${22}/><span style="font-weight:700;font-size:13px">ForgeOps</span><span style="color:var(--td)">/</span><span style="font-size:13px">Knowledge Base</span><div style="flex:1"></div><${TP} c=${p.t} f=${p.th}/><button class="bt bs" style="font-size:11px" onClick=${function(){p.ss('landing')}}>Back</button></div><div style="max-width:580px;margin:0 auto;padding:24px 20px"><h1 style="font-size:22px;font-weight:700;margin-bottom:3px">Knowledge Base</h1><p style="color:var(--ts);margin-bottom:20px;font-size:13px">Everything your team needs to use ForgeOps.</p>${sections.map(function(sec){return html`<div key=${sec.t} style="margin-bottom:20px"><div class="ns" style="padding-left:0;margin-bottom:6px">${sec.t}</div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:6px">${sec.items.map(function(i){return html`<a key=${i.n} href=${'https://github.com/'+ORG+'/ForgeOps/blob/main/docs/knowledge/'+i.n+'.md'} target="_blank" rel="noopener" class="c" style="text-decoration:none;padding:12px"><div style="font-weight:600;font-size:12px;color:var(--tx)">${i.t}</div></a>`})}</div></div>`})}</div></div>`}

function Dash(p){var pg=useState('overview');var page=pg[0];var setPage=pg[1];var dd=useState(null);var data=dd[0];var setData=dd[1];var rn=useState([]);var runs=rn[0];var setRuns=rn[1];var ld=useState(true);var loading=ld[0];var setLoading=ld[1];var sk=useState(false);var sparkOpen=sk[0];var setSpark=sk[1];
useEffect(function(){fetchCmdData().then(function(d){if(d)setData(d)});api('/users/'+ORG+'/repos?per_page=50&sort=updated').then(function(repos){return Promise.all((repos||[]).slice(0,8).map(function(r){return api('/repos/'+r.full_name+'/actions/runs?per_page=10').catch(function(){return{workflow_runs:[]}})}))}).then(function(results){var all=[];results.forEach(function(r){if(r&&r.workflow_runs)all=all.concat(r.workflow_runs)});all.sort(function(a,b){return new Date(b.created_at)-new Date(a.created_at)});setRuns(all);setLoading(false)}).catch(function(){setLoading(false)})},[]);
useEffect(function(){function onKey(e){if(e.target.tagName==='INPUT')return;if(e.key==='Escape')setSpark(false);if(e.key==='/')setSpark(true);if(e.key==='r'){Object.keys(cache).forEach(function(k){delete cache[k]})}}window.addEventListener('keydown',onKey);return function(){window.removeEventListener('keydown',onKey)}},[]);
var projects=(data&&data.projects)||{};var projNames=Object.keys(projects);var totalRepos=0;var passing=0;var failing=0;var running=0;projNames.forEach(function(pn){(projects[pn].repos||[]).forEach(function(r){totalRepos++;var latest=r.runs&&r.runs[0];if(!latest)return;if(latest.conclusion==='success')passing++;else if(latest.conclusion==='failure')failing++;else if(latest.status==='in_progress')running++})});
var sections={DELIVERY:['overview','pipelines','prs','deploy','environments'],QUALITY:['security','alm','analytics'],OPERATIONS:['approvals','repos','users','variables','runners','settings']};
var labels={overview:'Overview',pipelines:'Pipelines',prs:'Pull Requests',deploy:'Deploy',environments:'Environments',security:'Security',alm:'ALM / Jira',analytics:'Analytics',approvals:'Approvals',repos:'Repositories',users:'Users',variables:'Variables',runners:'Runners',settings:'Settings'};
function R(){if(loading)return html`<${Skel}/><${Skel}/><${Skel}/>`;
if(page==='overview')return html`<div class="fu"><div class="g4"><div class="c" style="border-left:4px solid var(--pr);text-align:center"><div style="font-size:9px;color:var(--ts);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px">Repos</div><div style="font-size:24px;font-weight:700">${totalRepos}</div></div><div class="c" style="border-left:4px solid var(--ok);text-align:center"><div style="font-size:9px;color:var(--ts);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px">Passing</div><div style="font-size:24px;font-weight:700;color:var(--ok)">${passing}</div></div><div class="c" style="border-left:4px solid var(--er);text-align:center"><div style="font-size:9px;color:var(--ts);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px">Failing</div><div style="font-size:24px;font-weight:700;color:var(--er)">${failing}</div></div><div class="c" style="border-left:4px solid var(--in);text-align:center"><div style="font-size:9px;color:var(--ts);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px">Running</div><div style="font-size:24px;font-weight:700;color:var(--in)">${running}</div></div></div><div class="g2">${projNames.map(function(pn){var proj=projects[pn];var repos=proj.repos||[];var ok=repos.filter(function(r){return r.runs&&r.runs[0]&&r.runs[0].conclusion==='success'}).length;return html`<div key=${pn} class="c"><div style="font-weight:600;font-size:13px;margin-bottom:2px">${pn}</div><div style="font-size:10px;color:var(--ts);margin-bottom:6px">${proj.team||''} -- ${repos.length} repos</div><div style="height:5px;background:var(--sf);border-radius:3px;overflow:hidden"><div style=${'height:100%;width:'+(repos.length?Math.round(ok/repos.length*100):0)+'%;background:var(--ok);border-radius:3px'}></div></div></div>`})}</div><div class="c"><div style="font-size:11px;font-weight:600;color:var(--ts);margin-bottom:6px">Recent Activity</div>${runs.slice(0,10).map(function(r){return html`<div class="lr" key=${r.id}><span class="badge" style=${'background:'+sCol(r.conclusion||r.status).replace('var(','rgba(').replace(/\)/,',.1)')+';color:'+sCol(r.conclusion||r.status)}>${r.conclusion||r.status||'pending'}</span><div style="flex:1;min-width:0"><div style="font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.repository?r.repository.full_name:''}</div><div class="mono" style="font-size:9px;color:var(--td)">${r.head_branch||''}</div></div><span style="font-size:9px;color:var(--td)">${ago(r.created_at)}</span></div>`})}</div></div>`;
if(page==='pipelines')return html`<div class="fu"><div class="c">${runs.slice(0,20).map(function(r){return html`<div class="lr" key=${r.id} style=${'border-left:3px solid '+sCol(r.conclusion||r.status)+';padding-left:8px'}><span class="badge" style=${'background:'+sCol(r.conclusion||r.status).replace('var(','rgba(').replace(/\)/,',.1)')+';color:'+sCol(r.conclusion||r.status)}>${r.conclusion||r.status||'pending'}</span><div style="flex:1"><div style="font-size:11px;font-weight:500">${r.repository?r.repository.full_name:''}</div><div style="font-size:9px;color:var(--td)">${r.name||''} -- ${r.head_branch||''}</div></div><span class="mono" style="font-size:9px;color:var(--td)">${ago(r.created_at)}</span><a href=${r.html_url||'#'} target="_blank" rel="noopener" class="bt bs" style="font-size:9px;padding:3px 7px">View Logs</a></div>`})}${runs.length===0&&html`<div style="text-align:center;padding:16px;color:var(--td);font-size:11px">No runs found</div>`}</div></div>`;
if(page==='prs')return html`<div class="fu"><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:12px">${[['Feature > INT','int'],['INT > QA','qa'],['QA > Stage','stage'],['Stage > Prod','main']].map(function(f){return html`<a key=${f[0]} href=${'https://github.com/'+ORG+'?tab=repositories'} target="_blank" rel="noopener" class="c" style="text-decoration:none;text-align:center;padding:10px"><div style="font-weight:600;font-size:11px;color:var(--pr)">${f[0]}</div><div style="font-size:8px;color:var(--td);margin-top:2px">Open GitHub</div></a>`})}</div><div class="c" style="text-align:center;padding:14px;color:var(--td);font-size:11px">Click cards above to create PRs on GitHub.</div></div>`;
if(page==='deploy')return html`<div class="fu"><div class="c"><div style="font-weight:600;margin-bottom:6px">Bulk Operations</div><div style="font-size:11px;color:var(--ts);margin-bottom:10px;line-height:1.5">Create a GitHub Issue with label "forgeops-dispatch" and title: [FORGEOPS] deploy project-name environment</div><a href=${'https://github.com/'+ORG+'/ForgeOps/issues/new?title=%5BFORGEOPS%5D+deploy+java-backend+qa&labels=forgeops-dispatch'} target="_blank" rel="noopener" class="bt bp" style="font-size:11px">Create Deploy Issue</a></div>${projNames.map(function(pn){return html`<div key=${pn} class="c"><div style="font-weight:600;margin-bottom:3px;font-size:13px">${pn}</div><div style="font-size:10px;color:var(--ts);margin-bottom:4px">${(projects[pn].repos||[]).length} repos</div><div style="display:flex;gap:4px;flex-wrap:wrap">${['INT>QA','QA>Stage','Stage>Prod'].map(function(l){return html`<a key=${l} href=${'https://github.com/'+ORG+'/ForgeOps/issues/new?title=%5BFORGEOPS%5D+deploy+'+pn+'+'+l.split('>')[1].toLowerCase()+'&labels=forgeops-dispatch'} target="_blank" rel="noopener" class="bt bs" style="font-size:9px;padding:3px 6px">${l}</a>`})}</div></div>`})}</div>`;
if(page==='environments'){var envs=['INT','QA','STAGE','PROD'];var cols=['var(--in)','var(--wa)','var(--wa)','var(--er)'];return html`<div class="fu"><div style="display:flex;gap:6px;overflow-x:auto">${envs.map(function(e,i){var dep=runs.filter(function(r){var n=(r.name||'').toUpperCase();return n.indexOf(e)>=0&&(n.indexOf('DEPLOY')>=0||n.indexOf('>')>=0)});return html`<div key=${e} style="flex:1;min-width:130px"><div class="c" style=${'border-top:4px solid '+cols[i]}><div style="font-weight:700;font-size:13px;margin-bottom:6px">${e}</div>${dep.slice(0,3).map(function(r){return html`<div key=${r.id} style="font-size:9px;color:var(--ts);margin-bottom:2px"><span style=${'display:inline-block;width:5px;height:5px;border-radius:50%;background:'+sCol(r.conclusion||r.status)+';margin-right:3px'}></span>${r.repository?r.repository.full_name.split('/')[1]:''} ${ago(r.created_at)}</div>`})}${dep.length===0&&html`<div style="font-size:9px;color:var(--td)">No deploys</div>`}</div></div>`})}</div></div>`}
if(page==='security'){var sec=runs.filter(function(r){var n=(r.name||'').toLowerCase();return n.indexOf('security')>=0||n.indexOf('scan')>=0});var ok=sec.filter(function(r){return r.conclusion==='success'}).length;var fail=sec.filter(function(r){return r.conclusion==='failure'}).length;return html`<div class="fu"><div class="g4"><div class="c" style="border-left:4px solid var(--in);text-align:center"><div style="font-size:9px;color:var(--ts);text-transform:uppercase;letter-spacing:1px">Scans</div><div style="font-size:24px;font-weight:700">${sec.length}</div></div><div class="c" style="border-left:4px solid var(--ok);text-align:center"><div style="font-size:9px;color:var(--ts);text-transform:uppercase;letter-spacing:1px">Passed</div><div style="font-size:24px;font-weight:700;color:var(--ok)">${ok}</div></div><div class="c" style="border-left:4px solid var(--er);text-align:center"><div style="font-size:9px;color:var(--ts);text-transform:uppercase;letter-spacing:1px">Failed</div><div style="font-size:24px;font-weight:700;color:var(--er)">${fail}</div></div></div>${sec.length===0&&html`<div class="c"><div style="font-weight:600;color:var(--pr);margin-bottom:3px">Free Security Tools</div><div style="font-size:10px;color:var(--ts);line-height:1.6">Gitleaks and OWASP DC run automatically. Add SONAR_HOST_URL + SONAR_TOKEN for SAST.</div></div>`}</div>`}
if(page==='variables'){var vars=[{c:'Security',i:['SONAR_HOST_URL','SONAR_TOKEN','BLACKDUCK_URL','BLACKDUCK_TOKEN']},{c:'ALM',i:['JIRA_URL','JIRA_TOKEN']},{c:'Monitoring',i:['SPLUNK_HEC_URL','SPLUNK_HEC_TOKEN']},{c:'Notifications',i:['TEAMS_WEBHOOK','SMTP_SERVER','SMTP_USERNAME','SMTP_PASSWORD']},{c:'Deploy',i:['DEPLOY_SSH_KEY','ARGOCD_SERVER','UIPATH_ORCH_URL']},{c:'ITSM',i:['CHERWELL_URL','CHERWELL_CLIENT_ID']}];return html`<div class="fu">${vars.map(function(g){return html`<div key=${g.c} class="c"><div style="font-weight:600;margin-bottom:4px;font-size:13px">${g.c}</div>${g.i.map(function(v){return html`<div key=${v} class="lr" style="gap:4px"><span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--td)"></span><span class="mono" style="font-size:11px;flex:1">${v}</span></div>`})}</div>`})}<a href=${'https://github.com/'+ORG+'/ForgeOps/settings/secrets/actions'} target="_blank" rel="noopener" class="bt bp" style="font-size:11px">Add Secrets on GitHub</a></div>`}
if(page==='users')return html`<div class="fu"><div class="c"><div style="font-weight:600;margin-bottom:6px">Users</div><div style="font-size:11px;color:var(--ts);margin-bottom:10px">Managed in forgeops-config.json</div><a href=${'https://github.com/'+ORG+'/ForgeOps/edit/main/forgeops-config.json'} target="_blank" rel="noopener" class="bt bp" style="font-size:11px">Edit Users</a></div></div>`;
if(page==='repos')return html`<div class="fu">${projNames.map(function(pn){var proj=projects[pn];return html`<div key=${pn} class="c"><div style="font-weight:600;font-size:13px;margin-bottom:3px">${pn}</div><div style="font-size:10px;color:var(--ts);margin-bottom:4px">${proj.team||''}</div>${(proj.repos||[]).map(function(r){return html`<div key=${r.name} class="lr"><span style="font-size:11px;font-weight:500;flex:1">${r.name}</span><a href=${'https://github.com/'+ORG+'/'+r.name} target="_blank" rel="noopener" class="bt bs" style="font-size:9px;padding:3px 6px">GitHub</a></div>`})}</div>`})}</div>`;
if(page==='runners')return html`<div class="fu"><div class="c"><div style="font-weight:600;margin-bottom:3px">GitHub-Hosted Runners</div><div style="font-size:11px;color:var(--ts);margin-bottom:6px;line-height:1.5">Using ubuntu-latest and windows-latest. Self-hosted runners provide corporate network access.</div><a href=${'https://github.com/'+ORG+'/ForgeOps/blob/main/docs/MIGRATION-TO-SELF-HOSTED.md'} target="_blank" rel="noopener" class="bt bs" style="font-size:11px">Migration Guide</a></div></div>`;
if(page==='settings')return html`<div class="fu"><div class="c"><div style="font-weight:600;margin-bottom:4px">ForgeOps v6.0</div><div style="font-size:11px;color:var(--ts);margin-bottom:6px">Enterprise DevSecOps Command Center</div><a href=${'https://github.com/'+ORG+'/ForgeOps'} target="_blank" rel="noopener" style="font-size:11px">GitHub Repo</a></div><div class="c"><div style="font-weight:600;margin-bottom:4px">Links</div><div style="display:flex;flex-direction:column;gap:3px;font-size:11px"><a href=${'https://github.com/'+ORG+'/ForgeOps/tree/main/docs/knowledge'} target="_blank" rel="noopener">Knowledge Base</a><a href=${'https://github.com/'+ORG+'/ForgeOps/blob/main/docs/TROUBLESHOOTING.md'} target="_blank" rel="noopener">Troubleshooting</a><a href=${'https://github.com/'+ORG+'/ForgeOps/issues/new/choose'} target="_blank" rel="noopener">Support Ticket</a></div></div></div>`;
return html`<div class="c" style="text-align:center;padding:16px;color:var(--td);font-size:11px">Coming soon</div>`}

return html`<div class="app"><div class="sb"><div style="padding:10px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--bd)"><${Logo} s=${20}/><div><div style="font-weight:700;font-size:12px">ForgeOps</div><div style="font-size:7px;color:var(--td);font-weight:600;letter-spacing:1px">COMMAND CENTER</div></div></div>${Object.keys(sections).map(function(sec){return html`<${Fragment} key=${sec}><div class="ns">${sec}</div>${sections[sec].map(function(k){return html`<div key=${k} class=${'ni'+(page===k?' ac':'')} onClick=${function(){setPage(k)}}>${labels[k]}</div>`})}<//>`})}<div style="margin-top:auto;padding:8px 10px;border-top:1px solid var(--bd);font-size:9px;color:var(--td)"><span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--ok);margin-right:3px"></span>ForgeOps v6.0</div></div>
<div class="mn"><div class="hd"><span style="font-size:15px;font-weight:700;flex:1">${labels[page]||''}</span><${TP} c=${p.t} f=${p.th}/><button class="bt bs" style="font-size:10px" onClick=${function(){p.ss('landing')}}>Back</button></div><div class="ct">${R()}</div>
<div class="spark-btn" onClick=${function(){setSpark(!sparkOpen)}}><svg width="20" height="20" viewBox="0 0 40 40"><path d="M20 8L11 22h6.5l-2 10L27 18h-6.5l2-10z" fill="var(--in)" style="animation:sparkGlow 3s infinite"/></svg></div>
${sparkOpen&&html`<${SparkPanel} pg=${page} close=${function(){setSpark(false)}}/>`}</div></div>`}

function App(){var scr=useState('landing');var screen=scr[0];var setScreen=scr[1];var th=useState(localStorage.getItem('fg_theme')||'light');var theme=th[0];var setTheme=th[1];function chTheme(n){setTheme(n);applyTheme(n)}useEffect(function(){applyTheme(theme)},[]);
if(screen==='kb')return html`<${KBPage} ss=${setScreen} t=${theme} th=${chTheme}/>`;
if(screen==='dashboard')return html`<${Dash} ss=${setScreen} t=${theme} th=${chTheme}/>`;
return html`<${LandingPage} ss=${setScreen} t=${theme} th=${chTheme}/>`}

render(html`<${App}/>`,document.getElementById('root'));
</script>
</body>
</html>
