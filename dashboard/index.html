<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ForgeOps - DevSecOps Command Center</title>
<meta name="referrer" content="no-referrer">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://esm.sh 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src https://api.github.com https://raw.githubusercontent.com https://esm.sh https://*.atlassian.net https://*.workers.dev; img-src 'self' data: https://avatars.githubusercontent.com">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='40' y2='40' gradientUnits='userSpaceOnUse'%3E%3Cstop stop-color='%234f46e5'/%3E%3Cstop offset='1' stop-color='%237c3aed'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='40' height='40' rx='10' fill='url(%23g)'/%3E%3Cpath d='M20 8L11 22h6.5l-2 10L27 18h-6.5l2-10z' fill='white'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8f9fb;--pn:#fff;--cd:#fff;--sf:#f1f5f9;--bd:#e2e8f0;--tx:#0f172a;--ts:#475569;--td:#94a3b8;--pr:#4f46e5;--pl:rgba(79,70,229,.08);--ok:#059669;--er:#dc2626;--wa:#d97706;--in:#0284c7;--r:12px;--sh:0 1px 3px rgba(0,0,0,.06)}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:14px}
code,.mono{font-family:'JetBrains Mono',monospace}
a{color:var(--pr);text-decoration:none}button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;background:var(--pn);border:1px solid var(--bd);border-radius:8px;color:var(--tx);padding:10px 14px;font-size:13px;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--pr);box-shadow:0 0 0 3px var(--pl)}
textarea{resize:vertical;min-height:60px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes boltPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(1.1)}}
@keyframes sparkGlow{0%,100%{filter:drop-shadow(0 0 2px currentColor)}50%{filter:drop-shadow(0 0 8px currentColor)}}
.fu{animation:fadeUp .3s ease-out}
.sk{background:linear-gradient(90deg,var(--sf) 25%,var(--bd) 50%,var(--sf) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--r);height:20px;margin:8px 0}
.app{display:flex;height:100vh;overflow:hidden}
.sb{width:200px;background:var(--pn);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.mn{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
.hd{padding:10px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;background:var(--pn)}
.ct{flex:1;overflow-y:auto;padding:20px}
.c{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--sh)}
.g4{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
.g2{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-bottom:16px}
.bt{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.bp{background:var(--pr);color:#fff}.bp:hover{opacity:.9}
.bs{background:var(--sf);color:var(--ts);border:1px solid var(--bd)}.bs:hover{border-color:var(--pr)}
.bd{background:none;color:var(--er);border:1px solid rgba(220,38,38,.3)}
.bok{background:var(--ok);color:#fff}
.lr{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--bd)}.lr:last-child{border-bottom:none}
.badge{display:inline-flex;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.ni{display:flex;align-items:center;gap:7px;padding:6px 12px;margin:1px 4px;border-radius:8px;font-size:12px;color:var(--ts);cursor:pointer;border-left:3px solid transparent}
.ni:hover{background:var(--sf)}.ni.ac{background:var(--pl);color:var(--pr);font-weight:600;border-left-color:var(--pr)}
.ns{padding:12px 10px 3px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--td)}
.fl{display:flex;flex-direction:column;gap:10px}
.lb{font-size:10px;color:var(--ts);margin-bottom:3px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.tabs{display:flex;border-bottom:1px solid var(--bd);margin-bottom:14px}.tab{padding:8px 14px;font-size:13px;font-weight:500;color:var(--ts);cursor:pointer;border-bottom:2px solid transparent}.tab.ac{color:var(--pr);border-color:var(--pr)}
.toast{position:fixed;top:16px;right:16px;z-index:9999;padding:10px 18px;border-radius:8px;font-size:13px;background:var(--pn);border-left:4px solid var(--ok);box-shadow:0 4px 12px rgba(0,0,0,.1);animation:fadeUp .3s}
.toast-err{border-left-color:var(--er)}.toast-warn{border-left-color:var(--wa)}
.log-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:90}
.log-panel{position:fixed;top:0;right:0;width:50%;height:100vh;background:var(--pn);border-left:1px solid var(--bd);z-index:100;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease;box-shadow:-4px 0 24px rgba(0,0,0,.1)}
.log-panel.open{transform:translateX(0)}
.log-tabs{display:flex;gap:0;border-bottom:1px solid var(--bd);overflow-x:auto;flex-shrink:0}
.log-tab{padding:8px 14px;font-size:11px;font-weight:500;color:var(--ts);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}.log-tab.ac{color:var(--pr);border-color:var(--pr)}
.spark-btn{position:absolute;bottom:20px;right:20px;width:48px;height:48px;border-radius:50%;background:var(--pn);border:1.5px solid var(--in);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.1);transition:transform .15s;z-index:50}.spark-btn:hover{transform:scale(1.08)}
.spark-panel{position:absolute;bottom:76px;right:20px;width:320px;background:var(--pn);border:1px solid var(--bd);border-radius:14px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:50;max-height:480px;overflow-y:auto;padding:16px}
.hb{display:none}
.ni-badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;border-radius:9px;font-size:9px;font-weight:700;background:var(--pl);color:var(--pr);margin-left:auto}
.int-card{border-radius:12px;overflow:hidden;background:var(--cd);border:1px solid var(--bd);margin-bottom:12px;box-shadow:var(--sh)}
.int-header{padding:14px 16px;display:flex;align-items:center;gap:10px}
.int-body{padding:0 16px 16px}
.int-expand{padding:12px 16px;border-top:1px solid var(--bd);font-size:11px;color:var(--ts);cursor:pointer}
.int-expand:hover{background:var(--sf)}
.jira-flow{display:flex;align-items:center;gap:0;overflow-x:auto;padding:8px 0}
.jira-node{padding:6px 10px;border-radius:6px;font-size:10px;font-weight:600;border:1px solid var(--bd);background:var(--sf);white-space:nowrap;flex-shrink:0;text-align:center;min-width:60px}
.jira-arrow{width:20px;display:flex;align-items:center;justify-content:center;color:var(--td);flex-shrink:0}
.jira-card{background:var(--pn);border:1px solid var(--bd);border-radius:8px;padding:10px;margin-bottom:6px;font-size:11px;cursor:pointer;transition:border-color .15s}
.jira-card:hover{border-color:var(--pr)}
.jira-col{min-width:180px;max-width:220px;flex-shrink:0;background:var(--sf);border-radius:10px;padding:8px}
.tour-overlay{position:fixed;inset:0;z-index:200;pointer-events:none}
.tour-spot{position:fixed;z-index:201;box-shadow:0 0 0 3px var(--pr),0 0 0 9999px rgba(0,0,0,.45);border-radius:8px;pointer-events:none;animation:spotPulse 2s infinite}
@keyframes spotPulse{0%,100%{box-shadow:0 0 0 3px var(--pr),0 0 0 9999px rgba(0,0,0,.45)}50%{box-shadow:0 0 0 5px var(--pr),0 0 0 9999px rgba(0,0,0,.45)}}
.tour-tip{position:fixed;z-index:202;background:var(--pn);border:1px solid var(--bd);border-radius:12px;padding:16px;max-width:280px;box-shadow:0 8px 24px rgba(0,0,0,.15);pointer-events:auto}
.tour-arrow-down{width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:8px solid var(--pn);position:absolute;bottom:-8px;left:24px}
.tour-arrow-up{width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:8px solid var(--pn);position:absolute;top:-8px;left:24px}
.welcome-modal{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;padding:20px}
.welcome-box{background:var(--pn);border-radius:16px;padding:32px;max-width:400px;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.2)}
@media(max-width:900px){.sb{position:fixed;z-index:80;height:100%;transform:translateX(-100%);transition:transform .2s}.sb.open{transform:translateX(0)}.hb{display:block;font-size:18px;padding:4px 8px;cursor:pointer;color:var(--ts);background:none;border:none}.g4{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}.spark-panel{width:calc(100vw - 40px);right:10px}.log-panel{width:100%}}
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;gap:8px;color:#94a3b8">Loading ForgeOps...</div></div>
<script type="module">
import{h,render,Fragment}from'https://esm.sh/preact@10.22.0';
import{useState,useEffect,useRef,useCallback}from'https://esm.sh/preact@10.22.0/hooks';
import htm from'https://esm.sh/htm@3.1.1';
var html=htm.bind(h);
var ORG='askboppana';
var cache={};
function getToken(){return sessionStorage.getItem('fg_pat')||''}
var rateLimit={remaining:5000,limit:5000};
function api(path){
  var k=path;
  if(cache[k]&&Date.now()-cache[k].t<300000)return Promise.resolve(cache[k].d);
  try{
    var hdrs={Accept:'application/vnd.github.v3+json'};var tk=getToken();if(tk)hdrs.Authorization='token '+tk;
    return fetch('https://api.github.com'+path,{headers:hdrs}).then(function(r){
      var rem=r.headers.get('x-ratelimit-remaining');var lim=r.headers.get('x-ratelimit-limit');
      if(rem)rateLimit.remaining=parseInt(rem);if(lim)rateLimit.limit=parseInt(lim);
      if(!r.ok){console.warn('API '+r.status+': '+path);if(!cache[k])toast('API error '+r.status,'warn');return cache[k]?cache[k].d:null}
      return r.json();
    }).then(function(d){if(d)cache[k]={d:d,t:Date.now()};return d}).catch(function(){console.warn('API failed: '+path);if(!cache[k])toast('API request failed','warn');return cache[k]?cache[k].d:null});
  }catch(e){return Promise.resolve(null)}
}
function apiPost(path,body){
  var hdrs={Accept:'application/vnd.github.v3+json','Content-Type':'application/json'};var tk=getToken();if(tk)hdrs.Authorization='token '+tk;
  return fetch('https://api.github.com'+path,{method:'POST',headers:hdrs,body:JSON.stringify(body)}).then(function(r){if(!r.ok)return r.json().then(function(e){throw new Error(e.message||r.status)});if(r.status===204)return null;return r.json()})
}
function apiPut(path,body){
  var hdrs={Accept:'application/vnd.github.v3+json','Content-Type':'application/json'};var tk=getToken();if(tk)hdrs.Authorization='token '+tk;
  return fetch('https://api.github.com'+path,{method:'PUT',headers:hdrs,body:JSON.stringify(body)}).then(function(r){if(!r.ok)return r.json().then(function(e){throw new Error(e.message||r.status)});if(r.status===204)return null;return r.json()})
}

// ── Jira Helper Functions ──
var JIRA_PROXY_DEFAULT='https://jira-proxy.crimson-bird-4c46.workers.dev';
function getJiraConfig(){return{url:(localStorage.getItem('fg_jira_url')||'').replace(/\/jira\/?$/,'').replace(/\/+$/,''),email:localStorage.getItem('fg_jira_email')||'',token:localStorage.getItem('fg_jira_token')||'',project:localStorage.getItem('fg_jira_project')||'',proxy:localStorage.getItem('fg_jira_proxy')||JIRA_PROXY_DEFAULT}}
function saveJiraConfig(cfg){if(cfg.url)localStorage.setItem('fg_jira_url',cfg.url.replace(/\/jira\/?$/,'').replace(/\/+$/,''));if(cfg.email)localStorage.setItem('fg_jira_email',cfg.email);if(cfg.token)localStorage.setItem('fg_jira_token',cfg.token);if(cfg.project)localStorage.setItem('fg_jira_project',cfg.project);if(cfg.proxy)localStorage.setItem('fg_jira_proxy',cfg.proxy)}
var jiraCache={};
function jiraFetch(path,method,postBody){
  var cfg=getJiraConfig();if(!cfg.proxy||!cfg.url||!cfg.email||!cfg.token)return Promise.resolve(null);
  var m=method||'GET';var k='jira:'+m+':'+path;
  if(m==='GET'&&jiraCache[k]&&Date.now()-jiraCache[k].t<120000)return Promise.resolve(jiraCache[k].d);
  var hdrs={'Authorization':'Basic '+btoa(cfg.email+':'+cfg.token),'Content-Type':'application/json','x-target-url':cfg.url+path};
  var opts={method:m,headers:hdrs};
  if(postBody)opts.body=JSON.stringify(postBody);
  return fetch(cfg.proxy,opts).then(function(r){
    if(!r.ok){console.warn('Jira '+r.status+': '+path);return null}
    if(r.status===204)return{ok:true};return r.json()
  }).then(function(d){if(d&&m==='GET')jiraCache[k]={d:d,t:Date.now()};return d}).catch(function(e){console.warn('Jira error: '+e);return null})
}
function jiraPost(path,body){return jiraFetch(path,'POST',body)}
function jiraTransition(ticket,statusName){
  return jiraFetch('/rest/api/2/issue/'+ticket+'/transitions').then(function(d){
    if(!d||!d.transitions)return null;
    var t=d.transitions.find(function(tr){return tr.name===statusName||tr.to.name===statusName});
    if(!t)return null;
    return jiraPost('/rest/api/2/issue/'+ticket+'/transitions',{transition:{id:t.id}})
  })
}
function extractTicket(str){if(!str)return'';var m=str.match(/[A-Z]+-\d+/);return m?m[0]:''}
function jiraStatusColor(status){
  if(!status)return'var(--td)';var s=status.toLowerCase();
  if(s.indexOf('done')>=0||s.indexOf('deployed')>=0)return'var(--ok)';
  if(s.indexOf('review')>=0)return'#7c3aed';
  if(s.indexOf('progress')>=0)return'var(--in)';
  if(s.indexOf('ready')>=0)return'var(--wa)';
  if(s.indexOf('complete')>=0)return'#0d9488';
  if(s==='to do'||s==='backlog')return'var(--td)';
  return'var(--pr)';
}
function displayKey(iss){if(!iss||!iss.key)return'';var num=iss.key.split('-')[1]||iss.key;var tp=iss.fields&&iss.fields.issuetype&&iss.fields.issuetype.name||'';if(tp==='Bug')return'DEF-'+num;if(tp==='Story')return'US-'+num;if(tp==='Task')return'TASK-'+num;if(tp==='Epic')return'EPIC-'+num;return iss.key}
function typeIcon(iss){var tp=iss&&iss.fields&&iss.fields.issuetype&&iss.fields.issuetype.name||'';if(tp==='Bug')return'\u{1F41B}';if(tp==='Story')return'\u{1F4D7}';if(tp==='Task')return'\u2705';if(tp==='Epic')return'\u{1F3AF}';return'\u{1F4CB}'}
function priorityDot(iss){var p=iss&&iss.fields&&iss.fields.priority&&iss.fields.priority.name||'';if(p==='Highest')return'var(--er)';if(p==='High')return'#d97706';if(p==='Medium')return'#eab308';if(p==='Low')return'var(--ok)';return'var(--td)'}
function statusColor(st){var s=(st||'').toLowerCase();if(s.indexOf('done')>=0||s.indexOf('complete')>=0||s.indexOf('deployed')>=0)return'var(--ok)';if(s.indexOf('progress')>=0||s.indexOf('review')>=0)return'var(--in)';if(s.indexOf('ready')>=0||s.indexOf('sit')>=0||s.indexOf('uat')>=0)return'#d97706';return'var(--td)'}
function statusBadge(st){return html`<span class="badge" style=${'background:'+statusColor(st).replace('var(','rgba(').replace(/\)/,',.1)')+';color:'+statusColor(st)+';font-size:9px;white-space:nowrap'}>${st}</span>`}
function relName(iss){var fv=iss&&iss.fields&&iss.fields.fixVersions;return fv&&fv.length?fv[0].name:''}
function initials(iss){var a=iss&&iss.fields&&iss.fields.assignee;if(!a)return'';var n=a.displayName||'';var p=n.split(' ');return p.length>1?p[0][0]+p[p.length-1][0]:n.substring(0,2)}
function groupByRelease(issues){var g={};(issues||[]).forEach(function(iss){var rv=relName(iss)||'Unassigned';if(!g[rv])g[rv]={stories:[],defects:[]};var tp=iss.fields&&iss.fields.issuetype&&iss.fields.issuetype.name||'';if(tp==='Bug')g[rv].defects.push(iss);else g[rv].stories.push(iss)});return g}
function fetchAllJiraTickets(jql,fields){var all=[];var startAt=0;var total=999;
  function next(){if(startAt>=total)return Promise.resolve({issues:all,total:total});
    return jiraFetch('/rest/api/2/search?jql='+encodeURIComponent(jql)+'&maxResults=100&startAt='+startAt+'&fields='+(fields||'summary,status,priority,issuetype,fixVersions,assignee,updated')).then(function(d){if(!d||!d.issues)return{issues:all,total:all.length};total=d.total||0;all=all.concat(d.issues);startAt+=100;if(startAt>=total)return{issues:all,total:total};return next()})}
  return next()}

// ── Teams & Notification Helpers ──
function getTeamsConfig(){return{webhook:localStorage.getItem('fg_teams_webhook')||'',channel:localStorage.getItem('fg_teams_channel')||'',prefs:JSON.parse(localStorage.getItem('fg_teams_prefs')||'{"build_fail":true,"deploy_prod":true,"deploy_stage":true,"deploy_qa":false,"deploy_int":false,"security":true,"pr_approval":true,"meeting":true,"all_builds":false}')}}
function logNotification(type,channel,msg,status){var log=JSON.parse(localStorage.getItem('fg_notification_log')||'[]');log.unshift({time:new Date().toISOString(),type:type,channel:channel,msg:msg,status:status});localStorage.setItem('fg_notification_log',JSON.stringify(log.slice(0,200)))}
function sendTeamsCard(card){var tc=getTeamsConfig();if(!tc.webhook)return Promise.resolve(null);var proxy=getJiraConfig().proxy||JIRA_PROXY_DEFAULT;return fetch(proxy,{method:'POST',headers:{'Content-Type':'application/json','x-target-url':tc.webhook},body:JSON.stringify(card)}).then(function(r){logNotification('Teams',tc.channel||'webhook',card.title||'Notification',r.ok?'Sent':'Failed');return r.ok}).catch(function(){logNotification('Teams',tc.channel||'webhook',card.title||'Notification','Failed');return false})}
function sendNotification(type,data){var tc=getTeamsConfig();if(!tc.webhook)return;var prefs=tc.prefs;
  var card=null;
  if(type==='build_fail'&&prefs.build_fail)card={"@type":"MessageCard","themeColor":"dc2626","title":"Build Failed: "+(data.repo||''),"sections":[{"facts":[{"name":"Repository","value":data.repo||''},{"name":"Branch","value":data.branch||''},{"name":"Error","value":data.error||'Check logs'}]}]};
  if(type==='deployment'&&prefs['deploy_'+(data.environment||'').toLowerCase()])card={"@type":"MessageCard","themeColor":"059669","title":"Deployed to "+(data.environment||''),"sections":[{"facts":[{"name":"Repository","value":data.repo||''},{"name":"Deployed by","value":data.user||''},{"name":"Jira tickets","value":(data.tickets||[]).join(', ')||'None'}]}]};
  if(type==='security_alert'&&prefs.security){if(sessionStorage.getItem('fg_sec_notified'))return;sessionStorage.setItem('fg_sec_notified','1');card={"@type":"MessageCard","themeColor":"d97706","title":"Security Findings: "+(data.count||0)+" issues","sections":[{"facts":[{"name":"Critical","value":String(data.critical||0)},{"name":"High","value":String(data.high||0)},{"name":"Repository","value":data.repo||'All'}]}]}}
  if(type==='meeting_processed'&&prefs.meeting)card={"@type":"MessageCard","themeColor":"7c3aed","title":"Meeting Processed: "+(data.meeting_name||''),"sections":[{"facts":[{"name":"Tickets created","value":String(data.count||0)},{"name":"Stories","value":String(data.stories||0)},{"name":"Defects","value":String(data.defects||0)}]}]};
  if(type==='pr_approval'&&prefs.pr_approval)card={"@type":"MessageCard","themeColor":"4f46e5","title":"PR Approval Needed","sections":[{"facts":[{"name":"Repository","value":data.repo||''},{"name":"PR","value":data.pr_title||''},{"name":"Author","value":data.author||''},{"name":"Target","value":data.target_env||''}]}]};
  if(card)sendTeamsCard(card);
}

function clearCache(){Object.keys(cache).forEach(function(k){delete cache[k]});Object.keys(jiraCache).forEach(function(k){delete jiraCache[k]})}
function loadData(){
  return fetch('https://raw.githubusercontent.com/'+ORG+'/ForgeOps/main/dashboard-data.json').then(function(r){return r.ok?r.json():null}).catch(function(){return null}).then(function(cmdData){
    if(cmdData&&cmdData.repos&&cmdData.repos.length>0)return{repos:cmdData.repos,source:'json',config:null,jira:cmdData.jira||null};
    return fetch('https://raw.githubusercontent.com/'+ORG+'/ForgeOps/main/forgeops-config.json').then(function(r){return r.ok?r.json():null}).catch(function(){return null}).then(function(cfg){

  <div class=${'sb'+(sideOpen?' open':'')}>
    <div style="padding:10px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--bd)"><${Logo} s=${20}/><div style="font-weight:700;font-size:12px">ForgeOps</div></div>
    ${Object.keys(sections).map(function(sec){return html`<${Fragment} key=${sec}><div class="ns">${sec}</div>${sections[sec].map(function(k){var badge=null;if(k==='pipelines'&&running>0)badge=html`<span class="ni-badge">${running}</span>`;if(k==='deploy')badge=html`<span class="ni-badge">${projNames.length}</span>`;if(k==='alm'&&openTicketCount>0)badge=html`<span class="ni-badge">${openTicketCount}</span>`;if(k==='meetings'){var mhc=JSON.parse(localStorage.getItem('fg_meetings')||'[]').length;if(mhc>0)badge=html`<span class="ni-badge">${mhc}</span>`}if(k==='notifications'){var nlc=JSON.parse(localStorage.getItem('fg_notification_log')||'[]').length;if(nlc>0)badge=html`<span class="ni-badge">${nlc}</span>`}return html`<div key=${k} class=${'ni'+(page===k?' ac':'')} onClick=${function(){nav(k)}}><span style="flex:1">${labels[k]}</span>${badge}</div>`})}<//>`})}
    <div style="margin-top:auto;padding:8px 10px;border-top:1px solid var(--bd);font-size:9px;color:var(--td)"><span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--ok);margin-right:3px"></span>ForgeOps v6.0${lastRef[0]?' -- '+lastRef[0].toLocaleTimeString():''}</div>
  </div>
  <div class="mn">
    <div class="hd"><button class="hb" onClick=${function(){setSideOpen(!sideOpen)}} aria-label="Toggle menu">Menu</button><span style="font-size:15px;font-weight:700;flex:1">${labels[page]||''}</span><span style=${'font-size:10px;font-weight:500;color:'+(rateLimit.remaining>20?'var(--ok)':rateLimit.remaining>5?'var(--wa)':'var(--er)')}>API: ${rateLimit.remaining}/${rateLimit.limit}</span><button class="bt bs" style="font-size:10px" onClick=${refresh} aria-label="Refresh data">${loading?'...':'Refresh'}</button></div>
    <div class="ct">${renderPage()}</div>
    <div class="spark-btn" onClick=${function(){setSpark(!sparkOpen)}} aria-label="Open Spark assistant"><svg width="20" height="20" viewBox="0 0 40 40"><path d="M20 8L11 22h6.5l-2 10L27 18h-6.5l2-10z" fill="var(--in)" style="animation:sparkGlow 3s infinite"/></svg></div>
    ${sparkOpen&&html`<${SparkPanel} pg=${page} close=${function(){setSpark(false)}} startTour=${startTour}/>`}
    <${LogPanel} run=${logRun} onClose=${function(){setLogRun(null)}}/>
    <${TourOverlay} tour=${tour[0]} step=${tourStep[0]} setStep=${tourStep[1]} setPage=${setPage} onClose=${endTour}/>
    <${WelcomeModal} show=${showWelcome[0]} onClose=${function(){showWelcome[1](false)}} onStart=${function(){startTour('quick-start')}}/>
  </div>
</div>`;
}
render(html`<${App}/>`,document.getElementById('root'));
</script>
</body>
</html>
